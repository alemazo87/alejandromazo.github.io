<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ================= GLOBAL ================= */
.banner{
  position:relative;
  width:100%;
}

.banner img{
  width:100%;
  display:block;
}

.banner-logo{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  height:22px;
  width:auto;
  z-index:20;
}

/* ================= DESKTOP ================= */
@media(min-width:769px){

/* HERO BACKGROUND */
.bg-layer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  text-align:center;
  pointer-events:none;
  z-index:1;
}

.title{
  margin-top:140px;
  opacity:0.3;
}

.title img{
  width:600px;
}

.logo{
  margin-top:20px;
  opacity:0.3;
}

.logo img{
  width:320px;
}

/* CENTER CONTENT */
.center{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:5;
}

.center img{
  width:600px;
}

.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid white;
  cursor:pointer;
}

/* SIDE VIDEOS */
.side{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  width:260px;
}

.left{ left:5%; }
.right{ right:5%; }

.side video{
  width:100%;
  border-radius:14px;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

/* SCROLL IMAGES */
.images{
  margin-top:120vh;
  display:flex;
  justify-content:space-between;
  padding:0 5%;
}

.col{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.images img{
  width:320px;
}

}

/* ================= MOBILE ================= */
@media(max-width:768px){

.banner{
  height:140px;
  overflow:hidden;
}

.banner img{
  height:100%;
  object-fit:cover;
}

/* LOGO */
.banner-logo{
  height:18px;
  left:14px;
}

/* HERO FLOW */
.hero{
  padding:30px 20px;
  text-align:center;
}

.title img{
  width:90%;
  opacity:0.3;
}

.logo img{
  width:65%;
  margin-top:10px;
  opacity:0.25;
}

/* CONTENT */
.container{
  max-width:360px;
  margin:0 auto;
  text-align:center;
}

.description img{
  width:100%;
}

.buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:18px;
}

.btn{
  padding:10px 14px;
  border:1px solid white;
}

/* VIDEO THUMBS */
.video-thumb{
  width:92%;
  margin:20px auto;
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

.video-thumb img{
  width:100%;
}

.video-thumb span{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.7;
}

/* IMAGES */
.images{
  padding:0 4%;
}

.images img{
  width:100%;
  margin:14px 0;
  border-radius:12px;
}

}

/* ================= VIDEO OVERLAY ================= */
.video-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  z-index:9999;
}

.video-overlay video{
  width:100%;
  height:100%;
  object-fit:contain;
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png">
  </picture>

  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- DESKTOP BACKGROUND -->
<div class="bg-layer">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<!-- DESKTOP CENTER -->
<div class="center">
  <img src="description.png">

  <div class="buttons">
    <div class="btn" onclick="goPage('work.html')">MY WORK</div>
    <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
  </div>
</div>

<!-- DESKTOP VIDEOS -->
<div class="side left">
  <video id="reel" loop muted autoplay playsinline>
    <source src="reel.mp4">
  </video>
  <div class="video-text" id="reelText">tap for sound</div>
</div>

<div class="side right">
  <video id="video2" loop muted autoplay playsinline>
    <source src="video2.mp4">
  </video>
  <div class="video-text" id="video2Text">tap for sound</div>
</div>

<!-- MOBILE HERO -->
<div class="hero">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<div class="container">
  <div class="description">
    <img src="description.png">
  </div>

  <div class="buttons">
    <div class="btn" onclick="goPage('work.html')">MY WORK</div>
    <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
  </div>
</div>

<!-- MOBILE VIDEOS -->
<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">

  <div class="col">
    <img src="image4.jpg">
  </div>

  <div class="col">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="col">
    <img src="image1.jpg">
  </div>

</div>

<!-- VIDEO OVERLAY -->
<div id="overlay" class="video-overlay">
  <video id="overlayVideo" controls playsinline></video>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* BUTTON SOUND */
function goPage(page){
  const s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},150);
}

/* VIDEO TOGGLE DESKTOP */
function setup(v,t){
  const vid=document.getElementById(v);
  const txt=document.getElementById(t);

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");

/* MOBILE VIDEO PLAYER */
const overlay = document.getElementById("overlay");
const video = document.getElementById("overlayVideo");

function openVideo(src){
  video.src = src;
  overlay.style.display="block";
  video.play().catch(()=>{});
}

overlay.addEventListener("click", closeVideo);

let startY=0;
overlay.addEventListener("touchstart", e=>{
  startY = e.touches[0].clientY;
});

overlay.addEventListener("touchmove", e=>{
  if(e.touches[0].clientY - startY > 80){
    closeVideo();
  }
});

function closeVideo(){
  video.pause();
  video.src="";
  overlay.style.display="none";
}

document.addEventListener("visibilitychange", ()=>{
  if(document.hidden) closeVideo();
});

</script>

</body>
</html>
