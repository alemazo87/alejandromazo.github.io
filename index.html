<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
    position: fixed;
    top: 25px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 50;
    cursor: pointer;
}

.header img {
    width: 90px;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.9));
}

.header span {
    font-size: 42px;
    text-shadow: 0 10px 30px rgba(0,0,0,0.9);
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

/* ===== BANNER ===== */
.banner {
    position: absolute;
    width: 100%;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1;
    overflow: hidden;

    animation: bannerResize 2s ease forwards;
}

.banner img {
    width: 100%;
    height: auto;
    object-fit: contain;
}

@keyframes bannerResize {
    0% {
        height: 100vh;
        filter: brightness(2);
    }
    100% {
        height: 160px;
        filter: brightness(1);
    }
}

/* ===== CENTER LOGO ===== */
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65vw;
    max-width: 900px;
    opacity: 0.5;
    z-index: 1;
    pointer-events: none;
}

/* ===== TEXT ===== */
.center-text {
    position: relative;
    z-index: 3;
    text-align: center;
    margin-top: 200px;
}

.center-text p {
    font-size: 22px;
    margin-bottom: 25px;
}

/* ===== BUTTONS ===== */
.btn {
    border: 2px solid white;
    padding: 14px 35px;
    text-decoration: none;
    color: white;
    display: inline-block;
    margin: 10px;
    transition: 0.25s;
}

.btn:hover {
    background: white;
    color: black;
}

/* ===== VIDEOS ===== */
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    z-index: 2;
}

.left { left: calc(50% - 550px); }
.right { right: calc(50% - 550px); }

.side video {
    width: 100%;
    border-radius: 20px;
}

/* ===== GRID ===== */
.grid {
    position: relative;
    z-index: 4;
    display: flex;
    gap: 50px;
    padding: 120px 80px;
}

.left-img,
.right-img {
    width: 25%;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

img {
    width: 100%;
    height: auto;
    user-select: none;
    -webkit-user-drag: none;
}

/* ===== MOBILE FIX (ONLY CHANGES HERE) ===== */
@media (max-width: 900px) {

    .header span { font-size: 20px; }
    .header img { width: 50px; }

    /* STACK HERO CONTENT */
    .hero {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: auto;
        padding-bottom: 40px;
    }

    /* FIX VIDEOS (VISIBLE + STACKED) */
    .side {
        position: relative;
        top: auto;
        transform: none;
        width: 90%;
        max-width: 400px;
        margin: 15px auto;
        z-index: 3;
    }

    .left,
    .right {
        left: auto;
        right: auto;
    }

    /* TEXT SPACING */
    .center-text {
        margin-top: 120px;
        padding: 0 15px;
    }

    /* LOGO BALANCE */
    .center-logo {
        width: 85vw;
        opacity: 0.35;
    }

    /* GRID FIX */
    .grid {
        flex-direction: column;
        padding: 60px 20px;
    }

    .left-img,
    .right-img,
    .middle {
        width: 100%;
    }

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header" onclick="window.scrollTo({top:0, behavior:'smooth'})">
    <img src="logo.png">
    <span>ALEJANDRO MAZO</span>
</div>

<!-- HERO -->
<section class="hero">

    <div class="banner">
        <img src="banner.jpg">
    </div>

    <img src="logo.png" class="center-logo">

    <div class="side left">
        <video autoplay muted loop playsinline preload="auto">
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="side right">
        <video autoplay muted loop playsinline preload="auto">
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="center-text">
        <p>
            action sports and concerts<br>
            videographer and photographer
        </p>

        <a href="#work" class="btn">SEE MEDIA</a>
        <a href="#contact" class="btn">CONTACT</a>
    </div>

</section>

<!-- GRID -->
<section class="grid" id="work">

    <div class="left-img">
        <img src="image1.jpg">
    </div>

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <div class="right-img">
        <img src="image4.jpg">
    </div>

</section>

<!-- CONTACT -->
<section id="contact" style="text-align:center; padding:80px;">
    <p>your@email.com</p>
</section>

<script>

/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu", e => e.preventDefault());

/* SAFE DRAG DISABLE */
window.addEventListener("DOMContentLoaded", () => {
    document.querySelectorAll("img, video").forEach(el => {
        el.setAttribute("draggable","false");
    });
});

</script>

</body>
</html>
