<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
  -webkit-tap-highlight-color: transparent;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
}

.banner img{
  width:100%;
  display:block;
  user-select:none;
  pointer-events:none;
}

.banner-logo{
  position:absolute;
  left:20px;
  top:50%;
  margin-top:-10px;
  height:clamp(14px,2vw,20px);
  width:auto;
  z-index:20;
}

/* ================= DESKTOP ================= */
@media(min-width:769px){

.bg-layer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  text-align:center;
  pointer-events:none;
  z-index:1;
}

.bg-layer-inner{
  margin-top:0;
}

.title img{
  width:600px;
  opacity:.3;
}

.logo img{
  width:320px;
  margin-top:20px;
  opacity:.3;
}

.center{
  position:fixed;
  top:55%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:5;
}

.center img{
  width:600px;
}

.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid white;
  cursor:pointer;
  transition:all .25s ease;
}

.btn:hover{
  background:white;
  color:black;
  transform:translateY(-2px);
}

.btn:active{
  transform:translateY(0);
  opacity:.8;
}

/* VIDEOS */
.side{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  width:260px;
}

.left{ left:5%; }
.right{ right:5%; }

.side video{
  width:100%;
  border-radius:14px;
  cursor:pointer;
}

/* IMAGES */
.images{
  margin-top:120vh;
  display:flex;
  justify-content:space-between;
  padding:0 5%;
}

.col{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.images img{
  width:320px;
}

}

/* ================= MOBILE ================= */
@media(max-width:768px){

.bg-layer,
.center,
.side{
  display:none;
}

.banner{
  height:140px;
  overflow:hidden;
}

.banner img{
  height:100%;
  object-fit:cover;
}

.banner-logo{
  height:clamp(12px,4vw,18px);
  left:14px;
  margin-top:-9px;
}

.hero{
  padding:40px 20px 20px;
  text-align:center;
}

.hero .title img{
  width:90%;
  opacity:.3;
}

.hero .logo img{
  width:65%;
  margin-top:12px;
  opacity:.25;
}

.container{
  max-width:360px;
  margin:auto;
  text-align:center;
}

.description img{
  width:100%;
}

.buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:18px;
}

.btn{
  padding:10px 14px;
  border:1px solid white;
}

/* VIDEO */
.video-thumb{
  width:92%;
  margin:20px auto;
  position:relative;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
}

.video-thumb img{
  width:100%;
}

.video-thumb span{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:.7;
}

/* IMAGES */
.images{
  padding:0 4%;
}

.images img{
  width:100%;
  margin:14px 0;
  border-radius:12px;
}

}

/* ===== VIDEO OVERLAY ===== */
.video-overlay{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
  touch-action:none;
}

.video-overlay video{
  width:100%;
  height:100%;
  object-fit:contain;
}

</style>
</head>

<body oncontextmenu="return false">

<div class="banner" id="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png" id="bannerImg">
  </picture>
  <img src="bannerlogo.png" class="banner-logo">
</div>

<div class="bg-layer">
  <div class="bg-layer-inner" id="bgOffset">
    <div class="title"><img src="title.png"></div>
    <div class="logo"><img src="logo.png"></div>
  </div>
</div>

<div class="center">
  <img src="description.png">
  <div class="buttons">
    <div class="btn" onclick="goPage('work.html')">MY WORK</div>
    <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
  </div>
</div>

<div class="side left">
  <video id="reel" loop muted autoplay playsinline>
    <source src="reel.mp4">
  </video>
</div>

<div class="side right">
  <video id="video2" loop muted autoplay playsinline>
    <source src="video2.mp4">
  </video>
</div>

<div class="hero">
  <div class="title"><img src="title.png"></div>
  <div class="logo"><img src="logo.png"></div>
</div>

<div class="container">
  <div class="description"><img src="description.png"></div>
  <div class="buttons">
    <div class="btn" onclick="goPage('work.html')">MY WORK</div>
    <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
  </div>
</div>

<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<div class="images">
  <div class="col"><img src="image4.jpg"></div>
  <div class="col">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>
  <div class="col"><img src="image1.jpg"></div>
</div>

<div id="overlay" class="video-overlay">
  <video id="overlayVideo" controls playsinline></video>
</div>

<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<script>

/* OFFSET AFTER IMAGE LOAD */
function updateOffset(){
  const banner = document.getElementById("banner");
  const offset = document.getElementById("bgOffset");
  offset.style.marginTop = banner.offsetHeight + "px";
}

window.addEventListener("resize", updateOffset);
document.getElementById("bannerImg").addEventListener("load", updateOffset);

/* BUTTON SOUND */
function goPage(page){
  const s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},120);
}

/* DESKTOP VIDEO TOGGLE */
["reel","video2"].forEach(id=>{
  const vid=document.getElementById(id);
  vid.addEventListener("click",()=>{
    vid.muted=!vid.muted;
  });
});

/* VIDEO OVERLAY */
const overlay=document.getElementById("overlay");
const video=document.getElementById("overlayVideo");

function openVideo(src){
  video.src=src;
  overlay.style.display="flex";
  document.body.style.overflow="hidden";
  video.play().catch(()=>{});
}

/* CLOSE */
overlay.addEventListener("click",(e)=>{
  if(e.target===overlay) closeVideo();
});

document.addEventListener("keydown",(e)=>{
  if(e.key==="Escape") closeVideo();
});

/* SWIPE CLOSE */
let startY=0;
overlay.addEventListener("touchstart",e=>{
  startY=e.touches[0].clientY;
},{passive:true});

overlay.addEventListener("touchmove",e=>{
  if(e.touches[0].clientY-startY>80) closeVideo();
},{passive:true});

function closeVideo(){
  video.pause();
  video.src="";
  overlay.style.display="none";
  document.body.style.overflow="";
}

/* CLEAN EXIT */
document.addEventListener("visibilitychange",()=>{
  if(document.hidden) closeVideo();
});

/* DISABLE DRAG */
document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("dragstart", e=>e.preventDefault());
});

</script>

</body>
</html>
