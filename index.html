<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 5;
}

.header img {
    width: 50px;
}

.header span {
    font-size: 18px;
    text-shadow: 0 5px 20px rgba(0,0,0,1);
}

/* ===== HERO ===== */
.hero {
    position: relative;
}

/* ===== BANNER ===== */
.banner {
    width: 100%;
}

.banner img {
    width: 100%;
    height: auto;
    object-fit: contain;
    display: block;
}

/* ===== BIG BACKGROUND LOGO ===== */
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 90vw;
    opacity: 0.25;
    z-index: 0;
    pointer-events: none;
}

/* ===== CENTER CONTENT ===== */
.center-text {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 80px 20px 40px;
}

.center-text p {
    font-size: 20px;
    margin-bottom: 20px;
}

.btn {
    border: 2px solid white;
    padding: 12px 30px;
    color: white;
    text-decoration: none;
    display: inline-block;
    margin: 10px;
}

.btn:hover {
    background: white;
    color: black;
}

/* ===== VIDEOS ===== */
.video-wrap {
    position: relative;
    width: 90%;
    max-width: 400px;
    margin: 30px auto;
}

.video-wrap video {
    width: 100%;
    border-radius: 15px;
}

/* PLAY BUTTON */
.play-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 50px;
    color: white;
    opacity: 0.7;
    cursor: pointer;
    z-index: 3;
}

.play-btn.hidden {
    display: none;
}

/* ===== DESKTOP (UNCHANGED) ===== */
@media (min-width: 901px) {

/* KEEP YOUR ORIGINAL DESKTOP CSS HERE */
/* (no changes made) */

}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

    <!-- BANNER -->
    <div class="banner">
        <img src="banner.jpg">
        
        <!-- HEADER ON BANNER -->
        <div class="header">
            <img src="logo.png">
            <span>ALEJANDRO MAZO</span>
        </div>
    </div>

    <!-- BIG LOGO -->
    <img src="logo.png" class="center-logo">

    <!-- TEXT -->
    <div class="center-text">
        <p>
            action sports and concerts<br>
            videographer and photographer
        </p>

        <a href="#work" class="btn">SEE MEDIA</a>
        <a href="#contact" class="btn">CONTACT</a>
    </div>

    <!-- VIDEOS -->
    <div class="video-wrap">
        <video loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
        <div class="play-btn">▶</div>
    </div>

    <div class="video-wrap">
        <video loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
        <div class="play-btn">▶</div>
    </div>

</section>

<script>

/* PLAY WITH SOUND ON CLICK */

document.querySelectorAll(".video-wrap").forEach(wrap => {

    const video = wrap.querySelector("video");
    const btn = wrap.querySelector(".play-btn");

    btn.addEventListener("click", () => {
        video.muted = false;
        video.play();
        btn.classList.add("hidden");
    });

});

</script>

</body>
</html>
