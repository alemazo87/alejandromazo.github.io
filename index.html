<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* ===== HERO SECTION ===== */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* Background banner */
.banner {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  top: 0;
  left: 0;
  z-index: 0;
}

/* Top small logo */
.header-logo {
  position: absolute;
  top: 15px;
  left: 15px;
  width: 35px;
  height: auto;
  z-index: 3;
}

/* Title image */
.title-img {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  max-width: 320px;
  height: auto;
  z-index: 3;
}

/* Center logo */
.center-logo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60vw;
  max-width: 260px;
  height: auto;
  z-index: 2;
}

/* Tagline */
.hero-text {
  position: absolute;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  letter-spacing: 2px;
  opacity: 0.6;
  z-index: 3;
}

/* ===== VIDEO SECTION ===== */
.video-section {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.video-section video {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 0;
}

/* Tap text */
.tap-text {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  font-size: 13px;
  letter-spacing: 2px;
  opacity: 0.4;
  transform: translateY(-50%);
  z-index: 2;
}

/* Project label */
.video-overlay {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 13px;
  opacity: 0.5;
  z-index: 2;
}

.video-overlay span {
  background: rgba(0,0,0,0.3);
  padding: 6px 12px;
  border-radius: 4px;
}

/* ===== GALLERY ===== */
.gallery {
  padding: 40px 15px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.gallery img {
  width: 100%;
  height: auto;
  border-radius: 6px;
}

/* ===== DESKTOP FIX (optional but clean) ===== */
@media(min-width: 768px) {
  .title-img {
    top: 80px;
  }

  .center-logo {
    width: 300px;
  }

  .hero-text {
    font-size: 14px;
  }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <img src="bannerMOBILE.jpg" class="banner">

  <img src="logo.png" class="header-logo">

  <img src="Title.png" class="title-img">

  <img src="bannerlogo.png" class="center-logo">

  <div class="hero-text">
    Le†'$ MAK€ $ΩME┬HING ÐØPE
  </div>

</section>

<!-- VIDEO 1 -->
<section class="video-section">
  <video src="video1.mp4" autoplay muted loop playsinline></video>

  <div class="tap-text">TAP TO PLAY OR PAUSE</div>

  <div class="video-overlay">
    <span>PROJECT 01</span>
  </div>
</section>

<!-- VIDEO 2 -->
<section class="video-section">
  <video src="video2.mp4" autoplay muted loop playsinline></video>

  <div class="tap-text">TAP TO PLAY OR PAUSE</div>

  <div class="video-overlay">
    <span>PROJECT 02</span>
  </div>
</section>

<!-- GALLERY -->
<section class="gallery">
  <img src="img1.jpg">
  <img src="img2.jpg">
  <img src="img3.jpg">
  <img src="img4.jpg">
</section>

<script>
document.querySelectorAll("video").forEach(video => {
  video.addEventListener("click", () => {
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  });
});
</script>

</body>
</html>
