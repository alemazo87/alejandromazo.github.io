<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER (FIXED HEIGHT CONTROL) ===== */
.banner{
  position:relative;
  width:100%;
  height:120px; /* FORCE CONSISTENT HEIGHT */
  overflow:hidden;
  z-index:10;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOGO */
.banner-logo{
  position:absolute;
  left:16px;
  top:50%;
  transform:translateY(-50%);
  height:20px;
  width:auto;
}

/* ===== BACKGROUND (REAL FIXED) ===== */
.bg-layer{
  position:fixed;
  top:120px; /* matches banner height */
  left:0;
  width:100%;
  text-align:center;
  pointer-events:none;
  z-index:1;
}

/* TITLE */
.title img{
  width:80%;
  max-width:420px;
  opacity:0.25;
}

/* LOGO */
.logo img{
  width:60%;
  max-width:320px;
  margin-top:12px;
  opacity:0.2;
}

/* ===== MAIN ===== */
.main{
  margin-top:200px; /* creates space below bg */
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  position:relative;
  z-index:5;
}

/* DESCRIPTION */
.center{
  max-width:340px;
  width:100%;
  text-align:center;
}

.center img{
  width:100%;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:18px;
}

.btn{
  padding:10px 16px;
  border:1px solid white;
  cursor:pointer;
}

/* ===== VIDEO THUMBNAILS (CLEAN) ===== */
.video-thumb{
  width:92%;
  margin:20px auto;
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

.video-thumb img{
  width:100%;
  display:block;
}

.video-thumb span{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.7;
  font-size:12px;
}

/* ===== IMAGES ===== */
.images{
  padding:0 4%;
}

.images img{
  width:100%;
  margin:14px 0;
  border-radius:12px;
}

/* ===== DESKTOP ===== */
@media(min-width:769px){

  .banner{
    height:auto;
  }

  .banner img{
    height:auto;
  }

  .bg-layer{
    position:fixed;
  }

  .main{
    flex-direction:row;
    margin-top:260px;
    gap:60px;
  }

  .center{
    max-width:520px;
  }

  .video-thumb{
    display:none;
  }

  .side{
    display:block;
    width:280px;
    position:relative;
  }

  .side video{
    width:100%;
    border-radius:14px;
  }

  .video-text{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0.6;
  }

  .images{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:30px;
    padding:0 6%;
    margin-top:160px;
  }

  .center-stack{
    display:grid;
    grid-template-rows:1fr 1fr;
    gap:10px;
  }

}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png">
  </picture>

  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- BACKGROUND -->
<div class="bg-layer">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="center">
    <img src="description.png">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

</div>

<!-- VIDEOS -->
<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">
  <img src="image1.jpg">
  <img src="image2.jpg">
  <img src="image3.jpg">
  <img src="image4.jpg">
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},180);
}

function openVideo(src){
  let v=document.createElement("video");
  v.src=src;
  v.controls=true;
  v.autoplay=true;

  v.style.position="fixed";
  v.style.top=0;
  v.style.left=0;
  v.style.width="100%";
  v.style.height="100%";
  v.style.background="#000";
  v.style.zIndex=9999;

  document.body.appendChild(v);

  v.addEventListener("click", ()=>v.remove());
}
</script>

</body>
</html>
