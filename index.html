<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* FONT */
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Orbitron;
}

body {
  background:black;
  overflow-x:hidden;
}

/* BACKGROUND LOCK */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.bg img {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:120%;
  opacity:0.3;
}

.bg-title { top:5%; z-index:2; }
.bg-logo { top:20%; z-index:1; }

/* BANNER */
.banner img {
  width:100%;
  height:100vh;
  object-fit:cover;
  animation:zoom 2s ease forwards;
}

@keyframes zoom {
  0% { transform:scale(1.2); filter:brightness(2); }
  100% { transform:scale(1); filter:brightness(1); }
}

/* FIXED LOGO */
.bannerlogo {
  position:fixed;
  bottom:20px;
  left:20px;
  width:120px;
  z-index:100;
}

/* TITLE */
.title {
  text-align:center;
  font-size:60px;
  margin:60px 0;
  color:#888;
  letter-spacing:6px;
}

/* TOP ROW */
.top-row {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
  padding:0 5%;
}

.side {
  width:260px;
  height:420px;
  object-fit:cover;
}

/* CENTER */
.center {
  position:relative;
  width:420px;
  text-align:center;
}

.center-logo {
  width:100%;
  opacity:0.2;
}

.description {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:85%;
}

/* BOTTOM ROW */
.bottom-row {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  margin:80px 0;
  padding:0 5%;
}

/* LEFT / RIGHT BIG */
.tall {
  width:300px;
  height:420px;
  object-fit:cover;
}

/* CENTER STACK */
.stack {
  display:flex;
  flex-direction:column;
  gap:20px;
}

.stack img {
  width:500px;
}

/* MOBILE */
@media (max-width:768px){

  .banner img {
    content:url("banner.jpg");
  }

  .top-row,
  .bottom-row {
    flex-direction:column;
  }

  .stack img,
  .tall,
  .side {
    width:100%;
    height:auto;
  }

  .title {
    font-size:32px;
  }
}

</style>
</head>

<body>

<!-- BG -->
<div class="bg">
  <img src="logo.png" class="bg-logo">
  <img src="title.png" class="bg-title">
</div>

<!-- FIXED LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">
</div>

<!-- TITLE -->
<div class="title">ALEJANDRO MAZO</div>

<!-- TOP ROW -->
<div class="top-row">

  <img src="image4.jpg" class="side">

  <div class="center">
    <img src="logo.png" class="center-logo">
    <img src="description.png" class="description">
  </div>

  <img src="image1.jpg" class="side">

</div>

<!-- BOTTOM ROW -->
<div class="bottom-row">

  <img src="image2.jpg" class="tall">

  <div class="stack">
    <img src="image3.jpg">
    <img src="image2.jpg">
  </div>

  <img src="image1.jpg" class="tall">

</div>

</body>
</html>
