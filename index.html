<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  width:100%;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

/* LOGO */
.banner-logo{
  position:absolute;
  left:30px;
  top:50%;
  transform:translateY(-50%);
  width:100px;
}

/* ===== TITLE ===== */
.title{
  margin-top:40px;
  text-align:center;
  opacity:0.3;
}

.title img{
  width:658px;
  max-width:90%;
}

/* ===== MAIN LOGO ===== */
.main-logo{
  margin-top:20px;
  text-align:center;
  opacity:0.3;
}

.main-logo img{
  width:250px;
}

/* ===== CENTER CONTENT ===== */
.center{
  text-align:center;
  margin-top:40px;
}

.center img{
  width:443px;
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== VIDEOS ===== */
.videos{
  display:flex;
  justify-content:space-between;
  margin:60px 5%;
  gap:20px;
}

.video-box{
  position:relative;
  width:48%;
}

.video-box video{
  width:100%;
  border-radius:12px;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

/* ===== IMAGES ===== */
.images{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:20px;
  padding:40px 5%;
}

.images img{
  width:100%;
  border-radius:10px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .banner img{
    content:url("bannerMOBILE.jpg");
  }

  .banner-logo{
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
  }

  .videos{
    flex-direction:column;
  }

  .video-box{
    width:100%;
  }

  .images{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">
  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- TITLE -->
<div class="title">
  <img src="title.png">
</div>

<!-- LOGO -->
<div class="main-logo">
  <img src="logo.png">
</div>

<!-- DESCRIPTION -->
<div class="center">
  <img src="description.png">

  <div class="buttons">
    <div class="btn" onclick="goPage('work.html')">MY WORK</div>
    <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
  </div>
</div>

<!-- VIDEOS -->
<div class="videos">

  <div class="video-box">
    <video id="reel" loop muted>
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="video-box">
    <video id="video2" loop muted>
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<!-- IMAGES -->
<div class="images">
  <img src="image1.jpg">
  <img src="image2.jpg">
  <img src="image3.jpg">
  <img src="image4.jpg">
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.play().catch(()=>{});

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");
</script>

</body>
</html>
