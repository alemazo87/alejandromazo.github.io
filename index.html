<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  user-select:none;
}

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:18vh;
  min-height:100px;
  background:url("bannerMOBILE.jpg") center/cover no-repeat;
}

@media(min-width:768px){
  .banner{
    background:url("banner.png") center/cover no-repeat;
    height:140px;
  }
}

/* ===== FIXED LOGO ===== */
.bannerlogo{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
}

@media(min-width:768px){
  .bannerlogo{
    left:30px;
    transform:none;
    width:180px;
  }
}

/* ===== CENTER BLOCK ===== */
.center{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding:30px 20px;
  gap:15px;
}

/* TITLE */
.title{
  width:80%;
  max-width:600px;
  opacity:0.3;
}

/* LOGO */
.logo{
  width:40vw;
  max-width:180px;
  opacity:0.3;
}

/* DESCRIPTION */
.description{
  width:90%;
  max-width:500px;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:20px;
  margin-top:10px;
}

.btn{
  padding:10px 25px;
  border:1px solid white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== VIDEO ===== */
.video-section{
  width:100%;
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  gap:25px;
}

.video{
  width:100%;
  aspect-ratio:16/9;
  position:relative;
}

.video video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LABEL */
.label{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:12px;
  opacity:0.6;
  pointer-events:none;
}

/* ===== DESKTOP VIDEO ===== */
@media(min-width:768px){
  .video-section{
    flex-direction:row;
    justify-content:center;
  }

  .video{
    width:45%;
  }
}

/* ===== GALLERY ===== */
.gallery{
  width:100%;
  padding:30px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
}

.gallery img{
  width:100%;
  max-width:500px;
  height:auto;
}

/* DESKTOP GALLERY */
@media(min-width:768px){
  .gallery{
    flex-direction:row;
    justify-content:center;
    align-items:flex-start;
  }

  .center-stack{
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .gallery img{
    max-width:350px;
  }
}
</style>
</head>

<body oncontextmenu="return false;">

<audio id="clickSound" src="click.mp3"></audio>

<!-- BANNER -->
<div class="banner"></div>

<!-- LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- CENTER -->
<div class="center">

  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
  <img src="description.png" class="description">

  <div class="buttons">
    <div class="btn" onclick="go('work.html')">MY WORK</div>
    <div class="btn" onclick="go('contact.html')">CONTACT</div>
  </div>

</div>

<!-- VIDEOS -->
<div class="video-section">

  <div class="video">
    <video src="reel.mp4" autoplay muted loop playsinline></video>
    <span class="label">tap for sound</span>
  </div>

  <div class="video">
    <video src="video2.mp4" autoplay muted loop playsinline></video>
    <span class="label">tap for sound</span>
  </div>

</div>

<!-- GALLERY -->
<div class="gallery">

  <img src="image1.jpg">

  <img src="image2.jpg">

  <img src="image3.jpg">

  <img src="image4.jpg">

</div>

<script>
// CLICK SOUND
function go(page){
  document.getElementById("clickSound").play();
  setTimeout(()=>{ window.location.href = page; },150);
}

// VIDEO SOUND TOGGLE
document.querySelectorAll(".video").forEach(container=>{
  const video = container.querySelector("video");
  const label = container.querySelector(".label");

  container.addEventListener("click",()=>{
    video.muted = !video.muted;

    if(video.muted){
      label.innerText = "tap for sound";
    } else {
      label.innerText = "tap to mute";
    }
  });
});
</script>

</body>
</html>
