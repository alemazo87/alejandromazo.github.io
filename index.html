<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

/* FIXED SIZE LOGO (NO STRETCH) */
.banner-logo{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  height:20px;
  width:auto;
}

/* ===== FIXED BACKGROUND LAYER ===== */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  pointer-events:none;
  text-align:center;
}

/* OFFSET UNDER BANNER */
.bg-inner{
  margin-top:140px;
}

.title img{
  width:600px;
  max-width:90%;
  opacity:.3;
}

.logo img{
  width:400px;
  max-width:70%;
  opacity:.3;
  margin-top:20px;
}

/* ===== MAIN CONTENT ===== */
.content{
  margin-top:420px;
  text-align:center;
  padding:40px 20px;
}

.description img{
  width:600px;
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid white;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== VIDEOS ===== */
.videos{
  display:flex;
  justify-content:center;
  gap:40px;
  margin:80px 0;
  flex-wrap:wrap;
}

.video-wrap{
  position:relative;
}

.videos video{
  width:300px;
  border-radius:12px;
  cursor:pointer;
}

/* TEXT CENTERED */
.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:.6;
  pointer-events:none;
}

/* ===== IMAGES ===== */
.images{
  display:flex;
  justify-content:space-between;
  padding:40px;
  gap:20px;
}

.col{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.images img{
  width:300px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.bg{
  position:static;
}

.bg-inner{
  margin-top:20px;
}

.content{
  margin-top:40px;
}

.videos{
  flex-direction:column;
  align-items:center;
}

.images{
  flex-direction:column;
  align-items:center;
}

.images img{
  width:90%;
}

.banner-logo{
  height:16px;
}

}

/* DISABLE DRAG */
img{
  user-select:none;
  -webkit-user-drag:none;
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">
  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- FIXED TITLE + LOGO -->
<div class="bg">
  <div class="bg-inner">
    <div class="title"><img src="title.png"></div>
    <div class="logo"><img src="logo.png"></div>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <div class="description">
    <img src="description.png">
  </div>

  <div class="buttons">
    <div class="btn" onclick="go('work.html')">MY WORK</div>
    <div class="btn" onclick="go('contact.html')">CONTACT</div>
  </div>

  <!-- VIDEOS -->
  <div class="videos">

    <div class="video-wrap">
      <video id="reel" src="reel.mp4" muted loop autoplay playsinline></video>
      <div class="video-text" id="text1">tap for sound</div>
    </div>

    <div class="video-wrap">
      <video id="video2" src="video2.mp4" muted loop autoplay playsinline></video>
      <div class="video-text" id="text2">tap for sound</div>
    </div>

  </div>

</div>

<!-- IMAGES -->
<div class="images">

  <div class="col">
    <img src="image4.jpg">
  </div>

  <div class="col">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="col">
    <img src="image1.jpg">
  </div>

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* NAV */
function go(page){
  const s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},120);
}

/* VIDEO TOGGLE SOUND */
function setup(id,textId){

  const vid = document.getElementById(id);
  const txt = document.getElementById(textId);

  vid.muted = true;
  vid.play().catch(()=>{});

  vid.onclick = ()=>{
    vid.muted = !vid.muted;
    txt.innerText = vid.muted ? "tap for sound" : "tap to mute";
  };
}

setup("reel","text1");
setup("video2","text2");

</script>

</body>
</html>
