<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
}

.banner img{
  width:100%;
  display:block;
  user-select:none;
}

.banner-logo{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  height:18px;
}

/* ===== CONTENT ===== */
.section{
  text-align:center;
  padding:40px 20px;
}

.title img{
  width:600px;
  max-width:90%;
  opacity:.3;
}

.logo img{
  width:320px;
  max-width:70%;
  opacity:.3;
  margin-top:20px;
}

.description img{
  width:600px;
  max-width:90%;
  margin-top:40px;
}

/* ===== BUTTONS ===== */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 24px;
  border:1px solid white;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== VIDEOS ===== */
.videos{
  display:flex;
  justify-content:center;
  gap:40px;
  margin:60px 0;
  flex-wrap:wrap;
}

.video-wrap{
  position:relative;
}

.videos video{
  width:300px;
  border-radius:12px;
  cursor:pointer;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:.6;
  pointer-events:none;
}

/* ===== IMAGES ===== */
.images{
  display:flex;
  justify-content:space-between;
  padding:40px;
  gap:20px;
}

.col{
  display:flex;
  flex-direction:column;
  gap:20px;
  align-items:center;
}

.images img{
  width:300px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

.videos{
  flex-direction:column;
  align-items:center;
}

.images{
  flex-direction:column;
  align-items:center;
}

.images img{
  width:90%;
}

}

/* ===== OVERLAY ===== */
.overlay{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
  touch-action:none;
}

.overlay video{
  width:100%;
  height:100%;
  object-fit:contain;
}

</style>
</head>

<body oncontextmenu="return false">

<div class="banner">
  <img src="banner.png">
  <img src="bannerlogo.png" class="banner-logo">
</div>

<div class="section">
  <div class="title"><img src="title.png"></div>
  <div class="logo"><img src="logo.png"></div>

  <div class="description"><img src="description.png"></div>

  <div class="buttons">
    <div class="btn" onclick="go('work.html')">MY WORK</div>
    <div class="btn" onclick="go('contact.html')">CONTACT</div>
  </div>
</div>

<div class="videos">
  <div class="video-wrap">
    <video id="reel" src="reel.mp4" muted loop playsinline preload="metadata"></video>
    <div class="video-text" id="text1">tap for sound</div>
  </div>

  <div class="video-wrap">
    <video id="video2" src="video2.mp4" muted loop playsinline preload="metadata"></video>
    <div class="video-text" id="text2">tap for sound</div>
  </div>
</div>

<div class="images">
  <div class="col">
    <img src="image4.jpg">
  </div>

  <div class="col">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="col">
    <img src="image1.jpg">
  </div>
</div>

<div class="overlay" id="overlay">
  <video id="overlayVideo" controls playsinline></video>
</div>

<audio id="clickSound" src="click.mp3" preload="auto"></audio>

<script>

/* NAVIGATION */
function go(page){
  const s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},120);
}

/* DEVICE */
function isMobile(){
  return window.matchMedia("(max-width:768px)").matches;
}

/* ELEMENTS */
const reel = document.getElementById("reel");
const video2 = document.getElementById("video2");
const text1 = document.getElementById("text1");
const text2 = document.getElementById("text2");

/* VIDEO SETUP */
function applyBehavior(vid, txt){

  if(isMobile()){
    vid.onclick = () => openVideo(vid);
    vid.ondblclick = null;
  }else{
    vid.onclick = () => {
      vid.muted = !vid.muted;
      txt.innerText = vid.muted ? "tap for sound" : "tap to mute";
    };
    vid.ondblclick = () => openVideo(vid);
  }

}

/* INIT */
window.addEventListener("DOMContentLoaded",()=>{

  [reel, video2].forEach(v=>{
    v.muted = true;
    v.play().catch(()=>{});
  });

  applyBehavior(reel, text1);
  applyBehavior(video2, text2);

});

/* SINGLE resize handler */
window.addEventListener("resize", ()=>{
  applyBehavior(reel, text1);
  applyBehavior(video2, text2);
});

/* OVERLAY */
const overlay=document.getElementById("overlay");
const player=document.getElementById("overlayVideo");

let scrollY=0;

function openVideo(v){

  document.querySelectorAll(".videos video").forEach(vid=>vid.pause());

  scrollY = window.scrollY;

  player.src = v.src;
  overlay.style.display="flex";

  document.body.style.position="fixed";
  document.body.style.top = `-${scrollY}px`;
  document.body.style.width="100%";

  player.currentTime = 0;
  player.play().catch(()=>{});
}

function closeVideo(){

  player.pause();
  player.src="";
  overlay.style.display="none";

  document.body.style.position="";
  document.body.style.top="";
  document.body.style.width="";

  window.scrollTo(0, scrollY);

  document.querySelectorAll(".videos video").forEach(v=>{
    v.muted=true;
    v.play().catch(()=>{});
  });

  text1.innerText="tap for sound";
  text2.innerText="tap for sound";
}

/* CLOSE EVENTS */
overlay.onclick=e=>{ if(e.target===overlay) closeVideo(); };

document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeVideo();
});

/* SWIPE */
let startY=0;
overlay.addEventListener("touchstart",e=>startY=e.touches[0].clientY,{passive:true});
overlay.addEventListener("touchmove",e=>{
  if(e.touches[0].clientY-startY>80) closeVideo();
},{passive:true});

/* VISIBILITY */
document.addEventListener("visibilitychange",()=>{
  document.querySelectorAll("video").forEach(v=>{
    document.hidden ? v.pause() : v.play().catch(()=>{});
  });
});

/* DISABLE DRAG */
document.querySelectorAll("img").forEach(img=>{
  img.addEventListener("dragstart",e=>e.preventDefault());
});

</script>

</body>
</html>
