<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: #000;
}

/* ===== Banner wrapper (controls size) ===== */
.banner {
  position: relative;
  width: 100%;
  max-width: 1400px;   /* prevents huge banner on desktop */
  margin: 0 auto;      /* centers it */
}

/* ===== Banner image (keeps proportions) ===== */
.banner img {
  width: 100%;
  height: auto;        /* prevents stretching */
  display: block;
}

/* ===== Logo inside banner ===== */
.banner-logo {
  position: absolute;
  left: 5%;
  top: 50%;
  transform: translateY(-50%);

  height: 8%;          /* relative to banner */
  min-height: 30px;
  max-height: 60px;

  width: auto;
  cursor: pointer;
}

/* ===== Mobile adjustments ===== */
@media (max-width: 768px) {

  .banner {
    max-width: 100%;
  }

  .banner-logo {
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    height: 12%;
    max-height: 50px;
  }
}

</style>
</head>

<body>

<div class="banner">
  <img src="banner.png" alt="banner">

  <a href="index.html">
    <img src="bannerlogo.png" class="banner-logo" alt="logo">
  </a>
</div>

</body>
