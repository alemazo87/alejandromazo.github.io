<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== DESKTOP (UNCHANGED) ===== */
@media (min-width: 901px) {
/* KEEP YOUR ORIGINAL DESKTOP CODE HERE */
}

/* ===== MOBILE REELS ===== */
@media (max-width: 900px) {

    /* ===== BANNER ===== */
    .banner img {
        width: 100%;
        height: auto;
        display: block;
    }

    .header {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        align-items: center;
    }

    .header img { width: 40px; }

    .header span {
        font-size: 16px;
        text-shadow: 0 5px 20px rgba(0,0,0,1);
    }

    /* ===== BIG LOGO ===== */
    .center-logo {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 95vw;
        opacity: 0.15;
        z-index: 0;
        pointer-events: none;
    }

    /* ===== CENTER TEXT ===== */
    .center-text {
        text-align: center;
        padding: 40px 20px;
        z-index: 2;
        position: relative;
    }

    .center-text p {
        font-size: 20px;
    }

    .btn {
        border: 2px solid white;
        padding: 10px 25px;
        margin: 10px;
        display: inline-block;
    }

    /* ===== REELS CONTAINER ===== */
    .reels {
        height: 100vh;
        overflow-y: scroll;
        scroll-snap-type: y mandatory;
    }

    .reel {
        height: 100vh;
        scroll-snap-align: start;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .reel video {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    /* PLAY BUTTON */
    .play-btn {
        position: absolute;
        font-size: 60px;
        color: white;
        opacity: 0.7;
        z-index: 3;
    }

}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
    <img src="banner.jpg">

    <div class="header">
        <img src="logo.png">
        <span>ALEJANDRO MAZO</span>
    </div>
</div>

<!-- BIG LOGO -->
<img src="logo.png" class="center-logo">

<!-- TEXT -->
<div class="center-text">
    <p>
        action sports and concerts<br>
        videographer and photographer
    </p>

    <a href="#work" class="btn">SEE MEDIA</a>
    <a href="#contact" class="btn">CONTACT</a>
</div>

<!-- REELS -->
<div class="reels">

    <div class="reel">
        <video playsinline loop>
            <source src="video2.mp4" type="video/mp4">
        </video>
        <div class="play-btn">▶</div>
    </div>

    <div class="reel">
        <video playsinline loop>
            <source src="reel.mp4" type="video/mp4">
        </video>
        <div class="play-btn">▶</div>
    </div>

</div>

<script>

/* TAP TO PLAY WITH SOUND + AUTO PAUSE OTHERS */

const reels = document.querySelectorAll(".reel");

reels.forEach(reel => {

    const video = reel.querySelector("video");
    const btn = reel.querySelector(".play-btn");

    reel.addEventListener("click", () => {

        reels.forEach(r => {
            const v = r.querySelector("video");
            v.pause();
            v.muted = true;
        });

        video.muted = false;
        video.play();

        document.querySelectorAll(".play-btn").forEach(b => b.style.display = "none");
    });

});

</script>

</body>
</html>
