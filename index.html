<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body {
  background:black;
  overflow-x:hidden;
  user-select:none;
}

/* BANNER */
.banner {
  width:100%;
  position:relative;
}

.banner img:first-child {
  width:100%;
  height:auto;
  display:block;
}

/* MOBILE BANNER */
@media (max-width:768px){
  .banner img:first-child {
    content:url("banner.jpg");
  }
}

/* BANNER LOGO (TRUE SIZE) */
.bannerlogo {
  position:absolute;
  bottom:20px;
  left:20px;
  height:auto;
  width:auto;
  max-width:140px;
}

/* BACKGROUND LOCK (TITLE + LOGO) */
.bg-lock {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-1;
  pointer-events:none;
}

.bg-title {
  position:absolute;
  top:80px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  opacity:0.3;
}

.bg-logo {
  position:absolute;
  top:140px; /* closer to title */
  left:50%;
  transform:translateX(-50%);
  width:48%; /* slightly smaller */
  opacity:0.3;
}

/* VIDEOS */
.videos {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:120px;
}

.video-box {
  position:relative;
}

video {
  width:230px;
  border-radius:12px;
}

/* DESCRIPTION */
.description {
  width:320px;
  max-width:90%;
}

/* GLASS TEXT */
.glass {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.1);
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
}

/* BUTTONS */
.buttons {
  text-align:center;
  margin-top:25px;
}

.btn {
  margin:10px;
  padding:14px 28px;
  border:1px solid white;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover {
  background:white;
  color:black;
  transform:scale(1.08);
}

/* GALLERY */
.gallery {
  display:flex;
  justify-content:center;
  gap:25px;
  margin:80px 0;
  flex-wrap:wrap;
}

.left,.right {
  width:250px;
  max-width:100%;
}

.middle {
  display:flex;
  flex-direction:column;
  gap:20px;
  width:380px;
  max-width:100%;
}

.gallery img {
  width:100%;
  height:auto;
  display:block;
}

/* MOBILE */
@media (max-width:768px){

  .videos {
    flex-direction:column;
    margin-top:140px;
  }

  video {
    display:none;
  }

  .video-box {
    width:250px;
    height:400px;
    background-size:cover;
    background-position:center;
  }

  .video-box:nth-child(1){
    background-image:url("reelminiature.png");
  }

  .video-box:nth-child(3){
    background-image:url("video2miniature.png");
  }

  .gallery {
    flex-direction:column;
    align-items:center;
  }

  .bg-title { width:80%; }
  .bg-logo { width:65%; top:120px; }
}

</style>
</head>

<body>

<!-- LOCKED BACKGROUND -->
<div class="bg-lock">
  <img src="title.png" class="bg-title">
  <img src="logo.png" class="bg-logo">
</div>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">
  <img src="bannerlogo.png" class="bannerlogo">
</div>

<!-- VIDEOS + DESCRIPTION -->
<div class="videos">

  <div class="video-box">
    <video id="v1" muted loop autoplay playsinline>
      <source src="reel.mp4" type="video/mp4">
    </video>
    <div class="glass" onclick="toggleSound('v1',this)">tap for sound</div>
  </div>

  <img src="description.png" class="description">

  <div class="video-box">
    <video id="v2" muted loop autoplay playsinline>
      <source src="video2.mp4" type="video/mp4">
    </video>
    <div class="glass" onclick="toggleSound('v2',this)">tap for sound</div>
  </div>

</div>

<!-- BUTTONS -->
<div class="buttons">
  <a href="work.html" class="btn" onclick="clickSound()">MY WORK</a>
  <a href="contact.html" class="btn" onclick="clickSound()">CONTACT</a>
</div>

<!-- GALLERY -->
<div class="gallery">

  <div class="left">
    <img src="image4.jpg">
  </div>

  <div class="middle">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="right">
    <img src="image1.jpg">
  </div>

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

document.addEventListener("contextmenu", e=>e.preventDefault());

function toggleSound(id,el){
  let v=document.getElementById(id);
  if(v.muted){
    v.muted=false;
    el.innerText="tap to mute";
  } else {
    v.muted=true;
    el.innerText="tap for sound";
  }
}

function clickSound(){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
}

</script>

</body>
</html>
