<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: #000;
}

/* Banner */
.banner {
  position: relative;
  width: 100%;
}

.banner img {
  width: 100%;
  height: auto;
  display: block;
}

/* LOGO — controlled properly */
.banner-logo {
  position: absolute;
  left: 5%;
  top: 50%;
  transform: translateY(-50%);

  height: 6vw;        /* responsive size */
  max-height: 60px;   /* prevents it from being huge */
  min-height: 30px;   /* prevents it from being tiny */

  width: auto;
  cursor: pointer;
}

/* Mobile adjustment */
@media (max-width: 768px) {
  .banner-logo {
    height: 10vw;
    max-height: 50px;
  }
}
</style>
</head>

<body>

<div class="banner">
  <img src="banner.png" alt="banner">

  <a href="index.html">
    <img src="bannerlogo.png" class="banner-logo" alt="logo">
  </a>
</div>

</body>
