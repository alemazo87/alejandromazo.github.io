<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Videographer & Photographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

/* ===== RESET ===== */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
}

/* ===== BANNER ===== */
.banner {
    height: 100vh;
    width: 100%;
    background: url('banner.jpg') center/cover no-repeat;
    position: relative;
}

/* ===== HEADER ===== */
.header {
    position: absolute;
    bottom: 30px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
}

.header.fixed {
    position: fixed;
    top: 20px;
    right: 40px;
}

.header img {
    width: 42px;
    filter: drop-shadow(0 6px 20px rgba(0,0,0,0.8));
}

.header span {
    font-size: 22px;
    text-shadow: 0 6px 20px rgba(0,0,0,0.8);
}

/* ===== HERO ===== */
.hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== CENTER LOGO (FIXED BACKGROUND) ===== */
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw;
    max-width: 900px;
    opacity: 0.15;
    z-index: 0;
    pointer-events: none;
}

/* ===== CENTER TEXT ===== */
.center-text {
    text-align: center;
    z-index: 2;
}

.center-text p {
    font-size: clamp(14px, 1.5vw, 18px);
    margin-bottom: 25px;
}

/* ===== BUTTON ===== */
.btn {
    border: 2px solid white;
    padding: 12px 28px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}
.btn:active {
    transform: scale(0.9);
    background: white;
    color: black;
}

/* ===== VIDEOS ===== */
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 18vw;
    max-width: 300px;
    z-index: 2;
}

.left {
    left: calc(50% - 380px);
}

.right {
    right: calc(50% - 380px);
}

.side video {
    width: 100%;
    height: auto;
    border-radius: 16px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.7);
}

/* ===== GRID ===== */
.grid {
    position: relative;
    z-index: 2;
    display: flex;
    gap: 2vw;
    padding: 6vw;
    align-items: flex-start;
}

.left-img,
.right-img {
    width: 25%;
    height: auto;
    object-fit: contain;
    border-radius: 14px;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 2vw;
}

.middle img {
    width: 100%;
    height: auto;
    object-fit: contain;
    border-radius: 14px;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {

    .grid {
        flex-direction: column;
        padding: 40px;
    }

    .left-img,
    .right-img,
    .middle {
        width: 100%;
    }

    .side {
        display: none;
    }

    .center-logo {
        width: 80vw;
    }
}

</style>
</head>

<body>

<!-- ===== BANNER ===== -->
<section class="banner">
    <div class="header" id="header">
        <img src="logo.png">
        <span>Alejandro Mazo</span>
    </div>
</section>

<!-- ===== HERO ===== -->
<section class="hero">

    <!-- FIXED LOGO -->
    <img src="logo.png" class="center-logo">

    <!-- LEFT VIDEO -->
    <div class="side left">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <!-- RIGHT VIDEO -->
    <div class="side right">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <!-- TEXT -->
    <div class="center-text">
        <p>
            Action sports and concerts<br>
            videographer and photographer
        </p>
        <a href="#work" class="btn">SEE MEDIA</a>
    </div>

</section>

<!-- ===== GRID ===== -->
<section class="grid" id="work">

    <img src="image1.jpg" class="left-img">

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <img src="image4.jpg" class="right-img">

</section>

<script>
window.addEventListener("scroll", function() {
    const header = document.getElementById("header");
    if (window.scrollY > window.innerHeight - 100) {
        header.classList.add("fixed");
    } else {
        header.classList.remove("fixed");
    }
});
</script>

</body>
</html>
