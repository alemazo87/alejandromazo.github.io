<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* ========= GLOBAL ========= */

@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron, sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  user-select:none;
}

/* ========= AUDIO ========= */
audio{ display:none; }

/* ========= HEADER ========= */

.header{
  position:relative;
  width:100%;
  height:60vh;
}

.header img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* banner logo */
.banner-logo{
  position:fixed;
  top:20px;
  left:40px;
  width:140px;
  z-index:1000;
  cursor:pointer;
}

.banner-logo img{
  width:100%;
  object-fit:contain;
}

/* ========= FIXED BACKGROUND ========= */

.bg-layer{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:1;
  pointer-events:none;
  text-align:center;
}

.title-img{
  width:60vw;
  max-width:700px;
  opacity:0.3;
}

.logo-img{
  width:30vw;
  max-width:400px;
  margin-top:20px;
  opacity:0.3;
}

/* ========= CONTENT ========= */

.content{
  position:relative;
  z-index:2;
}

/* description centered using logo reference */
.description{
  display:flex;
  justify-content:center;
  margin-top:65vh;
}

.description img{
  width:65vw;
  max-width:700px;
  object-fit:contain;
}

/* ========= BUTTONS ========= */

.buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:40px;
}

.btn{
  padding:12px 30px;
  border:1px solid rgba(255,255,255,0.3);
  cursor:pointer;
  transition:0.25s ease;
}

.btn:hover{
  background:rgba(255,255,255,0.1);
  transform:translateY(-2px);
}

/* ========= VIDEO SECTION ========= */

.video-section{
  margin-top:200px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
}

.video-box{
  width:70%;
  max-width:900px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:auto;
  object-fit:contain;
}

/* overlay text */
.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:11px;
  letter-spacing:2px;
  opacity:0.7;
  white-space:nowrap;
  pointer-events:none;
  text-shadow:0 0 10px rgba(0,0,0,0.8);
}

/* ========= GALLERY ========= */

.gallery{
  margin-top:120px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.gallery img{
  width:90%;
  max-width:900px;
  object-fit:contain;
}

/* ========= MOBILE ========= */

@media (max-width:900px){

  .header{
    height:40vh;
  }

  .header img{
    content:url("bannerMOBILE.jpg");
  }

  .banner-logo{
    left:20px;
    width:110px;
  }

  .title-img{
    width:80vw;
  }

  .logo-img{
    width:60vw;
  }

  .description{
    margin-top:55vh;
  }

  .description img{
    width:85vw;
  }

  .buttons{
    flex-direction:column;
    align-items:center;
  }

  .video-box{
    width:90%;
  }

  .gallery img{
    width:95%;
  }
}

</style>
</head>

<body oncontextmenu="return false">

<audio id="clickSound" src="click.mp3"></audio>

<!-- ========= HEADER ========= -->
<div class="header">
  <img src="banner.png">
</div>

<div class="banner-logo" onclick="goHome()">
  <img src="bannerlogo.png">
</div>

<!-- ========= FIXED BACKGROUND ========= -->
<div class="bg-layer">
  <img src="title.png" class="title-img">
  <img src="logo.png" class="logo-img">
</div>

<!-- ========= CONTENT ========= -->
<div class="content">

  <div class="description">
    <img src="description.png">
  </div>

  <div class="buttons">
    <div class="btn" onclick="navigate('work.html')">MY WORK</div>
    <div class="btn" onclick="navigate('contact.html')">CONTACT</div>
  </div>

  <!-- VIDEO -->
  <div class="video-section">

    <div class="video-box">
      <video src="reel.mp4" autoplay muted loop playsinline></video>
      <div class="video-text">TAP FOR SOUND</div>
    </div>

    <div class="video-box">
      <video src="video2.mp4" autoplay muted loop playsinline></video>
      <div class="video-text">TAP FOR SOUND</div>
    </div>

  </div>

  <!-- GALLERY -->
  <div class="gallery">
    <img src="image1.jpg">
    <img src="image5.jpg">
    <img src="image2.jpg">
    <img src="image3.jpg">
    <img src="image4.jpg">
  </div>

</div>

<script>

/* SOUND */
const clickSound = document.getElementById("clickSound");

function playClick(){
  clickSound.currentTime = 0;
  clickSound.play();
}

function navigate(url){
  playClick();
  setTimeout(()=>{ window.location.href = url; },150);
}

function goHome(){
  playClick();
  setTimeout(()=>{ window.location.href = "index.html"; },150);
}

/* VIDEO TOGGLE */
document.querySelectorAll(".video-box").forEach(box=>{
  const video = box.querySelector("video");
  const text = box.querySelector(".video-text");

  box.addEventListener("click",()=>{
    if(video.muted){
      video.muted = false;
      text.innerText = "TAP TO MUTE";
    } else {
      video.muted = true;
      text.innerText = "TAP FOR SOUND";
    }
  });
});

</script>

</body>
</html>
