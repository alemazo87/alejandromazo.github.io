<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo</title>

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

/* FULLSCREEN BANNER */
.banner {
    position: absolute;
    inset: 0;
    background: url('banner.jpg') center/cover no-repeat;
    z-index: 1;
    animation: shrinkBanner 0.6s ease forwards;
}

/* SHRINK TO TOP */
@keyframes shrinkBanner {
    0% { height: 100vh; }
    100% { height: 120px; }
}

/* TOP BAR */
.topbar {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 120px;
    display: flex;
    align-items: center;
    padding: 0 40px;
    z-index: 10;
}

.topbar img {
    width: 200px;
}

.topbar h1 {
    font-size: 100px;
    margin: 0 0 0 20px;
    text-shadow: 0 10px 30px rgba(0,0,0,0.8);
}

/* CENTER LOGO */
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw;
    max-width: 800px;
    opacity: 1;
    z-index: 0;
    animation: fadeLogo 0.6s ease forwards 0.6s;
}

@keyframes fadeLogo {
    to { opacity: 0.5; }
}

/* CENTER CONTENT */
.center-content {
    position: relative;
    z-index: 5;
    text-align: center;
    margin-top: 200px;
}

.center-content p {
    font-size: 20px;
    margin-bottom: 20px;
}

.btn {
    border: 2px solid white;
    padding: 12px 30px;
    color: white;
    text-decoration: none;
}

/* VIDEOS */
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 18vw;
    max-width: 300px;
    z-index: 5;
}

.left { left: 5%; }
.right { right: 5%; }

.side video {
    width: 100%;
    border-radius: 15px;
}

/* GRID */
.grid {
    display: flex;
    gap: 20px;
    padding: 100px 40px;
}

.left-img,
.right-img {
    width: 25%;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

img {
    width: 100%;
    height: auto;
}

/* MOBILE */
@media (max-width: 900px) {

    .topbar h1 {
        font-size: 40px;
    }

    .grid {
        flex-direction: column;
    }

    .left-img,
    .right-img,
    .middle {
        width: 100%;
    }

    .side {
        display: none;
    }
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
    <img src="logo.png">
    <h1>ALEJANDRO MAZO</h1>
</div>

<!-- HERO -->
<section class="hero">

    <div class="banner"></div>

    <img src="logo.png" class="center-logo">

    <div class="side left">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="side right">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="center-content">
        <p>
            action sports and concerts<br>
            videographer and photographer
        </p>
        <a href="#work" class="btn">SEE MEDIA</a>
    </div>

</section>

<!-- GRID -->
<section class="grid" id="work">

    <div class="left-img">
        <img src="image1.jpg">
    </div>

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <div class="right-img">
        <img src="image4.jpg">
    </div>

</section>

<script>
document.querySelector('.topbar').onclick = () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
};
</script>

</body>
</html>
