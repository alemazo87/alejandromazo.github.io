<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Videographer & Photographer</title>

<style>

/* ===== RESET ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* ===== BANNER ===== */
.banner {
    width: 100%;
    height: 220px;
    overflow: hidden;
}
.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 90vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: black;
    overflow: hidden;
}

/* BIG LOGO (BACKGROUND FLOATING) */
.center-logo {
    position: absolute;
    width: 500px;
    opacity: 0.06;
    z-index: 0;
}

/* SIDE MEDIA */
.hero-media {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 1;
}
.hero-media.left { left: 5%; }
.hero-media.right { right: 5%; }

.hero-media img {
    width: 240px;
    height: 340px;
    object-fit: cover;
    border-radius: 12px;
}

/* CENTER TEXT */
.hero-text {
    position: relative;
    z-index: 2;
    text-align: center;
}

/* TITLE + SMALL LOGO */
.title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
}

.small-logo {
    width: 45px;
}

/* TEXT */
.hero-text h1 {
    font-size: 48px;
    margin: 0;
}
.hero-text p {
    margin: 10px 0 20px;
}

/* BUTTON */
.btn {
    border: 2px solid white;
    padding: 10px 25px;
    text-decoration: none;
    color: white;
    display: inline-block;
}
.btn:hover {
    background: white;
    color: black;
}

/* ===== IMAGE GRID BELOW ===== */
.image-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    padding: 80px 120px;
}

/* LEFT */
.left-img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 12px;
}

/* MIDDLE */
.middle {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 20px;
}
.middle img {
    width: 100%;
    height: 300px;
    object-fit: cover;
    border-radius: 12px;
}

/* RIGHT */
.right-img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 12px;
}

</style>
</head>

<body>

<div class="banner">
    <img src="banner.jpg">
</div>

<section class="hero">

    <img src="logo.png" class="center-logo">

    <div class="hero-media left">
        <img src="image1.jpg">
    </div>

    <div class="hero-media right">
        <img src="image4.jpg">
    </div>

    <div class="hero-text">

        <div class="title-row">
            <img src="logo.png" class="small-logo">
            <h1>ALEJANDRO MAZO</h1>
        </div>

        <p>Videographer & Photographer</p>

        <a href="#work" class="btn">View Work</a>

    </div>

</section>

<section class="image-grid" id="work">

    <img src="image1.jpg" class="left-img">

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <img src="image4.jpg" class="right-img">

</section>

</body>
</html>
