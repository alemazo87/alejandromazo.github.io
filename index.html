<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face { font-family: Orbitron; src: url("Orbitron.ttf"); }

*{margin:0;padding:0;box-sizing:border-box;font-family:Orbitron;}
body{background:black;color:white;overflow-x:hidden;}

/* ===== BANNER ===== */
.banner{position:relative;width:100%;}
.banner img{width:100%;display:block;}
@media(max-width:768px){
.banner img{content:url("banner.jpg");}
}

/* ===== BANNER LOGO ===== */
.bannerlogo{
position:absolute;
left:15px;
top:50%;
transform:translateY(-50%);
width:200%;
max-width:280px;
}

/* ===== FIXED LOGO ===== */
.fixedlogo{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
width:100px;
display:none;
z-index:100;
}

/* ===== LOCKED BG ===== */
.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}
.bg img{
position:absolute;
left:50%;
transform:translateX(-50%);
opacity:.3;
}
.bg-title{top:120px;width:70%;}
.bg-logo{top:200px;width:50%;}

/* ===== CENTER ===== */
.center{text-align:center;margin-top:120px;}
.description{width:320px;max-width:90%;}

/* ===== VIDEOS ===== */
.videos{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

video{
width:240px;
border-radius:12px;
}

.video-box{position:relative;}

.glass{
position:absolute;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:6px 12px;
border-radius:10px;
font-size:12px;
cursor:pointer;
}

/* ===== BUTTONS ===== */
.buttons{margin-top:20px;}

.btn{
display:inline-block;
margin:10px;
padding:12px 22px;
border:1px solid white;
color:white;
text-decoration:none;
transition:.3s;
}
.btn:hover{background:white;color:black;transform:scale(1.08);}

/* ===== GRID ===== */
.gallery{
margin:80px auto;
width:90%;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.side{width:260px;}
.stack{display:flex;flex-direction:column;gap:20px;width:320px;}

.gallery img{
width:100%;
border-radius:10px;
}

/* ===== MOBILE VIDEO ===== */
@media(max-width:768px){

video{display:none;}

.thumb{
width:130px;
height:220px;
border-radius:12px;
background-size:cover;
background-position:center;
margin:10px;
}

.videos{flex-direction:row;flex-wrap:wrap;justify-content:center;}
.gallery{flex-direction:column;align-items:center;}
}

/* ===== FULLSCREEN VIDEO ===== */
.fullscreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

.fullscreen video{
width:100%;
height:100%;
object-fit:contain;
}
</style>
</head>

<body>

<div class="bg">
<img src="title.png" class="bg-title">
<img src="logo.png" class="bg-logo">
</div>

<div class="banner">
<img src="banner.png">
<img src="bannerlogo.png" class="bannerlogo">
</div>

<img src="bannerlogo.png" class="fixedlogo" id="fixedLogo">

<div class="center">

<img src="description.png" class="description">

<div class="videos">

<div class="video-box">
<video id="v1" muted autoplay loop playsinline>
<source src="reel.mp4">
</video>
<div class="glass" onclick="toggleSound('v1',this)">tap for sound</div>
</div>

<div class="video-box">
<video id="v2" muted autoplay loop playsinline>
<source src="video2.mp4">
</video>
<div class="glass" onclick="toggleSound('v2',this)">tap for sound</div>
</div>

<div class="thumb" style="background-image:url('reelminiature.png')" onclick="openVideo('reel.mp4')"></div>
<div class="thumb" style="background-image:url('video2miniature.png')" onclick="openVideo('video2.mp4')"></div>

</div>

<div class="buttons">
<a href="work.html" class="btn" onclick="clickSound()">MY WORK</a>
<a href="contact.html" class="btn" onclick="clickSound()">CONTACT</a>
</div>

</div>

<div class="gallery">
<div class="side"><img src="image4.jpg"></div>
<div class="stack">
<img src="image2.jpg">
<img src="image3.jpg">
</div>
<div class="side"><img src="image1.jpg"></div>
</div>

<div class="fullscreen" id="fullscreen" onclick="closeVideo()">
<video id="fullVideo" controls autoplay></video>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
document.addEventListener("contextmenu",e=>e.preventDefault());

window.addEventListener("scroll",()=>{
document.getElementById("fixedLogo").style.display="block";
});

function toggleSound(id,el){
let v=document.getElementById(id);
if(v.muted){v.muted=false;el.innerText="tap to mute";}
else{v.muted=true;el.innerText="tap for sound";}
}

function clickSound(){
let s=document.getElementById("clickSound");
s.currentTime=0;s.play();
}

function openVideo(src){
let v=document.getElementById("fullVideo");
v.src=src;
document.getElementById("fullscreen").style.display="flex";
}

function closeVideo(){
let v=document.getElementById("fullVideo");
v.pause();
v.src="";
document.getElementById("fullscreen").style.display="none";
}
</script>

</body>
</html>
