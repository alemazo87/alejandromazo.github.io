<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alejandro Mazo</title>

  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      background: black;
      color: white;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1519125323398-675f0ddb6308') center/cover;
      text-align: center;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      top: 0;
      left: 0;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3.5rem;
      letter-spacing: 2px;
    }

    p {
      color: #ccc;
      margin-top: 10px;
      font-size: 1.2rem;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 28px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }
  </style>
</head>

<body>

<div class="hero">
  <div class="overlay"></div>
  <div class="content">
    <h1>ALEJANDRO MAZO</h1>
    <p>Cinematic photographer & filmmaker</p>
    <a href="#" class="btn">View Work</a>
  </div>
</div>

</body>
</html>
