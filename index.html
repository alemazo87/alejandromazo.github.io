<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* FONT */
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body {
  background:black;
  overflow-x:hidden;
  user-select:none;
}

/* BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

.bg img {
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  opacity:0.3;
}

.bg-title {
  top:12%;
  width:70%;
  z-index:2;
}

.bg-logo {
  top:26%;
  width:56%;
  z-index:1;
}

/* BANNER (FIXED) */
.banner {
  width:100%;
  overflow:hidden;
}

.banner img {
  width:100%;
  height:auto;
  display:block;
  object-fit:contain;
}

/* MOBILE BANNER */
@media (max-width:768px){
  .banner img {
    content:url("banner.jpg");
  }
}

/* FIXED LOGO */
.bannerlogo {
  position:fixed;
  bottom:20px;
  left:20px;
  width:120px;
  z-index:100;
}

/* CENTER */
.center-section {
  text-align:center;
  margin-top:40px;
}

/* VIDEOS */
.videos {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
}

.video-box {
  position:relative;
}

video {
  width:230px;
  border-radius:12px;
  display:block;
}

/* DESCRIPTION */
.description {
  width:360px;
  max-width:90%;
}

/* GLASS */
.glass {
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  backdrop-filter:blur(10px);
  background:rgba(255,255,255,0.1);
  padding:6px 12px;
  border-radius:10px;
  font-size:12px;
  cursor:pointer;
}

/* BUTTONS */
.buttons {
  margin-top:25px;
}

.btn {
  margin:10px;
  padding:14px 28px;
  border:1px solid white;
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.btn:hover {
  background:white;
  color:black;
  transform:scale(1.08);
}

/* GALLERY */
.gallery {
  display:flex;
  justify-content:center;
  gap:25px;
  margin:80px 0;
}

.left,.right {
  width:250px;
}

.middle {
  display:flex;
  flex-direction:column;
  gap:20px;
  width:380px;
}

.gallery img {
  width:100%;
}

/* MOBILE */
@media (max-width:768px){

  .videos {
    flex-direction:column;
  }

  video {
    display:none;
  }

  .video-box {
    width:250px;
    height:400px;
    background-size:cover;
  }

  .video-box:nth-child(1){
    background-image:url("reelminiature.png");
  }

  .video-box:nth-child(3){
    background-image:url("video2miniature.png");
  }

  .gallery {
    flex-direction:column;
    align-items:center;
  }
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <img src="logo.png" class="bg-logo">
  <img src="title.png" class="bg-title">
</div>

<!-- FIXED LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">
</div>

<!-- CENTER -->
<div class="center-section">

  <div class="videos">

    <div class="video-box">
      <video id="v1" muted loop autoplay playsinline>
        <source src="reel.mp4" type="video/mp4">
      </video>
      <div class="glass" onclick="toggleSound('v1',this)">tap for sound</div>
    </div>

    <img src="description.png" class="description">

    <div class="video-box">
      <video id="v2" muted loop autoplay playsinline>
        <source src="video2.mp4" type="video/mp4">
      </video>
      <div class="glass" onclick="toggleSound('v2',this)">tap for sound</div>
    </div>

  </div>

  <div class="buttons">
    <a href="work.html" class="btn" onclick="clickSound()">MY WORK</a>
    <a href="contact.html" class="btn" onclick="clickSound()">CONTACT</a>
  </div>

</div>

<!-- GALLERY -->
<div class="gallery">

  <div class="left">
    <img src="image4.jpg">
  </div>

  <div class="middle">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="right">
    <img src="image1.jpg">
  </div>

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu", e=>e.preventDefault());

/* PARALLAX */
window.addEventListener("scroll",()=>{
  let y=window.scrollY;
  document.querySelector(".bg-title").style.transform =
    "translate(-50%,"+y*0.15+"px)";
  document.querySelector(".bg-logo").style.transform =
    "translate(-50%,"+y*0.08+"px)";
});

/* VIDEO TOGGLE */
function toggleSound(id,el){
  let v=document.getElementById(id);
  if(v.muted){
    v.muted=false;
    el.innerText="tap to mute";
  } else {
    v.muted=true;
    el.innerText="tap for sound";
  }
}

/* CLICK SOUND */
function clickSound(){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
}

</script>

</body>
</html>
