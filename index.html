<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face { font-family: Orbitron; src: url("Orbitron.ttf"); }

*{margin:0;padding:0;box-sizing:border-box;font-family:Orbitron;}
body{background:black;color:white;overflow-x:hidden;}

/* BANNER */
.banner{position:relative;}
.banner img{width:100%;display:block;}

/* LOGO OVER BANNER */
.bannerlogo{
position:absolute;
top:50%;
left:20px;
transform:translateY(-50%);
width:200%;
max-width:300px;
}

/* FIXED LOGO */
.fixedlogo{
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
width:100px;
display:none;
z-index:10;
}

/* BACKGROUND LOCK */
.bg{
position:fixed;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}
.bg img{
position:absolute;
left:50%;
transform:translateX(-50%);
opacity:.3;
}
.bg-title{top:120px;width:70%;}
.bg-logo{top:200px;width:50%;}

/* CENTER */
.center{text-align:center;margin-top:120px;}
.description{width:300px;max-width:90%;}

/* VIDEOS */
.videos{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}
video{width:240px;border-radius:10px;}

/* BUTTONS */
.btn{
display:inline-block;
margin:10px;
padding:12px 20px;
border:1px solid white;
color:white;
text-decoration:none;
transition:.3s;
}
.btn:hover{background:white;color:black;}

/* GRID */
.gallery{
margin:60px auto;
width:90%;
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}
.side{width:250px;}
.stack{display:flex;flex-direction:column;gap:20px;width:300px;}
.gallery img{width:100%;}

/* MOBILE */
@media(max-width:768px){
.banner img{content:url("banner.jpg");}
.videos{flex-direction:column;}
video{width:90%;}
.gallery{flex-direction:column;align-items:center;}
}

</style>
</head>

<body>

<div class="bg">
<img src="title.png" class="bg-title">
<img src="logo.png" class="bg-logo">
</div>

<div class="banner">
<img src="banner.png">
<img src="bannerlogo.png" class="bannerlogo">
</div>

<img src="bannerlogo.png" class="fixedlogo" id="fixedLogo">

<div class="center">

<img src="description.png" class="description">

<div class="videos">
<video muted autoplay loop><source src="reel.mp4"></video>
<video muted autoplay loop><source src="video2.mp4"></video>
</div>

<a href="work.html" class="btn" onclick="clickSound()">MY WORK</a>
<a href="contact.html" class="btn" onclick="clickSound()">CONTACT</a>

</div>

<div class="gallery">
<div class="side"><img src="image4.jpg"></div>
<div class="stack">
<img src="image2.jpg">
<img src="image3.jpg">
</div>
<div class="side"><img src="image1.jpg"></div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
document.addEventListener("contextmenu",e=>e.preventDefault());
window.addEventListener("scroll",()=>{
document.getElementById("fixedLogo").style.display="block";
});
function clickSound(){
let s=document.getElementById("clickSound");
s.currentTime=0;s.play();
}
</script>

</body>
</html>
