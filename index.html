<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  z-index:3;
}

.banner img{
  width:100%;
  display:block;
}

.banner-logo{
  position:absolute;
  left:20px;
  top:50%;
  transform:translateY(-50%);
  height:26px;
  width:auto;
}

/* ===== BACKGROUND LAYER ===== */
.bg-layer{
  position:fixed;
  width:100%;
  text-align:center;
  pointer-events:none;
  z-index:0;
}

.title img{
  width:600px;
  opacity:0.25;
}

.logo img{
  width:520px;
  margin-top:20px;
  opacity:0.2;
}

/* ===== MAIN ===== */
.main{
  margin-top:220px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
  position:relative;
  z-index:2;
}

/* VIDEOS */
.side{
  width:280px;
  position:relative;
}

.side video{
  width:100%;
  border-radius:14px;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

/* CENTER */
.center{
  text-align:center;
}

.center img{
  width:650px;
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== IMAGES ===== */
.images{
  margin-top:140px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:30px;
  padding:0 6%;
}

.center-stack{
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:10px;
}

.images img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
}

/* ===== VIDEO THUMB (hidden on desktop) ===== */
.video-thumb{
  display:none;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .banner-logo{
    height:22px;
    left:15px;
  }

  .bg-layer{
    top:80px;
  }

  .title img{
    width:85%;
  }

  .logo img{
    width:65%;
    margin-top:10px;
  }

  .main{
    flex-direction:column;
    margin-top:140px;
    gap:25px;
  }

  .side{
    display:none;
  }

  .center img{
    width:90%;
    max-width:400px;
  }

  .buttons{
    display:flex;
    justify-content:center;
    gap:10px;
  }

  .btn{
    padding:10px 18px;
    font-size:12px;
  }

  /* SHOW VIDEO THUMBNAILS */
  .video-thumb{
    display:block;
    width:92%;
    margin:20px auto;
    position:relative;
    border-radius:12px;
    overflow:hidden;
  }

  .video-thumb img{
    width:100%;
  }

  .video-thumb span{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0.7;
    font-size:12px;
  }

  .images{
    display:block;
    padding:0 4%;
  }

  .images img{
    margin:14px 0;
  }
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png" alt="">
  </picture>

  <img src="bannerlogo.png" class="banner-logo" alt="">
</div>

<!-- BACKGROUND -->
<div class="bg-layer" id="bg">
  <div class="title">
    <img src="title.png" alt="">
  </div>
  <div class="logo">
    <img src="logo.png" alt="">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="side">
    <video id="reel" loop muted autoplay playsinline>
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="center">
    <img src="description.png" alt="">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

  <div class="side">
    <video id="video2" loop muted autoplay playsinline>
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<!-- MOBILE VIDEO -->
<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png" alt="">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png" alt="">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">
  <div><img src="image4.jpg" alt=""></div>

  <div class="center-stack">
    <img src="image2.jpg" alt="">
    <img src="image3.jpg" alt="">
  </div>

  <div><img src="image1.jpg" alt=""></div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* KEEP BG UNDER BANNER */
const banner = document.querySelector(".banner");
const bg = document.getElementById("bg");

function updateOffset(){
  bg.style.top = banner.offsetHeight + "px";
}
window.addEventListener("load", updateOffset);
window.addEventListener("resize", updateOffset);

/* BUTTON SOUND */
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

/* VIDEO SOUND TOGGLE */
function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");

/* MOBILE VIDEO PLAYER */
function openVideo(src){
  let v=document.createElement("video");
  v.src=src;
  v.controls=true;
  v.autoplay=true;

  v.style.position="fixed";
  v.style.top=0;
  v.style.left=0;
  v.style.width="100%";
  v.style.height="100%";
  v.style.background="#000";
  v.style.zIndex=9999;

  document.body.appendChild(v);

  v.addEventListener("touchstart", (e)=>{
    if(e.target===v) v.remove();
  });
}

</script>

</body>
</html>
