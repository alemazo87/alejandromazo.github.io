<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Videographer & Photographer</title>

<style>

/* ===== RESET ===== /
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/ ===== BANNER ===== /
.banner {
    width: 100%;
    height: 220px;
    overflow: hidden;
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/ ===== HERO ===== /
.hero {
    position: relative;
    background: black;
    padding: 120px 20px;
    text-align: center;
    overflow: hidden;
}

/ BIG CENTER LOGO (BACKGROUND) /
.center-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    opacity: 0.07;
    z-index: 0;
}

/ TEXT /
.hero-text {
    position: relative;
    z-index: 2;
}

.hero-text h1 {
    font-size: 48px;
    margin-bottom: 10px;
    letter-spacing: 2px;
}

.hero-text p {
    font-size: 18px;
    margin-bottom: 20px;
}

/ BUTTON /
.btn {
    border: 2px solid white;
    padding: 10px 25px;
    text-decoration: none;
    color: white;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/ ===== IMAGE GRID ===== /
.image-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    padding: 60px;
}

/ LEFT IMAGE /
.left-img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 12px;
}

/ MIDDLE STACK /
.middle {
    display: grid;
    grid-template-rows: 1fr 1fr;
    gap: 20px;
}

.middle img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    border-radius: 12px;
}

/ RIGHT IMAGE /
.right-img {
    width: 100%;
    height: 500px;
    object-fit: cover;
    border-radius: 12px;
}

/ ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .image-grid {
        grid-template-columns: 1fr;
    }

    .left-img,
    .right-img,
    .middle img {
        height: 300px;
    }
}

</style>
</head>

<body>

<!-- ===== TOP BANNER ===== -->
<div class="banner">
    <img src="banner.jpg" alt="Banner">
</div>

<!-- ===== HERO SECTION ===== -->
<section class="hero">

    <!-- BACKGROUND LOGO -->
    <img src="logo.png" class="center-logo" alt="Logo">

    <!-- TEXT -->
    <div class="hero-text">
        <h1>ALEJANDRO MAZO</h1>
        <p>Videographer & Photographer</p>
        <a href="#work" class="btn">View Work</a>
    </div>

</section>

<!-- ===== WORK GRID ===== -->
<section class="image-grid" id="work">

    <!-- LEFT -->
    <img src="image1.jpg" class="left-img" alt="Work 1">

    <!-- CENTER -->
    <div class="middle">
        <img src="image2.jpg" alt="Work 2">
        <img src="image3.jpg" alt="Work 3">
    </div>

    <!-- RIGHT -->
    <img src="image4.jpg" class="right-img" alt="Work 4">

</section>

</body>
</html>
