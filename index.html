<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  width:100%;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

.banner-logo{
  position:absolute;
  left:40px;
  top:50%;
  transform:translateY(-50%);
  width:100px;
  z-index:10;
}

/* ===== FIXED BACKGROUND FEEL ===== */
.fixed-bg{
  position:fixed;
  top:120px;
  width:100%;
  text-align:center;
  pointer-events:none;
}

.fixed-bg .title img{
  width:600px;
  opacity:0.3;
}

.fixed-bg .logo img{
  width:300px;
  opacity:0.3;
  margin-top:20px;
}

/* ===== MAIN CONTENT ===== */
.main{
  margin-top:200px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
}

/* SIDE VIDEOS */
.side{
  width:220px;
  position:relative;
}

.side video{
  width:100%;
  border-radius:12px;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

/* CENTER */
.center{
  text-align:center;
}

.center img{
  width:600px;
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== IMAGE SECTION ===== */
.images{
  margin-top:120px;
  display:flex;
  justify-content:space-between;
  padding:0 5%;
}

.col{
  display:flex;
  flex-direction:column;
  gap:15px;
  align-items:center;
}

.images img{
  width:220px;
  border-radius:10px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .banner img{
    content:url("bannerMOBILE.jpg");
  }

  .banner-logo{
    left:50%;
    transform:translate(-50%,-50%);
  }

  .fixed-bg{
    position:static;
  }

  .main{
    flex-direction:column;
    margin-top:40px;
  }

  .side{
    display:none;
  }

  .images{
    flex-direction:column;
    align-items:center;
  }

  .images img{
    width:90%;
  }
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">
  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- FIXED BACKGROUND -->
<div class="fixed-bg">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="side">
    <video id="reel" loop muted>
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="center">
    <img src="description.png">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

  <div class="side">
    <video id="video2" loop muted>
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<!-- IMAGES -->
<div class="images">
  <div class="col">
    <img src="image4.jpg">
  </div>

  <div class="col">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="col">
    <img src="image1.jpg">
  </div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.play().catch(()=>{});

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");
</script>

</body>
</html>
