<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Videographer & Photographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

/* ===== RESET ===== */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER (ONLY ONE — ALWAYS RIGHT) ===== */
.header {
    position: fixed;
    right: 50px;
    bottom: 40px;

    display: flex;
    align-items: center;
    gap: 12px;

    z-index: 100;
    transition: 0.3s ease;
}

.header.scrolled {
    top: 25px;
    bottom: auto;
}

.header img {
    width: 65px;
    filter: drop-shadow(0 10px 30px rgba(0,0,0,0.9));
}

.header span {
    font-size: 32px;
    text-shadow: 0 10px 30px rgba(0,0,0,0.9);
}

/* ===== BANNER ===== */
.banner {
    width: 100%;
    height: 100vh;
    background: url('banner.jpg') center center / cover no-repeat;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ===== CENTER LOGO (BACKGROUND) ===== */
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 900px;
    max-width: 85vw;

    opacity: 0.08;
    z-index: 0;
    pointer-events: none;
}

/* ===== TEXT ===== */
.hero-text {
    position: relative;
    z-index: 10;
    text-align: center;
}

.hero-text p {
    font-size: 18px;
    margin-bottom: 25px;
}

/* ===== BUTTON ===== */
.btn {
    border: 2px solid white;
    padding: 12px 28px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.btn:active {
    transform: scale(0.9);
    background: white;
    color: black;
}

/* ===== VIDEOS ===== */
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);

    width: 280px;
    z-index: 5;
}

.left {
    left: calc(50% - 420px);
}

.right {
    right: calc(50% - 420px);
}

.side video {
    width: 100%;
    border-radius: 18px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.8);
}

/* ===== GRID ===== */
.grid {
    display: flex;
    gap: 40px;
    padding: 100px 80px;
    align-items: flex-start;
}

.left-img,
.right-img {
    width: 25%;
    height: auto;
    object-fit: contain;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.middle img {
    width: 100%;
    height: auto;
    object-fit: contain;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {

    .grid {
        flex-direction: column;
        padding: 40px;
    }

    .left-img,
    .right-img,
    .middle {
        width: 100%;
    }

    .side {
        display: none;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header" id="header">
    <img src="logo.png">
    <span>Alejandro Mazo</span>
</div>

<!-- BANNER -->
<section class="banner"></section>

<!-- HERO -->
<section class="hero">

    <img src="logo.png" class="center-logo">

    <div class="side left">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="side right">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="hero-text">
        <p>
            Action sports and concerts<br>
            videographer and photographer
        </p>
        <a href="#work" class="btn">SEE MEDIA</a>
    </div>

</section>

<!-- GRID -->
<section class="grid" id="work">

    <img src="image1.jpg" class="left-img">

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <img src="image4.jpg" class="right-img">

</section>

<script>
window.addEventListener("scroll", function() {
    const header = document.getElementById("header");

    if (window.scrollY > window.innerHeight * 0.7) {
        header.classList.add("scrolled");
    } else {
        header.classList.remove("scrolled");
    }
});
</script>

</body>
</html>
