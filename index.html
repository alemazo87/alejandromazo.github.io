<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alejandro Mazo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* CUSTOM FONT */
    @font-face {
      font-family: 'Orbitron';
      src: url('Orbitron.ttf') format('truetype');
    }

    body {
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8%;
      gap: 60px;
    }

    .hero-text {
      flex: 1;
    }

    .hero-text h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 3.5rem;
      letter-spacing: 4px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .hero-text p {
      font-size: 1.2rem;
      color: #aaa;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    .hero-video {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .hero-video video {
      width: 300px;
      height: 533px;
      object-fit: cover;
      border-radius: 12px;
    }

    /* GALLERY */
    .gallery {
      padding: 80px 5%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      transition: 0.4s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    footer {
      padding: 40px;
      text-align: center;
      color: #666;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
        text-align: center;
      }

      .hero-video video {
        width: 220px;
        height: 390px;
      }
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <!-- TEXT -->
  <div class="hero-text">
    <h1>ALEJANDRO MAZO</h1>

    <p>
      Action sports & concerts<br>
      videomaker and photographer
    </p>

    <a href="#work" class="btn">View Work</a>
  </div>

  <!-- VIDEO -->
  <div class="hero-video">
    <video autoplay muted loop playsinline>
      <source src="reel.mp4" type="video/mp4">
    </video>
  </div>

</section>

<!-- GALLERY -->
<section id="work" class="gallery">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
  <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</section>

<footer>
  © Alejandro Mazo
</footer>

</body>
</html>
