<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | FMX Videographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== FLOATING LOGO ===== */
.floating-logo {
    position: fixed;
    top: 10px;
    left: 20px;
    z-index: 999;
    transition: 0.4s;
}

.floating-logo img {
    height: 80px;
}

/* Scroll animation */
.scrolled .floating-logo img {
    transform: scale(0.6);
    opacity: 0.7;
}

/* ===== BANNER ===== */
.banner {
    height: 100vh;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 0 5% 8%;
}

/* TRUE no-crop image */
.banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('banner.jpg') center center no-repeat;
    background-size: contain;
    background-color: black;
}

/* Content */
.banner-content {
    position: relative;
    display: flex;
    align-items: center;
    gap: 20px;
    z-index: 2;
}

.banner-logo {
    height: 120px;
}

.banner h1 {
    font-size: 42px;
    letter-spacing: 6px;
}

/* ===== CENTER BACKGROUND LOGO ===== */
.center-logo {
    position: fixed;
    width: 480px; /* 20% smaller */
    opacity: 0.5;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
}

/* ===== HERO (CENTERED TEXT) ===== */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    position: relative;
    z-index: 2;
}

.hero-text p {
    font-size: 26px;
    line-height: 1.5;
}

.hero-text span {
    display: block;
    font-size: 16px;
    color: #aaa;
    margin-top: 8px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: 2px solid white;
    color: white;
    text-decoration: none;
    display: inline-block;
}

/* ===== VIDEO SECTION ===== */
.video-section {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 60px 20px;
}

video {
    width: 300px;
    border-radius: 10px;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {
    .video-section {
        flex-direction: column;
        align-items: center;
    }

    .banner-logo {
        height: 80px;
    }

    .center-logo {
        width: 250px;
    }
}

</style>
</head>

<body>

<!-- FLOATING LOGO -->
<a href="#" class="floating-logo">
    <img src="logo.png" id="logoAnim">
</a>

<!-- BANNER -->
<section class="banner">
    <div class="banner-content">
        <img src="logo.png" class="banner-logo">
        <h1>ALEJANDRO MAZO</h1>
    </div>
</section>

<!-- CENTER LOGO -->
<img src="logo.png" class="center-logo">

<!-- HERO -->
<section class="hero">
    <div class="hero-text">
        <p>
        action sports and concerts
        <span>videomaker and photographer</span>
        </p>

        <a href="#work" class="btn">View Work</a>
    </div>
</section>

<!-- VIDEOS -->
<section id="work" class="video-section">
    <video autoplay muted loop playsinline>
        <source src="reel.mp4" type="video/mp4">
    </video>

    <video autoplay muted loop playsinline>
        <source src="video2.mp4" type="video/mp4">
    </video>
</section>

<script>
window.addEventListener("scroll", () => {
    document.body.classList.toggle("scrolled", window.scrollY > 30);
});
</script>

</body>
</html>
