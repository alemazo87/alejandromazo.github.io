<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== FADE IN ===== */
body{
  animation:fadeIn 1.2s ease forwards;
  opacity:0;
}
@keyframes fadeIn{
  to{opacity:1;}
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  z-index:3;
}
.banner img{
  width:100%;
  display:block;
}

/* LOGO */
.banner-logo{
  position:absolute;
  left:25px;
  top:50%;
  transform:translateY(-50%);
  height:26px;
}

/* ===== BACKGROUND ===== */
.bg-layer{
  position:fixed;
  width:100%;
  text-align:center;
  pointer-events:none;
  z-index:0;
}

.title img{
  width:600px;
  opacity:0.25;
  filter:blur(0.2px);
}

.logo img{
  width:520px;
  margin-top:20px;
  opacity:0.2;
}

/* ===== MAIN ===== */
.main{
  margin-top:220px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:70px;
  position:relative;
  z-index:2;
}

/* VIDEOS */
.side{
  width:280px;
  position:relative;
  transition:0.4s;
}

.side video{
  width:100%;
  border-radius:14px;
  transition:0.4s;
}

/* subtle hover */
.side:hover video{
  transform:scale(1.02);
}

/* video text */
.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.5;
  transition:0.3s;
}

.side:hover .video-text{
  opacity:0.9;
}

/* CENTER */
.center{
  text-align:center;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{transform:translateY(20px);opacity:0;}
  to{transform:translateY(0);opacity:1;}
}

.center img{
  width:665px;
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:25px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid rgba(255,255,255,0.6);
  cursor:pointer;
  transition:0.3s;
  backdrop-filter:blur(4px);
}

.btn:hover{
  background:white;
  color:black;
  transform:translateY(-2px);
}

/* ===== IMAGES ===== */
.images{
  margin-top:160px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:35px;
  padding:0 6%;
}

.center-stack{
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:12px;
}

.images img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
  transition:0.4s;
}

/* hover polish */
.images img:hover{
  transform:scale(1.02);
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .main{
    flex-direction:column;
    gap:30px;
    margin-top:180px;
  }

  .side{
    display:none;
  }

  .center img{
    transform:scale(1.5);
  }

  .buttons{
    display:flex;
    justify-content:center;
    gap:10px;
  }

  .video-thumb{
    width:90%;
    margin:25px auto;
    position:relative;
  }

  .video-thumb img{
    width:100%;
  }

  .video-thumb span{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0.6;
  }

  .images{
    display:block;
  }

  .images img{
    margin:15px 0;
  }

  .banner-logo{
    height:24px;
  }
}
</style>
</head>

<body>

<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png">
  </picture>

  <img src="bannerlogo.png" class="banner-logo">
</div>

<div class="bg-layer" id="bg">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<div class="main">

  <div class="side">
    <video id="reel" loop muted autoplay playsinline preload="metadata">
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="center">
    <img src="description.png">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

  <div class="side">
    <video id="video2" loop muted autoplay playsinline preload="metadata">
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<div class="images">
  <div><img src="image4.jpg"></div>

  <div class="center-stack">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div><img src="image1.jpg"></div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
/* POSITION BACKGROUND */
const banner = document.querySelector(".banner");
const bg = document.getElementById("bg");

function updateOffset(){
  bg.style.top = banner.offsetHeight + "px";
}
window.addEventListener("load", updateOffset);
window.addEventListener("resize", updateOffset);

/* BUTTON SOUND */
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

/* VIDEO SOUND */
function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");
</script>

</body>
</html>
