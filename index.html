<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* FONT */
@font-face {
  font-family: 'Orbitron';
  src: url('Orbitron.ttf') format('truetype');
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron', sans-serif;
}

body {
  background:black;
  color:white;
  overflow-x:hidden;
  text-align:center;
}

/* BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-2;
}

.bg img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LOGO OVERLAY */
.bg-logo {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  width:60%;
  opacity:0.3;
  z-index:-1;
}

/* NAV LOGO (300% BIGGER + PARALLAX) */
.bannerlogo {
  position:fixed;
  top:20px;
  left:20px;
  max-width:360px;
  z-index:10;
}

/* CENTER MEDIA */
.center-media {
  margin-top:140px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  flex-wrap:wrap;
}

video {
  width:260px;
  border-radius:12px;
}

/* GRID */
.grid {
  margin:80px auto;
  width:90%;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:20px;
}

.grid img {
  width:100%;
  height:auto;
  display:block;
  border-radius:10px;
}

/* MOBILE */
@media (max-width:768px){

  .center-media {
    flex-direction:column;
  }

  video {
    width:90%;
  }

  .grid {
    grid-template-columns:1fr;
  }

  .bannerlogo {
    max-width:200px;
  }
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <img src="video2miniature.png">
</div>

<!-- LOGO OVERLAY -->
<img src="logo.png" class="bg-logo">

<!-- NAV -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo" id="navLogo">
</a>

<!-- CENTER MEDIA -->
<div class="center-media">

  <video muted loop autoplay playsinline>
    <source src="reel.mp4" type="video/mp4">
  </video>

  <img src="logo.png" style="width:300px; opacity:0.3;">

  <video muted loop autoplay playsinline>
    <source src="video2.mp4" type="video/mp4">
  </video>

</div>

<!-- GRID -->
<div class="grid">
  <img src="image1.jpg">
  <img src="image2.jpg">
  <img src="image3.jpg">
  <img src="image4.jpg">
</div>

<script>

/* PARALLAX NAV LOGO */
window.addEventListener("scroll",()=>{
  let y = window.scrollY;
  document.getElementById("navLogo").style.transform =
    "translateY(" + (y * 0.3) + "px)";
});

</script>

</body>
</html>
