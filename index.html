<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Videographer & Photographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

/* ===== RESET ===== */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== BANNER ===== */
.banner {
    width: 100%;
    height: 45vh;
    min-height: 280px;
    max-height: 500px;
    position: relative;
    overflow: hidden;
}

/* animated image inside banner */
.banner::before {
    content: "";
    position: absolute;
    width: 110%;
    height: 110%;
    top: -5%;
    left: -5%;
    background: url('banner.jpg') center/cover no-repeat;
    animation: zoomBanner 12s ease-in-out infinite alternate;
    z-index: 0;
}

/* subtle cinematic zoom */
@keyframes zoomBanner {
    from { transform: scale(1); }
    to { transform: scale(1.08); }
}

/* HEADER */
.header {
    position: absolute;
    bottom: 25px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 2;
}

.header.fixed {
    position: fixed;
    top: 20px;
    bottom: auto;
}

.header img {
    width: 42px;
    filter: drop-shadow(0 6px 20px rgba(0,0,0,0.9));
}

.header span {
    font-size: 22px;
    text-shadow: 0 6px 20px rgba(0,0,0,0.9);
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CENTER LOGO */
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px; /* 3x bigger */
    opacity: 0.5;
    z-index: 0;
    pointer-events: none;
}

/* CENTER TEXT */
.center-text {
    position: relative;
    text-align: center;
    z-index: 2;
}

.center-text p {
    font-size: 20px;
    margin-bottom: 25px;
    line-height: 1.4;
}

/* BUTTON */
.btn {
    border: 2px solid white;
    padding: 12px 28px;
    text-decoration: none;
    color: white;
    display: inline-block;
    transition: 0.2s ease;
}

.btn:active {
    transform: scale(0.9);
    background: white;
    color: black;
}

/* ===== VIDEOS POSITIONED RELATIVE TO CENTER ===== */
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    height: 420px;
    overflow: hidden;
    z-index: 1;
}

.left {
    left: calc(50% - 900px/2 - 260px - 15px);
}

.right {
    left: calc(50% + 900px/2 + 15px);
}

.side video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== GRID ===== */
.grid {
    display: flex;
    gap: 40px;
    padding: 100px 100px;
    align-items: flex-start;
}

.left-img,
.right-img {
    width: 25%;
    height: 520px;
    object-fit: cover;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 40px;
}

.middle img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

</style>
</head>

<body>

<!-- BANNER -->
<section class="banner">
    <div class="header" id="header">
        <img src="logo.png">
        <span>Alejandro Mazo</span>
    </div>
</section>

<!-- HERO -->
<section class="hero">

    <img src="logo.png" class="center-logo">

    <!-- LEFT VIDEO -->
    <div class="side left">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <!-- RIGHT VIDEO -->
    <div class="side right">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <!-- CENTER TEXT -->
    <div class="center-text">
        <p>
            Action sports and concerts<br>
            videographer and photographer
        </p>
        <a href="#work" class="btn">SEE MEDIA</a>
    </div>

</section>

<!-- GRID -->
<section class="grid" id="work">

    <img src="image1.jpg" class="left-img">

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <img src="image4.jpg" class="right-img">

</section>

<script>
window.addEventListener("scroll", function() {
    const header = document.getElementById("header");
    if (window.scrollY > window.innerHeight * 0.4) {
        header.classList.add("fixed");
    } else {
        header.classList.remove("fixed");
    }
});
</script>

</body>
</html>
