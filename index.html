<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Videographer and Photographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('/Orbitron.ttf');
}

/* ===== BASE ===== */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== BANNER ===== */
.banner {
    height: 300px;
    background: url('/banner.jpg') center/cover no-repeat;
    display: flex;
    align-items: flex-end;
    padding: 0 0 30px 60px;
}

.banner-content {
    display: flex;
    align-items: center;
    gap: 20px;
}

.banner-logo {
    height: 90px;
}

.banner h1 {
    font-size: 42px;
    letter-spacing: 6px;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
}

/* ===== BIG BACKGROUND LOGO ===== */
.center-logo {
    position: fixed;
    width: 850px;
    opacity: 0.08;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
    pointer-events: none;
}

/* ===== TEXT ===== */
.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
}

.top-text,
.bottom-text {
    font-size: 22px;
    letter-spacing: 2px;
}

.bottom-text {
    margin-top: 6px;
    opacity: 0.85;
}

/* ===== BUTTON ===== */
.btn {
    margin-top: 20px;
    padding: 10px 25px;
    border: 2px solid white;
    display: inline-block;
    color: white;
    text-decoration: none;
}

/* ===== VIDEOS ===== */
.video-left,
.video-right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
}

.video-left { left: 8%; }
.video-right { right: 8%; }

video {
    width: 260px;
    border-radius: 12px;
}

/* ===== IMAGE GRID ===== */
.image-grid {
    display: flex;
    padding: 60px;
    gap: 20px;
}

.left-img,
.right-img {
    width: 25%;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.image-grid img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 12px;
}

</style>
</head>

<body>

<!-- ===== BANNER ===== -->
<section class="banner">
    <div class="banner-content">
        <img src="/logo.png" class="banner-logo">
        <h1>ALEJANDRO MAZO</h1>
    </div>
</section>

<!-- ===== BACKGROUND LOGO ===== -->
<img src="/logo.png" class="center-logo">

<!-- ===== HERO ===== -->
<section class="hero">

    <div class="video-left">
        <video autoplay muted loop playsinline>
            <source src="/reel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="video-right">
        <video autoplay muted loop playsinline>
            <source src="/video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="hero-text">
        <div class="top-text">action sports and concerts</div>
        <div class="bottom-text">videomaker and photographer</div>

        <a href="#" class="btn">View Work</a>
    </div>

</section>

<!-- ===== IMAGE GRID ===== -->
<section class="image-grid">

    <img src="/image1.jpg" class="left-img">

    <div class="middle">
        <img src="/image2.jpg">
        <img src="/image3.jpg">
    </div>

    <img src="/image4.jpg" class="right-img">

</section>

</body>
</html>
