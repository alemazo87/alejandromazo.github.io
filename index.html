<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

.banner-logo{
  position:absolute;
  left:25px;
  top:50%;
  transform:translateY(-50%);
  height:28px;
  width:auto;
}

/* ===== BACKGROUND ===== */
.bg-layer{
  position:fixed;
  top:120px;
  width:100%;
  text-align:center;
  z-index:0;
  pointer-events:none;
}

.bg-layer .title img{
  width:600px;
  opacity:0.3;
}

.bg-layer .logo img{
  width:520px;
  margin-top:20px;
  opacity:0.25;
}

/* ===== MAIN ===== */
.main{
  margin-top:200px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
  position:relative;
  z-index:2;
}

.side{
  width:280px;
  position:relative;
}

.side video{
  width:100%;
  border-radius:14px;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

.center{
  text-align:center;
}

.center img{
  width:665px;
  max-width:90%;
}

.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
}

/* ===== IMAGES ===== */
.images{
  margin-top:140px;
  display:flex;
  justify-content:space-between;
  align-items:stretch;
  padding:0 6%;
}

.left, .right{
  width:32%;
}

.center-stack{
  width:32%;
  display:flex;
  flex-direction:column;
  gap:10px;
}

.images img{
  width:100%;
  border-radius:10px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .main{
    flex-direction:column;
    margin-top:180px;
  }

  .side{
    display:none;
  }

  .center img{
    width:100%;
    transform:scale(1.5);
  }

  .buttons{
    display:flex;
    justify-content:center;
    gap:10px;
  }

  .video-thumb{
    width:90%;
    margin:20px auto;
    position:relative;
  }

  .video-thumb img{
    width:100%;
  }

  .video-thumb span{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0.6;
  }

  .images{
    flex-direction:column;
  }

  .images img{
    margin:15px 0;
  }
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png" alt="">
  </picture>

  <img src="bannerlogo.png" class="banner-logo" alt="">
</div>

<!-- BACKGROUND -->
<div class="bg-layer">
  <div class="title">
    <img src="title.png" alt="">
  </div>
  <div class="logo">
    <img src="logo.png" alt="">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="side">
    <video id="reel" loop muted playsinline>
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="center">
    <img src="description.png" alt="">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

  <div class="side">
    <video id="video2" loop muted playsinline>
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<!-- MOBILE VIDEO -->
<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png" alt="">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png" alt="">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">
  <div class="left"><img src="image4.jpg" alt=""></div>
  <div class="center-stack">
    <img src="image2.jpg" alt="">
    <img src="image3.jpg" alt="">
  </div>
  <div class="right"><img src="image1.jpg" alt=""></div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.muted = true;
  vid.play().catch(()=>{});

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");

/* MOBILE VIDEO */
function openVideo(src){
  let v=document.createElement("video");
  v.src=src;
  v.controls=true;
  v.autoplay=true;

  v.style.position="fixed";
  v.style.top=0;
  v.style.left=0;
  v.style.width="100%";
  v.style.height="100%";
  v.style.zIndex=999;

  document.body.appendChild(v);

  v.onclick = () => v.remove();
}
</script>

</body>
</html>
