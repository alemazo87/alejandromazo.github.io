<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  width:100%;
  height:130px;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* FIXED LOGO */
.banner-logo{
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  height:16px;
  width:auto;
}

/* ===== HERO ===== */
.hero{
  padding:40px 20px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.title img{
  width:85%;
  max-width:360px;
  opacity:0.25;
}

.logo img{
  width:60%;
  max-width:260px;
  margin-top:12px;
  opacity:0.2;
}

/* ===== MAIN CONTENT ===== */
.container{
  max-width:360px;
  margin:0 auto;
  text-align:center;
}

.description img{
  width:100%;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:18px;
}

.btn{
  padding:10px 14px;
  border:1px solid white;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== VIDEO THUMB ===== */
.video-thumb{
  width:92%;
  margin:24px auto;
  position:relative;
  border-radius:12px;
  overflow:hidden;
}

.video-thumb img{
  width:100%;
}

.video-thumb span{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.7;
}

/* ===== IMAGES ===== */
.images{
  padding:0 4%;
}

.images img{
  width:100%;
  margin:14px 0;
  border-radius:12px;
}

/* ===== VIDEO OVERLAY ===== */
.video-overlay{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.video-overlay video{
  width:100%;
  height:100%;
  object-fit:contain;
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="bannerMOBILE.jpg">
  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- HERO -->
<div class="hero">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<!-- CONTENT -->
<div class="container">

  <div class="description">
    <img src="description.png">
  </div>

  <div class="buttons">
    <div class="btn" onclick="goPage('work.html')">MY WORK</div>
    <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
  </div>

</div>

<!-- VIDEOS -->
<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">
  <img src="image1.jpg">
  <img src="image2.jpg">
  <img src="image3.jpg">
  <img src="image4.jpg">
</div>

<!-- VIDEO PLAYER -->
<div id="videoOverlay" class="video-overlay">
  <video id="overlayVideo" controls playsinline></video>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* BUTTON SOUND */
function goPage(page){
  const s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},150);
}

/* VIDEO PLAYER (CROSS PLATFORM SAFE) */
const overlay = document.getElementById("videoOverlay");
const video = document.getElementById("overlayVideo");

function openVideo(src){
  video.src = src;
  overlay.style.display = "flex";
  video.play().catch(()=>{});
}

/* CLOSE VIDEO */
overlay.addEventListener("click", ()=>{
  video.pause();
  video.src = "";
  overlay.style.display = "none";
});

/* CLEANUP IF USER SWITCHES APPS */
document.addEventListener("visibilitychange", ()=>{
  if(document.hidden){
    video.pause();
    overlay.style.display = "none";
    video.src = "";
  }
});

</script>

</body>
</html>
