<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | FMX Videographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== CONTAINER (FIX WIDTH ISSUE) ===== */
.container {
    max-width: 1400px;
    margin: auto;
}

/* ===== FLOATING LOGO ===== */
.floating-logo {
    position: fixed;
    top: 20px;
    left: 20px;
    z-index: 999;
}

.floating-logo img {
    height: 80px;
    cursor: pointer;
}

/* ===== BANNER ===== */
.banner {
    height: 450px;
    background: url('banner.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    padding: 0 80px;
}

.banner-content {
    display: flex;
    align-items: center;
    gap: 25px;
}

.banner-logo {
    height: 140px;
}

.banner h1 {
    font-size: 50px;
    letter-spacing: 6px;
}

/* ===== HERO ===== */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 100px 80px;
    position: relative;
}

/* BIG CENTER LOGO */
.center-logo {
    position: absolute;
    width: 600px;
    opacity: 0.07;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* TEXT */
.hero-text {
    width: 260px;
}

.hero-text p {
    font-size: 22px;
    line-height: 1.6;
}

/* BUTTON (same width as video) */
.btn {
    display: block;
    margin-top: 20px;
    padding: 12px;
    border: 2px solid white;
    text-align: center;
    width: 260px;
    color: white;
    text-decoration: none;
}

/* VIDEO */
.hero-video video {
    width: 260px;
    border-radius: 12px;
}

/* SPACING BALANCE */
.hero-text {
    margin-right: 40px;
}

.hero-video {
    margin-left: 40px;
}

/* ===== GALLERY ===== */
.gallery {
    display: flex;
    gap: 10px;
    padding: 40px;
}

.gallery img {
    width: 33%;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 30px;
}

</style>
</head>

<body>

<!-- FLOATING LOGO -->
<a href="#" class="floating-logo">
    <img src="logo.png">
</a>

<div class="container">

<!-- BANNER -->
<section class="banner">
    <div class="banner-content">
        <img src="logo.png" class="banner-logo">
        <h1>ALEJANDRO MAZO</h1>
    </div>
</section>

<!-- HERO -->
<section class="hero">

    <!-- LEFT TEXT -->
    <div class="hero-text">
        <p>
        Action sports & concerts<br>
        videomaker and photographer
        </p>

        <a href="#work" class="btn">View Work</a>
    </div>

    <!-- CENTER LOGO -->
    <img src="logo.png" class="center-logo">

    <!-- RIGHT VIDEO -->
    <div class="hero-video">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

</section>

<!-- GALLERY -->
<section id="work" class="gallery">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</section>

<!-- FOOTER -->
<footer>
    © Alejandro Mazo
</footer>

</div>

</body>
</html>
