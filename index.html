<style>

/* =========================
GLOBAL
========================= */

@font-face{
  font-family:Orbitron;
  src:url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron,sans-serif;
}

html, body{
  width:100%;
  min-height:100%;
}

body{
  background:
  radial-gradient(circle at top, #111 0%, #000 60%);
  color:#fff;
  overflow-x:hidden;
  user-select:none;
  scroll-behavior:smooth;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

img, video{
  -webkit-user-drag:none;
}

audio{
  display:none;
}

/* =========================
HEADER
========================= */

.header{
  width:100%;
  overflow:hidden;
  position:relative;
}

.header img{
  width:100%;
  display:block;
}

.header::after{
  content:"";
  position:absolute;
  inset:0;
  background:
  linear-gradient(
    to bottom,
    rgba(0,0,0,0.1),
    rgba(0,0,0,0.55)
  );
}

/* =========================
LOGO
========================= */

.banner-logo{
  position:fixed;
  left:45px;
  top:calc(100vw * 0.5625 - 175px);
  width:130px;
  z-index:1000;
  cursor:pointer;
  transition:0.4s ease;
}

.banner-logo:hover{
  opacity:0.7;
}

.banner-logo img{
  width:100%;
}

/* =========================
BACKGROUND
========================= */

.bg-layer{
  position:fixed;
  left:50%;
  top:calc(100vw * 0.5625 + 20px);
  transform:translateX(-50%);
  z-index:1;
  pointer-events:none;
  text-align:center;

  display:flex;
  flex-direction:column;
  align-items:center;

  filter:drop-shadow(0 0 40px rgba(255,255,255,0.05));
}

.title-img{
  width:52vw;
  opacity:0.92;
}

.logo-img{
  width:18vw;
  margin-top:80px;
  opacity:0.18;
}

/* =========================
CONTENT
========================= */

.content{
  position:relative;
  z-index:2;
}

/* =========================
DESCRIPTION
========================= */

.description{
  display:flex;
}

.description img{
  object-fit:contain;
}

/* =========================
BUTTONS
========================= */

.buttons{
  display:flex;
}

.buttons a{
  text-decoration:none;
  color:white;
}

.btn{
  padding:16px 42px;
  border:1px solid rgba(255,255,255,0.18);
  cursor:pointer;
  transition:0.35s ease;
  letter-spacing:3px;
  font-size:11px;
  backdrop-filter:blur(8px);
  background:rgba(255,255,255,0.02);
}

.btn:hover{
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.4);
  transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(255,255,255,0.08);
}

/* =========================
VIDEOS
========================= */

.video-box{
  border-radius:24px;
  overflow:hidden;
  position:relative;
  transition:0.4s ease;
  cursor:pointer;
  background:#050505;
}

.video-box:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

video{
  width:100%;
  display:block;
  object-fit:cover;
  transition:0.6s ease;
}

.video-box:hover video{
  transform:scale(1.02);
}

.video-text{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:10px;
  letter-spacing:3px;
  opacity:0.7;
  text-shadow:0 0 20px rgba(0,0,0,0.8);
  pointer-events:none;
}

/* =========================
GALLERY
========================= */

.gallery img{
  width:100%;
  object-fit:cover;
  border-radius:18px;
  transition:0.5s ease;
  cursor:pointer;
}

.gallery img:hover{
  transform:scale(1.02);
}

/* =========================
FADE
========================= */

.fade-in{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1.2s ease forwards;
}

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* =========================
GRAIN
========================= */

.grain{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:9999;
  opacity:0.03;
  background-image:url("grain.png");
  background-size:cover;
  mix-blend-mode:soft-light;
}

/* =========================
DESKTOP
========================= */

@media (min-width:901px){

  .content{
    margin-top:1050px;
  }

  .description{
    justify-content:center;
    align-items:center;
    width:100%;
    margin-top:165px;
  }

  .description img{
    width:auto;
    max-width:none;
    height:auto;
  }

  .buttons{
    justify-content:center;
    align-items:center;
    gap:20px;
    width:100%;
    margin-top:110px;
  }

  .video-section{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:740px;
    padding:0 4vw;
    margin-top:-332px;
  }

  .video-box{
    width:420px;
    height:700px;
    flex-shrink:0;
  }

  .video-box video{
    width:100%;
    height:100%;
    object-fit:cover;
  }

  .gallery{
    width:92%;
    margin:20px auto 0 auto;

    display:grid;

    grid-template-columns:
    1fr
    0.8fr
    1fr;

    gap:28px;

    align-items:start;
  }

  .gallery img:nth-child(1){
    height:1100px;
  }

  .gallery img:nth-child(3){
    height:1100px;
  }

  .middle-stack{
    display:flex;
    flex-direction:column;
    gap:28px;
    height:1100px;
  }

  .middle-stack img{
    flex:1;
  }

}

/* =========================
MOBILE
========================= */

@media (max-width:900px){

  .header img{
    content:url("bannerMOBILE.jpg");
    object-fit:contain;
  }

  .banner-logo{
    top:30px;
    left:20px;
    width:100px;
  }

  .bg-layer{
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
  }

  .title-img{
    width:80vw;
  }

  .logo-img{
    width:60vw;
    margin-top:30px;
  }

  .content{
    margin-top:110px;
  }

  .description{
    justify-content:center;
  }

  .description img{
    width:85vw;
  }

  .buttons{
    justify-content:center;
    flex-direction:column;
    align-items:center;
    margin-top:35px;
    gap:20px;
  }

  .btn{
    width:220px;
    text-align:center;
  }

  .video-section{
    margin-top:100px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:30px;
  }

  .video-box{
    width:90%;
  }

  .gallery{
    margin-top:90px;
    width:95%;
    margin-left:auto;
    margin-right:auto;

    display:flex;
    flex-direction:column;
    gap:20px;
  }

}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#000;
}

::-webkit-scrollbar-thumb{
  background:#222;
  border-radius:10px;
}

::-webkit-scrollbar-thumb:hover{
  background:#444;
}

</style>
</head>

</div>

<!-- GRAIN -->

<script>

/* AUTOPLAY FIX */

window.addEventListener("load",()=>{

  document.querySelectorAll("video").forEach(video=>{

    video.muted = true;
    video.setAttribute("playsinline","");

    const promise = video.play();

    if(promise !== undefined){

      promise.catch(()=>{
        video.play();
      });

    }

  });

});

/* SOUND TOGGLE */

document.querySelectorAll(".video-box").forEach(box=>{

  const video = box.querySelector("video");
  const text = box.querySelector(".video-text");

  box.addEventListener("click",()=>{

    if(video.muted){

      video.muted = false;
      text.innerText = "TAP TO MUTE";

    }else{

      video.muted = true;
      text.innerText = "TAP FOR SOUND";

    }

  });

});

</script>
