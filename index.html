<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER (TOP RIGHT ALWAYS) ===== */
.header {
    position: fixed;
    top: 20px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 100;
}

.header img {
    width: 60px;
    filter: drop-shadow(0 8px 25px rgba(0,0,0,0.9));
}

.header span {
    font-size: 32px;
    text-shadow: 0 8px 25px rgba(0,0,0,0.9);
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

/* BANNER FULLSCREEN → SHRINK */
.banner {
    position: absolute;
    inset: 0;
    background: url('banner.jpg') center/cover no-repeat;
    z-index: 1;
    animation: shrink 0.6s ease forwards;
}

@keyframes shrink {
    0% { height: 100vh; }
    100% { height: 140px; }
}

/* ===== CENTER LOGO (BACKGROUND) ===== */
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 65vw;
    max-width: 900px;
    opacity: 0.5;
    z-index: 0;
    pointer-events: none;
}

/* ===== CENTER TEXT ===== */
.center-text {
    position: relative;
    z-index: 5;
    text-align: center;
    margin-top: 180px;
}

.center-text p {
    font-size: 20px;
    margin-bottom: 20px;
}

.btn {
    border: 2px solid white;
    padding: 12px 30px;
    text-decoration: none;
    color: white;
    transition: 0.2s;
}

.btn:hover {
    background: white;
    color: black;
}

/* ===== VIDEOS (NEXT TO LOGO) ===== */
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    z-index: 5;
}

.left { left: calc(50% - 420px); }
.right { right: calc(50% - 420px); }

.side video {
    width: 100%;
    border-radius: 18px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8);
}

/* ===== GRID ===== */
.grid {
    display: flex;
    gap: 40px;
    padding: 120px 80px;
}

.left-img,
.right-img {
    width: 25%;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

img {
    width: 100%;
    height: auto;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {

    .header span {
        font-size: 18px;
    }

    .side {
        display: none;
    }

    .grid {
        flex-direction: column;
        padding: 60px 20px;
    }

    .left-img,
    .right-img,
    .middle {
        width: 100%;
    }

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header" onclick="window.scrollTo({top:0, behavior:'smooth'})">
    <img src="logo.png">
    <span>ALEJANDRO MAZO</span>
</div>

<!-- HERO -->
<section class="hero">

    <div class="banner"></div>

    <img src="logo.png" class="center-logo">

    <div class="side left">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="side right">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="center-text">
        <p>
            action sports and concerts<br>
            videographer and photographer
        </p>
        <a href="#work" class="btn">SEE MEDIA</a>
    </div>

</section>

<!-- GRID -->
<section class="grid" id="work">

    <div class="left-img">
        <img src="image1.jpg">
    </div>

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <div class="right-img">
        <img src="image4.jpg">
    </div>

</section>

</body>
</html>
