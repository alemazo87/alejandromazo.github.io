<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Videographer & Photographer</title>

<style>

/* ===== RESET ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* ===== BANNER ===== */
.banner {
    width: 100%;
    height: 220px;
    overflow: hidden;
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== HERO SECTION ===== */
.hero {
    position: relative;
    background: black;
    padding: 120px 20px;
    text-align: center;
    overflow: hidden;
}

/* BIG CENTER LOGO (BACKGROUND) */
.center-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 420px;
    opacity: 0.08;
    z-index: 0; /* stays behind everything */
}

/* TEXT */
.hero-text {
    position: relative;
    z-index: 2;
}

.hero-text h1 {
    font-size: 48px;
    margin-bottom: 10px;
}

.hero-text p {
    font-size: 18px;
    margin-bottom: 20px;
}

/* BUTTON */
.btn {
    border: 2px solid white;
    padding: 10px 25px;
    text-decoration: none;
    color: white;
    display: inline-block;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/* ===== IMAGE GRID ===== */
.image-grid {
    display: flex;
    padding: 60px;
    gap: 20px;
    align-items: flex-start;
}

/* LEFT + RIGHT */
.left-img,
.right-img {
    width: 25%;
    height: 500px;
    object-fit: cover;
    border-radius: 12px;
}

/* MIDDLE */
.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.middle img {
    width: 100%;
    height: 240px;
    object-fit: cover;
    border-radius: 12px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .image-grid {
        flex-direction: column;
    }

    .left-img,
    .right-img,
    .middle {
        width: 100%;
    }

    .left-img,
    .right-img {
        height: 300px;
    }
}

</style>
</head>

<body>

<!-- ===== BANNER ===== -->
<div class="banner">
    <img src="banner.jpg">
</div>

<!-- ===== HERO ===== -->
<section class="hero">

    <!-- BACKGROUND LOGO -->
    <img src="logo.png" class="center-logo">

    <!-- TEXT -->
    <div class="hero-text">
        <h1>ALEJANDRO MAZO</h1>
        <p>Videographer & Photographer</p>
        <a href="#work" class="btn">View Work</a>
    </div>

</section>

<!-- ===== GRID ===== -->
<section class="image-grid" id="work">

    <!-- LEFT -->
    <img src="image1.jpg" class="left-img">

    <!-- MIDDLE -->
    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <!-- RIGHT -->
    <img src="image4.jpg" class="right-img">

</section>

</body>
</html>
