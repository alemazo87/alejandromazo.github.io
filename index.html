<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  width:100%;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

/* LOGO INSIDE BANNER */
.banner-logo{
  position:absolute;
  left:40px;
  top:50%;
  transform:translateY(-50%);
  width:120px;
  cursor:pointer;
  z-index:10;
}

/* ===== TITLE + LOGO LOCKED ===== */
.locked{
  position:fixed;
  width:100%;
  top:0;
  pointer-events:none;
}

.title{
  margin-top:30px;
  text-align:center;
  opacity:0.3;
}

.title img{
  width:658px;
  max-width:80%;
}

.main-logo{
  margin-top:20px;
  text-align:center;
  opacity:0.3;
}

.main-logo img{
  width:380px;
  max-width:70%;
}

/* ===== CENTER DESCRIPTION ===== */
.center{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.center img{
  width:665px; /* 150% of original */
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
  pointer-events:auto;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== VIDEOS (DESKTOP) ===== */
.side-video{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  width:280px;
}

.left{ left:5%; }
.right{ right:5%; }

.side-video video{
  width:100%;
  border-radius:12px;
  cursor:pointer;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

/* ===== IMAGE SECTION ===== */
.images{
  margin-top:120vh;
  display:flex;
  justify-content:space-between;
  padding:0 5%;
  align-items:center;
}

.images-left,
.images-center,
.images-right{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.images-center img{
  margin:10px 0;
}

.images img{
  width:220px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .banner img{
    content:url("bannerMOBILE.jpg");
  }

  .banner-logo{
    left:20px;
    width:90px;
  }

  .locked{
    position:static;
    pointer-events:auto;
  }

  .center{
    position:static;
    transform:none;
    margin-top:20px;
  }

  .side-video{
    display:none;
  }

  /* VIDEO THUMBNAILS */
  .video-thumb{
    width:90%;
    margin:20px auto;
    position:relative;
  }

  .video-thumb img{
    width:100%;
  }

  .video-thumb span{
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    transform:translateY(-50%);
    opacity:0.6;
  }

  /* IMAGE GRID */
  .images{
    flex-direction:column;
  }

  .images img{
    width:90%;
    margin:10px 0;
  }
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">

  <a href="index.html">
    <img src="bannerlogo.png" class="banner-logo">
  </a>
</div>

<!-- LOCKED TITLE + LOGO -->
<div class="locked">
  <div class="title">
    <img src="title.png">
  </div>

  <div class="main-logo">
    <img src="logo.png">
  </div>
</div>

<!-- CENTER DESCRIPTION -->
<div class="center">
  <img src="description.png">

  <div class="buttons">
    <div class="btn" onclick="goPage('work.html')">MY WORK</div>
    <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
  </div>
</div>

<!-- SIDE VIDEOS -->
<div class="side-video left">
  <video id="reel" loop muted>
    <source src="reel.mp4">
  </video>
  <div class="video-text" id="reelText">tap for sound</div>
</div>

<div class="side-video right">
  <video id="video2" loop muted>
    <source src="video2.mp4">
  </video>
  <div class="video-text" id="video2Text">tap for sound</div>
</div>

<!-- MOBILE VIDEO THUMBNAILS -->
<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">
  <div class="images-left">
    <img src="image4.jpg">
  </div>

  <div class="images-center">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="images-right">
    <img src="image1.jpg">
  </div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* BUTTON SOUND */
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

/* VIDEO TOGGLE */
function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.play().catch(()=>{});

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");

/* MOBILE FULLSCREEN */
function openVideo(src){
  let v=document.createElement("video");
  v.src=src;
  v.autoplay=true;
  v.controls=true;

  v.style.position="fixed";
  v.style.top=0;
  v.style.left=0;
  v.style.width="100%";
  v.style.height="100%";
  v.style.zIndex=999;

  document.body.appendChild(v);

  v.addEventListener("touchstart",()=>{
    v.remove();
  });
}

</script>

</body>
</html>
