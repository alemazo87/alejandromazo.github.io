<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | FMX Videographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

/* ===== BASE ===== */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== FLOATING LOGO ===== */
.floating-logo {
    position: fixed;
    top: 15px;
    left: 20px;
    z-index: 999;
}

.floating-logo img {
    height: 80px;
}

/* ===== BANNER ===== */
.banner {
    height: 450px;
    background: url('banner.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    padding: 0 80px;
}

.banner-content {
    display: flex;
    align-items: center;
    gap: 25px;
}

.banner-logo {
    height: 120px;
}

.banner h1 {
    font-size: 42px;
    letter-spacing: 6px;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* CENTER LOGO */
.center-logo {
    position: absolute;
    width: 900px; /* 100% bigger */
    opacity: 0.5;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 1;
}

/* TEXT */
.hero-text {
    position: absolute;
    text-align: center;
    z-index: 2;
}

.hero-text p {
    font-size: 26px;
    line-height: 1.4;
}

.hero-text span {
    display: block;
    font-size: 16px;
    color: #aaa;
    margin-top: 8px;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 12px 30px;
    border: 2px solid white;
    display: inline-block;
    color: white;
    text-decoration: none;
}

/* VIDEOS SIDES */
.side-video {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
}

.side-video.left {
    left: 8%;
}

.side-video.right {
    right: 8%;
}

.side-video video {
    width: 260px;
    border-radius: 12px;
}

/* ===== IMAGE GRID ===== */
.image-grid {
    display: flex;
    gap: 20px;
    padding: 60px;
    align-items: center;
}

.image-grid .vertical {
    width: 25%;
}

.stack {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.stack img {
    width: 100%;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 30px;
}

</style>
</head>

<body>

<!-- FLOATING LOGO -->
<a href="#" class="floating-logo">
    <img src="logo.png">
</a>

<!-- BANNER -->
<section class="banner">
    <div class="banner-content">
        <img src="logo.png" class="banner-logo">
        <h1>ALEJANDRO MAZO</h1>
    </div>
</section>

<!-- HERO -->
<section class="hero">

    <!-- LEFT VIDEO -->
    <div class="side-video left">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <!-- CENTER LOGO -->
    <img src="logo.png" class="center-logo">

    <!-- TEXT -->
    <div class="hero-text">
        <p>
        action sports and concerts<br>
        <span>videomaker and photographer</span>
        </p>

        <a href="#work" class="btn">View Work</a>
    </div>

    <!-- RIGHT VIDEO -->
    <div class="side-video right">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

</section>

<!-- IMAGE GRID -->
<section id="work" class="image-grid">

    <img src="img1.jpg" class="vertical">

    <div class="stack">
        <img src="img2.jpg">
        <img src="img3.jpg">
    </div>

    <img src="img4.jpg" class="vertical">

</section>

<!-- FOOTER -->
<footer>
    © Alejandro Mazo
</footer>

</body>
</html>
