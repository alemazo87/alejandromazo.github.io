<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Brand</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 15px;
      background: #000;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar .logo {
      width: 40px;
    }

    .navbar h1 {
      font-size: 20px;
      margin: 0;
    }

    /* BANNER (FIXED - NO CROP) */
    .banner {
      width: 100%;
      height: 60vh;
      background-image: url('your-banner.jpg'); /* replace */
      background-size: contain; /* NO CROPPING */
      background-repeat: no-repeat;
      background-position: center;
      background-color: #000;
    }

    /* HERO SECTION */
    .hero {
      text-align: center;
      padding: 40px 20px;
    }

    /* CENTER LOGO (50% BIGGER) */
    .center-logo {
      width: 180px; /* increased */
      max-width: 60%;
      margin-bottom: 20px;
    }

    /* DESCRIPTION FIX */
    .description {
      max-width: 700px;
      margin: 0 auto;
      font-size: 18px;
      line-height: 1.6;
      color: #ccc;
    }

  </style>
</head>

<body>

  <!-- NAVBAR (ONLY LOGO USED HERE — NO DUPLICATES) -->
  <header class="navbar">
    <img src="logo.png" class="logo"> <!-- replace -->
    <h1>Your Brand</h1>
  </header>

  <!-- FULL BANNER -->
  <section class="banner"></section>

  <!-- HERO -->
  <section class="hero">
    <img src="logo.png" class="center-logo"> <!-- same logo -->
    
    <p class="description">
      Your description text goes here. This should match your mockup layout,
      centered, readable, and properly spaced for a clean modern look.
    </p>
  </section>

</body>
</html>
