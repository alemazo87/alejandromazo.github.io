<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Videographer & Photographer</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: Arial, sans-serif;
    color: white;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

.hero video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* LOGO BACKGROUND */
.center-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    opacity: 0.08;
    z-index: 1; /* behind text */
}

/* TEXT */
.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
}

.hero-text h1 {
    font-size: 48px;
    margin: 0;
    letter-spacing: 2px;
}

.hero-text p {
    font-size: 18px;
    margin-top: 10px;
    letter-spacing: 1px;
}

.hero-text a {
    display: inline-block;
    margin-top: 20px;
    border: 1px solid white;
    padding: 10px 20px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.hero-text a:hover {
    background: white;
    color: black;
}

/* ===== GALLERY ===== */
.gallery {
    padding: 80px 5%;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 2fr 1fr;
    gap: 20px;
    align-items: start;
}

/* SIDE COLUMNS */
.column {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.column img {
    width: 100%;
    border-radius: 12px;
    object-fit: cover;
}

/* CENTER STACK */
.middle {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.middle img {
    width: 100%;
    border-radius: 12px;
    object-fit: cover;
}

/* MOBILE */
@media (max-width: 900px) {
    .grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <video autoplay muted loop>
        <source src="reel.mp4" type="video/mp4">
    </video>

    <img src="logo.png" class="center-logo">

    <div class="hero-text">
        <h1>ALEJANDRO MAZO</h1>
        <p>Videographer & Photographer</p>
        <a href="#work">View Work</a>
    </div>
</section>

<!-- GALLERY -->
<section id="work" class="gallery">

    <div class="grid">

        <!-- LEFT -->
        <div class="column">
            <img src="image1.jpg">
        </div>

        <!-- CENTER -->
        <div class="middle">
            <img src="image2.jpg">
            <img src="image3.jpg">
        </div>

        <!-- RIGHT -->
        <div class="column">
            <img src="image4.jpg">
        </div>

    </div>

</section>

</body>
</html>
