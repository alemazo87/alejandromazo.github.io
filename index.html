<style>
@font-face {
  font-family: Orbitron;

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: #000;
}

/* Banner container */
.banner {
  position: relative;
  width: 100%;
}

/* Banner image */
.banner img {
  width: 100%;
  height: auto;
  display: block;
}

/* Logo inside banner */
.banner-logo {
  position: absolute;
  left: 5%;
  top: 50%;
  transform: translateY(-50%);
  height: 20%;   /* scales relative to banner */
  width: auto;   /* keeps proportions */
  cursor: pointer;
}
</style>

<div class="banner">
  <img src="banner.png" alt="banner">
