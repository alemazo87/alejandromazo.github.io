<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alejandro Mazo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      background: black;
      color: white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1519125323398-675f0ddb6308') center/cover no-repeat;
      position: relative;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      top: 0;
      left: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 3.5rem;
      letter-spacing: 3px;
    }

    .subtitle {
      margin-top: 20px;
      margin-bottom: 25px;
      font-size: 1.1rem;
      color: #ccc;
      line-height: 1.6;
    }

    .btn {
      display: inline-block;
      padding: 12px 30px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    /* GALLERY */
    .gallery {
      padding: 80px 5%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      transition: 0.4s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* REEL */
    .video-section {
      padding: 80px 5%;
      text-align: center;
    }

    .reel-container {
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    .reel-container video {
      width: 300px;
      height: 533px; /* 9:16 */
      object-fit: cover;
      border-radius: 12px;
    }

    footer {
      padding: 40px;
      text-align: center;
      color: #666;
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>ALEJANDRO MAZO</h1>
    <p class="subtitle">
      Cinematic photographer<br>
      & filmmaker
    </p>
    <a href="#work" class="btn">View Work</a>
  </div>
</section>

<!-- GALLERY -->
<section id="work" class="gallery">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
  <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</section>

<!-- REEL -->
<section class="video-section">
  <h2>Reel</h2>

  <div class="reel-container">
    <video autoplay muted loop playsinline>
      <source src="reel.mp4" type="video/mp4">
    </video>
  </div>

</section>

<footer>
  © Alejandro Mazo
</footer>

</body>
</html>
