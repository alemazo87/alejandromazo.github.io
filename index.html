<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE</title>

<style>

/* FONT */
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
  user-select: none;
}

/* BACKGROUND LOCK */
.bg-lock {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.bg-title {
  position: absolute;
  top: 20%;
  width: 100%;
  opacity: 0.3;
}

.bg-logo {
  position: absolute;
  bottom: 10%;
  width: 100%;
  opacity: 0.3;
}

/* FIXED BANNER LOGO */
.bannerlogo-fixed {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 120px;
  z-index: 10;
}

/* BANNER */
.banner {
  height: 100vh;
  overflow: hidden;
}

.banner-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  animation: bannerAnim 2s ease forwards;
}

@keyframes bannerAnim {
  0% {
    filter: brightness(2);
    height: 100vh;
  }
  100% {
    filter: brightness(1);
    height: auto;
  }
}

/* CONTENT */
.content {
  text-align: center;
  padding: 50px 20px;
}

.title-img {
  margin-top: 50px;
  width: 60%;
}

.description {
  margin: 40px auto;
  width: 50%;
}

/* VIDEOS */
.videos {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.video-box {
  position: relative;
}

video {
  width: 300px;
  border-radius: 10px;
}

/* GLASS TEXT */
.glass-text {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  padding: 6px 16px;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
}

/* BUTTONS */
.buttons {
  margin-top: 40px;
}

.btn {
  margin: 10px;
  padding: 12px 30px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  transition: 0.3s;
  display: inline-block;
}

.btn:hover {
  background: white;
  color: black;
  transform: scale(1.05);
}

/* MOBILE */
@media (max-width: 768px) {

  .banner-img {
    content: url("banner.jpg");
  }

  video {
    display: none;
  }

  .video-box {
    width: 250px;
    height: 400px;
    background-size: cover;
    background-position: center;
  }

  .video-box:nth-child(1) {
    background-image: url("reelminiature.png");
  }

  .video-box:nth-child(2) {
    background-image: url("video2miniature.png");
  }

  .glass-text {
    font-size: 12px;
  }
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg-lock">
  <img src="title.png" class="bg-title">
  <img src="logo.png" class="bg-logo">
</div>

<!-- FIXED LOGO -->
<a href="#">
  <img src="bannerlogo.png" class="bannerlogo-fixed">
</a>

<!-- BANNER -->
<section class="banner">
  <img src="banner.png" class="banner-img">
</section>

<!-- CONTENT -->
<section class="content">

  <img src="title.png" class="title-img">

  <img src="description.png" class="description">

  <!-- VIDEOS -->
  <div class="videos">

    <div class="video-box">
      <video id="video1" loop muted autoplay>
        <source src="reel.mp4">
      </video>
      <div class="glass-text" onclick="toggleSound('video1', this)">
        tap for sound
      </div>
    </div>

    <div class="video-box">
      <video id="video2" loop muted autoplay>
        <source src="video2.mp4">
      </video>
      <div class="glass-text" onclick="toggleSound('video2', this)">
        tap for sound
      </div>
    </div>

  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <a href="work.html" class="btn">MY WORK</a>
    <a href="contact.html" class="btn">CONTACT</a>
  </div>

</section>

<script>

/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu", e => e.preventDefault());

/* DISABLE DEVTOOLS BASIC */
document.onkeydown = function(e) {
  if (e.keyCode == 123) return false;
  if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
};

/* VIDEO SOUND TOGGLE */
function toggleSound(id, el) {
  let vid = document.getElementById(id);

  if (vid.muted) {
    vid.muted = false;
    el.innerText = "tap to mute";
  } else {
    vid.muted = true;
    el.innerText = "tap for sound";
  }
}

</script>

</body>
</html>
