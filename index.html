<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Brand</title>

<style>
/* ---------- CUSTOM FONT ---------- */
@font-face {
  font-family: 'Orbitron';
  src: url('Orbitron.ttf') format('truetype');
}

/* ---------- RESET ---------- */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  overflow-x: hidden;
}

/* ---------- BANNER ---------- */
.banner {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}

/* LOGO + NAME */
.banner-content {
  position: absolute;
  bottom: 12%;
  left: 5%;
  display: flex;
  align-items: center;
  gap: 14px;
}

.banner-logo {
  width: 70px;
  transition: 0.4s ease;
}

.banner-logo.scrolled {
  transform: scale(0.6) translateY(-20px);
  opacity: 0.7;
}

.banner-title {
  font-size: 30px;
  letter-spacing: 3px;
}

/* ---------- CENTER BACKGROUND LOGO ---------- */
.bg-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 200px;
  opacity: 0.5;
  z-index: 0;
  pointer-events: none;
}

/* ---------- HERO ---------- */
.hero {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 2;
}

.description {
  font-size: 26px;
  letter-spacing: 2px;
}

.description span {
  display: block;
  font-size: 16px;
  color: #aaa;
  margin-top: 8px;
  letter-spacing: 3px;
}

/* BUTTON */
.btn {
  display: inline-block;
  margin-top: 25px;
  padding: 12px 30px;
  border: 1px solid #fff;
  color: #fff;
  text-decoration: none;
  letter-spacing: 2px;
  transition: 0.3s;
}

.btn:hover {
  background: #fff;
  color: #000;
}

/* ---------- VIDEO SECTION ---------- */
.video-section {
  margin-top: 100vh;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 60px 20px;
}

video {
  width: 320px;
  max-width: 100%;
}

/* ---------- MOBILE ---------- */
@media (max-width: 768px) {
  .banner-logo {
    width: 50px;
  }

  .banner-title {
    font-size: 22px;
  }

  .bg-logo {
    width: 140px;
  }

  .description {
    font-size: 20px;
  }

  .video-section {
    flex-direction: column;
  }
}
</style>
</head>

<body oncontextmenu="return false">

<!-- BACKGROUND LOGO -->
<img src="logo.png" class="bg-logo" alt="logo">

<!-- BANNER -->
<section class="banner">
  <img src="your-banner.jpg" alt="banner">

  <div class="banner-content">
    <img src="logo.png" class="banner-logo" id="logoAnim" alt="logo">
    <div class="banner-title">Your Brand</div>
  </div>
</section>

<!-- HERO TEXT -->
<div class="hero">
  <div class="description">
    action sports and concerts
    <span>videomaker and photographer</span>
  </div>

  <a href="#" class="btn">View Work</a>
</div>

<!-- VIDEOS -->
<section class="video-section">
  <video src="reel.mp4" autoplay muted loop playsinline></video>
  <video src="video2.mp4" autoplay muted loop playsinline></video>
</section>

<script>
// Scroll animation (early trigger)
window.addEventListener("scroll", () => {
  const logo = document.getElementById("logoAnim");
  if (window.scrollY > 20) {
    logo.classList.add("scrolled");
  } else {
    logo.classList.remove("scrolled");
  }
});

// Disable drag
document.addEventListener("dragstart", e => e.preventDefault());
</script>

</body>
</html>
