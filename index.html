<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
    overflow-x: hidden;
}

/* ===== HEADER ===== */
.header {
    position: fixed;
    top: 20px;
    right: 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    z-index: 50;
    cursor: pointer;
}

.header img {
    width: 60px;
}

.header span {
    font-size: 18px;
    text-shadow: 0 0 10px rgba(0,0,0,0.9);
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
}

/* ===== BANNER ===== */
.banner {
    position: absolute;
    top: 0;
    width: 100%;
    height: 160px;
    z-index: 1;
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ===== CENTER LOGO ===== */
.center-logo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70vw;
    opacity: 0.4;
    z-index: 1;
}

/* ===== TEXT ===== */
.center-text {
    position: absolute;
    top: 180px;
    width: 100%;
    text-align: center;
    z-index: 3;
}

.center-text p {
    font-size: 18px;
}

/* ===== VIDEOS ===== */
.videos {
    margin-top: 260px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
}

.videos video {
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
}

/* ===== GRID ===== */
.grid {
    padding: 60px 20px;
}

/* ===== DESKTOP (UNCHANGED) ===== */
@media (min-width: 901px) {

/* KEEP YOUR ORIGINAL DESKTOP STYLES HERE (UNCHANGED) */

.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    z-index: 2;
}

.left { left: calc(50% - 550px); }
.right { right: calc(50% - 550px); }

.center-logo {
    position: fixed;
    width: 65vw;
    max-width: 900px;
}

.center-text {
    position: relative;
    margin-top: 200px;
}

.videos {
    display: none;
}

}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <img src="logo.png">
    <span>ALEJANDRO MAZO</span>
</div>

<!-- HERO -->
<section class="hero">

    <div class="banner">
        <img src="banner.jpg">
    </div>

    <img src="logo.png" class="center-logo">

    <div class="center-text">
        <p>
            action sports and concerts<br>
            videographer and photographer
        </p>
    </div>

    <!-- MOBILE VIDEOS -->
    <div class="videos">
        <video muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>

        <video muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

</section>

<script>

/* SMART AUDIO PLAY BASED ON VISIBILITY */

const videos = document.querySelectorAll("video");

const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
        const video = entry.target;

        if (entry.intersectionRatio > 0.7) {
            video.muted = false;
            video.play();
        } else {
            video.muted = true;
        }
    });
}, {
    threshold: [0.7]
});

videos.forEach(video => {
    observer.observe(video);
    video.play();
});

</script>

</body>
</html>
