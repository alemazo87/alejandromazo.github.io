<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  z-index:10;
}

.banner img{
  width:100%;
  display:block;
}

/* FIXED LOGO (NO STRETCH EVER) */
.banner-logo{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  height:22px;
  width:auto;
  object-fit:contain;
}

/* ===== BACKGROUND LAYER ===== */
.bg-layer{
  position:fixed;
  width:100%;
  text-align:center;
  pointer-events:none;
  z-index:1;
}

/* TITLE */
.title img{
  width:600px;
  max-width:90%;
  opacity:0.25;
}

/* LOGO */
.logo img{
  width:520px;
  max-width:85%;
  margin-top:18px;
  opacity:0.2;
}

/* ===== MAIN ===== */
.main{
  margin-top:260px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
  position:relative;
  z-index:5;
}

/* VIDEOS */
.side{
  width:280px;
  position:relative;
}

.side video{
  width:100%;
  border-radius:14px;
  object-fit:cover;
}

/* TEXT OVER VIDEO */
.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
  pointer-events:none;
}

/* CENTER BLOCK */
.center-wrap{
  display:flex;
  justify-content:center;
  width:100%;
}

.center{
  max-width:520px;
  width:100%;
  text-align:center;
}

/* DESCRIPTION */
.center img{
  width:100%;
  max-width:520px;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-top:18px;
}

.btn{
  padding:12px 24px;
  border:1px solid white;
  cursor:pointer;
  transition:0.25s ease;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== IMAGES ===== */
.images{
  margin-top:160px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:30px;
  padding:0 6%;
}

.center-stack{
  display:grid;
  grid-template-rows:1fr 1fr;
  gap:10px;
}

.images img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
}

/* ===== MOBILE VIDEO THUMB ===== */
.video-thumb{
  display:none;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .banner-logo{
    height:20px;
    left:14px;
  }

  .main{
    flex-direction:column;
    margin-top:160px;
    gap:25px;
  }

  .side{
    display:none;
  }

  .bg-layer{
    position:absolute; /* prevents weird scroll behavior */
  }

  .title img{
    width:85%;
  }

  .logo img{
    width:65%;
    margin-top:12px;
  }

  .center{
    max-width:340px;
  }

  .center img{
    max-width:340px;
  }

  .buttons{
    gap:10px;
  }

  .btn{
    padding:10px 16px;
    font-size:12px;
  }

  /* VIDEO THUMBNAILS */
  .video-thumb{
    display:block;
    width:92%;
    margin:20px auto;
    position:relative;
    border-radius:12px;
    overflow:hidden;
  }

  .video-thumb img{
    width:100%;
  }

  .video-thumb span{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0.7;
    font-size:12px;
  }

  .images{
    display:block;
    padding:0 4%;
  }

  .images img{
    margin:14px 0;
  }
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png" alt="">
  </picture>

  <img src="bannerlogo.png" class="banner-logo" alt="">
</div>

<!-- BACKGROUND -->
<div class="bg-layer" id="bg">
  <div class="title">
    <img src="title.png" alt="">
  </div>
  <div class="logo">
    <img src="logo.png" alt="">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="side">
    <video id="reel" loop muted autoplay playsinline preload="metadata">
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="center-wrap">
    <div class="center">
      <img src="description.png" alt="">

      <div class="buttons">
        <div class="btn" onclick="goPage('work.html')">MY WORK</div>
        <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
      </div>
    </div>
  </div>

  <div class="side">
    <video id="video2" loop muted autoplay playsinline preload="metadata">
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<!-- MOBILE VIDEOS -->
<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png" alt="">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png" alt="">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">
  <div><img src="image4.jpg" alt=""></div>

  <div class="center-stack">
    <img src="image2.jpg" alt="">
    <img src="image3.jpg" alt="">
  </div>

  <div><img src="image1.jpg" alt=""></div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
/* DYNAMIC BACKGROUND OFFSET */
const banner = document.querySelector(".banner");
const bg = document.getElementById("bg");

function updateOffset(){
  bg.style.top = banner.offsetHeight + "px";
}

window.addEventListener("load", updateOffset);
window.addEventListener("resize", updateOffset);

/* BUTTON SOUND */
function goPage(page){
  const s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},180);
}

/* VIDEO SOUND TOGGLE */
function setup(v,t){
  const vid=document.getElementById(v);
  const txt=document.getElementById(t);

  vid.addEventListener("click", ()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  });
}

setup("reel","reelText");
setup("video2","video2Text");

/* MOBILE VIDEO PLAYER */
function openVideo(src){
  const v=document.createElement("video");
  v.src=src;
  v.controls=true;
  v.autoplay=true;

  Object.assign(v.style,{
    position:"fixed",
    top:0,
    left:0,
    width:"100%",
    height:"100%",
    background:"#000",
    zIndex:9999
  });

  document.body.appendChild(v);

  v.addEventListener("click", ()=>v.remove());
}
</script>

</body>
</html>
