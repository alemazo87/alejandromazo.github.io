<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  user-select:none;
}

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:16vh;
  min-height:100px;
  background:url("bannerMOBILE.jpg") center/cover no-repeat;
}

@media(min-width:768px){
  .banner{
    background:url("banner.png") center/cover no-repeat;
    height:140px;
  }
}

/* ===== NAV LOGO ===== */
.bannerlogo{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
}

@media(min-width:768px){
  .bannerlogo{
    left:40px;
    transform:none;
    width:180px;
  }
}

/* ===== VISUAL LAYER ===== */
.visual{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  text-align:center;
}

.title{
  width:70vw;
  max-width:700px;
  opacity:0.25;
}

.logo{
  width:230px;
  margin-top:12px;
  opacity:0.25;
}

/* ===== CENTER CONTENT (FIXED ALIGNMENT) ===== */
.center{
  position:absolute;
  top:58%; /* aligned to logo visual center */
  left:50%;
  transform:translate(-50%,-50%);

  z-index:2;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;

  width:90%;
  max-width:520px;
}

.description{
  width:100%;
}

/* ===== BUTTONS ===== */
.buttons{
  display:flex;
  gap:20px;
}

.btn{
  padding:10px 25px;
  border:1px solid #fff;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* ===== VIDEO ===== */
.video{
  border-radius:28px;
  overflow:hidden;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
}

.video video{
  width:100%;
  height:auto;
  object-fit:contain;
}

/* ===== MOBILE VIDEOS ===== */
.mobile{
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
  margin-top:-200px;
}

.videos{
  width:100%;
  margin-top:500px;
  display:flex;
  flex-direction:column;
  gap:30px;
}

/* ===== DESKTOP ===== */
.desktop{
  display:none;
}

@media(min-width:1024px){

  .desktop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:100px 80px;
  }

  .video{
    width:32%;
  }
}

/* ===== GALLERY ===== */
.gallery{
  padding:80px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.gallery img{
  width:100%;
  max-width:700px;
}

/* DESKTOP GALLERY */
@media(min-width:1024px){

  .gallery{
    flex-direction:row;
    justify-content:center;
    gap:60px;
  }

  .gallery img{
    max-width:520px;
  }

  .stack{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .center-img{
    transform:scale(1.12);
  }
}
</style>
</head>

<body oncontextmenu="return false;">

<audio id="clickSound" src="click.mp3"></audio>

<div class="banner"></div>

<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- VISUAL -->
<div class="visual">
  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
</div>

<!-- CENTER CONTENT -->
<div class="center">
  <img src="description.png" class="description">

  <div class="buttons">
    <div class="btn" onclick="go('work.html')">MY WORK</div>
    <div class="btn" onclick="go('contact.html')">CONTACT</div>
  </div>
</div>

<!-- MOBILE VIDEOS -->
<div class="mobile">
  <div class="videos">

    <div class="video">
      <video src="reel.mp4" autoplay muted loop playsinline></video>
    </div>

    <div class="video">
      <video src="video2.mp4" autoplay muted loop playsinline></video>
    </div>

  </div>
</div>

<!-- DESKTOP VIDEOS -->
<div class="desktop">

  <div class="video">
    <video src="reel.mp4" autoplay muted loop playsinline></video>
  </div>

  <div style="width:30%"></div>

  <div class="video">
    <video src="video2.mp4" autoplay muted loop playsinline></video>
  </div>

</div>

<!-- GALLERY -->
<div class="gallery">

  <img src="image4.jpg">

  <div class="stack">
    <img src="image5.jpg">
    <img src="image2.jpg" class="center-img">
    <img src="image3.jpg">
  </div>

  <img src="image1.jpg">

</div>

<script>
function go(page){
  const s = document.getElementById("clickSound");
  s.currentTime = 0;
  s.play();
  setTimeout(()=>{ window.location.href = page; },120);
}
</script>

</body>
</html>
