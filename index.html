<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Videographer & Photographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

/ ===== BASE ===== /
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
}

/ ===== FULLSCREEN BANNER ===== /
.banner {
    height: 100vh;
    background: url('banner.jpg') center/cover no-repeat;
    position: relative;
}

/ HEADER (INSIDE BANNER + FLOATING ON SCROLL) /
.header {
    position: absolute;
    bottom: 20px;
    right: 30px;
    display: flex;
    align-items: center;
    gap: 12px;
    z-index: 10;
}

/ When scrolling /
.header.fixed {
    position: fixed;
    top: 20px;
    bottom: auto;
}

/ HEADER STYLE /
.header img {
    width: 40px;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.7));
}

.header span {
    font-size: 22px;
    text-shadow: 0 4px 12px rgba(0,0,0,0.7);
}

/ ===== HERO ===== /
.hero {
    position: relative;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/ CENTER LOGO (FIXED CENTER) /
.center-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 500px;
    opacity: 0.5;
    z-index: 0;
    pointer-events: none;
}

/ DESCRIPTION /
.center-text {
    position: relative;
    text-align: center;
    z-index: 2;
    font-weight: normal;
}

.center-text p {
    font-size: 18px;
    margin-bottom: 20px;
}

/ BUTTON /
.btn {
    border: 2px solid white;
    padding: 12px 30px;
    text-decoration: none;
    color: white;
    display: inline-block;
    transition: transform 0.15s ease, background 0.2s ease;
}

.btn:active {
    transform: scale(0.92);
    background: white;
    color: black;
}

/ SIDE VIDEOS /
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    height: 420px;
    overflow: hidden;
    z-index: 1;
}

.left { left: 8%; }
.right { right: 8%; }

.side video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/ ===== GRID ===== */
.grid {
    display: flex;
    gap: 40px;
    padding: 100px 120px;
    align-items: flex-start;
}

.left-img,
.right-img {
    width: 25%;
    height: 520px;
    object-fit: cover;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 40px;
}

.middle img {
    width: 100%;
    height: 250px;
    object-fit: cover;
}

</style>
</head>

<body>

<!-- ===== BANNER ===== -->
<section class="banner">

    <div class="header" id="header">
        <img src="logo.png">
        <span>Alejandro Mazo</span>
    </div>

</section>

<!-- ===== HERO ===== -->
<section class="hero">

    <img src="logo.png" class="center-logo">

    <div class="side left">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="side right">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="center-text">
        <p>
            Action sports and concerts<br>
            videographer and photographer
        </p>

        <a href="#work" class="btn">SEE MEDIA</a>
    </div>

</section>

<!-- ===== GRID ===== -->
<section class="grid" id="work">

    <img src="image1.jpg" class="left-img">

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <img src="image4.jpg" class="right-img">

</section>

<script>
window.addEventListener("scroll", function() {
    const header = document.getElementById("header");
    if (window.scrollY > window.innerHeight - 100) {
        header.classList.add("fixed");
    } else {
        header.classList.remove("fixed");
    }
});
</script>

</body>
</html>
