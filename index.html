<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* FONT */
@font-face {
  font-family: 'Orbitron';
  src: url('Orbitron.ttf') format('truetype');
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Orbitron', sans-serif;
}

body {
  background:black;
  color:white;
  overflow-x:hidden;
  text-align:center;
}

/* BANNER */
.banner {
  width:100%;
}

.banner img {
  width:100%;
  height:auto;
  display:block;
}

/* NAV LOGO (300% + PARALLAX) */
.bannerlogo {
  position:fixed;
  top:20px;
  left:20px;
  max-width:360px;
  z-index:10;
}

/* BACKGROUND (FIXED, NO REPEAT) */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  top:0;
  left:0;
  z-index:-2;
  overflow:hidden;
}

.bg img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CENTER LOGO (ONLY ONE INSTANCE) */
.center-logo {
  width:120px;
  opacity:0.3;
}

/* CENTER MEDIA */
.center-media {
  margin-top:100px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  flex-wrap:wrap;
}

video {
  width:260px;
  max-width:90vw;
  border-radius:12px;
}

/* GRID (RESTORED STRUCTURE) */
.gallery {
  margin:80px auto;
  width:90%;
  display:flex;
  justify-content:center;
  gap:30px;
  flex-wrap:wrap;
}

/* LEFT & RIGHT */
.side {
  width:260px;
  max-width:100%;
}

/* CENTER STACK */
.stack {
  display:flex;
  flex-direction:column;
  gap:20px;
  width:320px;
  max-width:100%;
}

.gallery img {
  width:100%;
  height:auto;
  display:block;
  border-radius:10px;
}

/* MOBILE */
@media (max-width:768px){

  .center-media {
    flex-direction:column;
  }

  video {
    width:90%;
  }

  .bannerlogo {
    max-width:200px;
  }

  .gallery {
    flex-direction:column;
    align-items:center;
  }

}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <img src="video2miniature.png">
</div>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">
</div>

<!-- NAV -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo" id="navLogo">
</a>

<!-- CENTER MEDIA -->
<div class="center-media">

  <video muted loop autoplay playsinline>
    <source src="reel.mp4" type="video/mp4">
  </video>

  <img src="logo.png" class="center-logo">

  <video muted loop autoplay playsinline>
    <source src="video2.mp4" type="video/mp4">
  </video>

</div>

<!-- GALLERY (FIXED STACK) -->
<div class="gallery">

  <div class="side">
    <img src="image4.jpg">
  </div>

  <div class="stack">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="side">
    <img src="image1.jpg">
  </div>

</div>

<script>

/* PARALLAX NAV LOGO */
window.addEventListener("scroll", () => {
  let y = window.scrollY;
  document.getElementById("navLogo").style.transform =
    "translateY(" + (y * 0.3) + "px)";
});

</script>

</body>
</html>
