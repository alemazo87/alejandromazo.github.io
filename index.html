<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body {
  background:black;
  overflow-x:hidden;
  user-select:none;
  transition: opacity 0.6s ease;
}

/* PAGE TRANSITION */
body.fade-out {
  opacity:0;
}

/* Disable right click */
body { -webkit-touch-callout:none; }
html { -webkit-user-select:none; }

/* Banner */
.banner {
  width:100%;
  height:100vh;
  background:url("banner.png") center/cover no-repeat;
  position:relative;
  will-change: transform;
}

@media(max-width:768px){
  .banner {
    background:url("bannerMOBILE.jpg") center/cover no-repeat;
  }
}

/* Banner Logo */
.banner-logo {
  position:absolute;
  left:5%;
  top:50%;
  transform:translateY(-50%);
  width:120px;
  z-index:10;
  cursor:pointer;
  transition: transform 0.4s ease;
}

.banner-logo:hover {
  transform:translateY(-50%) scale(1.05);
}

/* Sticky mobile */
@media(max-width:768px){
  .banner-logo {
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
  }
}

/* Title */
.title {
  position:fixed;
  top:calc(100vh + 30px);
  width:100%;
  text-align:center;
  opacity:0.3;
  will-change: transform;
}

.title img { width:300px; }

/* Logo */
.logo {
  position:fixed;
  top:calc(100vh + 100px);
  width:100%;
  text-align:center;
  opacity:0.3;
  will-change: transform;
}

.logo img { width:200px; }

/* Description */
.description {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%) scale(1.5);
  z-index:5;
  animation: float 6s ease-in-out infinite;
}

/* FLOATING EFFECT */
@keyframes float {
  0% { transform:translate(-50%,-50%) scale(1.5) translateY(0px);}
  50% { transform:translate(-50%,-50%) scale(1.5) translateY(-10px);}
  100% { transform:translate(-50%,-50%) scale(1.5) translateY(0px);}
}

/* Buttons */
.buttons { margin-top:20px; }

.btn {
  display:inline-block;
  margin:10px;
  padding:12px 30px;
  border:1px solid white;
  color:white;
  cursor:pointer;
  transition: all 0.3s ease;
}

.btn:hover {
  background:white;
  color:black;
  transform:scale(1.05);
}

.btn:active {
  transform:scale(0.95);
}

/* Videos */
.video-left, .video-right {
  position:fixed;
  top:50%;
  width:20%;
  transform:translateY(-50%);
  transition: transform 0.3s ease;
}

.video-left { left:5%; }
.video-right { right:5%; }

video {
  width:100%;
}

.video-text {
  position:absolute;
  width:100%;
  top:50%;
  text-align:center;
  transform:translateY(-50%);
  color:white;
  opacity:0.5;
}

/* Gallery */
.gallery {
  margin-top:120vh;
  display:flex;
  justify-content:space-around;
  flex-wrap:wrap;
}

.gallery img {
  width:22%;
  margin:10px;
  transition: transform 0.4s ease;
}

.gallery img:hover {
  transform:scale(1.05);
}

/* MOBILE */
@media(max-width:768px){

  .video-left, .video-right { display:none; }

  .gallery img { width:90%; }

  .video-thumb {
    width:90%;
    margin:20px auto;
    position:relative;
  }

  .video-thumb img { width:100%; }

  .video-thumb span {
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    transform:translateY(-50%);
    color:white;
    opacity:0.6;
  }
}

</style>
</head>

<body oncontextmenu="return false">

<a href="index.html">
<img src="bannerlogo.png" class="banner-logo">
</a>

<div class="banner"></div>

<div class="title">
<img src="title.png">
</div>

<div class="logo">
<img src="logo.png">
</div>

<div class="description">
<img src="description.png">
<div class="buttons">
  <div class="btn" onclick="goPage('work.html')">MY WORK</div>
  <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
</div>
</div>

<div class="video-left">
  <video id="reel" loop muted>
    <source src="reel.mp4">
  </video>
  <div class="video-text" id="reelText">tap for sound</div>
</div>

<div class="video-right">
  <video id="video2" loop muted>
    <source src="video2.mp4">
  </video>
  <div class="video-text" id="video2Text">tap for sound</div>
</div>

<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<div class="gallery">
  <img src="image1.jpg">
  <img src="image2.jpg">
  <img src="image3.jpg">
  <img src="image4.jpg">
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* PAGE TRANSITION */
function goPage(page){
  let sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play();

  document.body.classList.add("fade-out");

  setTimeout(()=>{
    window.location.href = page;
  },500);
}

/* VIDEO SOUND TOGGLE */
function setupVideo(videoId, textId){
  const video = document.getElementById(videoId);
  const text = document.getElementById(textId);

  video.play();

  video.addEventListener("click", () => {
    if(video.muted){
      video.muted = false;
      text.innerText = "tap to mute";
    } else {
      video.muted = true;
      text.innerText = "tap for sound";
    }
  });
}

setupVideo("reel","reelText");
setupVideo("video2","video2Text");

/* PARALLAX */
window.addEventListener("scroll", ()=>{
  let scroll = window.scrollY;

  document.querySelector(".banner").style.transform =
    "translateY(" + scroll * 0.2 + "px)";

  document.querySelector(".title").style.transform =
    "translateY(" + scroll * 0.1 + "px)";

  document.querySelector(".logo").style.transform =
    "translateY(" + scroll * 0.05 + "px)";
});

/* MOBILE FULLSCREEN VIDEO */
function openVideo(src){
  const vid = document.createElement("video");
  vid.src = src;
  vid.autoplay = true;
  vid.controls = true;

  vid.style.position="fixed";
  vid.style.top=0;
  vid.style.left=0;
  vid.style.width="100%";
  vid.style.height="100%";
  vid.style.zIndex=999;

  document.body.appendChild(vid);

  vid.addEventListener("touchstart", ()=>{
    vid.remove();
  });
}

</script>

</body>
</html>
