<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Videographer & Photographer</title>

<style>
/* ===== RESET & BASE ===== */
*,
*::before,
*::after {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* ===== BANNER ===== */
.banner {
    height: 220px;
    display: flex;
    align-items: center;
    padding-left: 40px;
}

.banner h1 {
    font-size: 28px;
    margin: 0;
    letter-spacing: 1px;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

/* LEFT VIDEO (only one side) */
.side-video {
    position: absolute;
    left: 5%;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    height: 380px;
    overflow: hidden;
    border-radius: 10px;
}

.side-video video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* CENTER TEXT */
.center-text {
    text-align: center;
    max-width: 500px;
    z-index: 2;
}

.center-text p {
    margin-bottom: 20px;
    font-size: 18px;
    line-height: 1.5;
    opacity: 0.9;
}

/* BUTTON */
.btn {
    display: inline-block;
    border: 2px solid white;
    padding: 12px 30px;
    text-decoration: none;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

.btn:hover {
    background: white;
    color: black;
}

/* ===== 4-IMAGE GRID ===== */
.image-grid {
    display: flex;
    gap: 30px;
    padding: 80px 40px;
    flex-wrap: wrap;
    justify-content: center;
}

.grid-img {
    flex: 1 1 220px;  /* flexible, min width 220px */
    max-width: 280px;
    height: auto;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: 12px;
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
    .side-video {
        display: none;  /* hide side video on smaller screens */
    }

    .hero {
        min-height: 60vh;
    }

    .image-grid {
        padding: 50px 20px;
        gap: 20px;
    }
}

@media (max-width: 600px) {
    .banner {
        padding-left: 20px;
    }

    .banner h1 {
        font-size: 22px;
    }

    .center-text p {
        font-size: 16px;
    }
}
</style>
</head>
<body>

<!-- ===== BANNER (text only) ===== -->
<div class="banner">
    <h1>ALEJANDRO MAZO</h1>
</div>

<!-- ===== HERO SECTION ===== -->
<section class="hero">

    <!-- LEFT VIDEO (Video 2) -->
    <div class="side-video">
        <video autoplay muted loop playsinline poster="fallback-video2.jpg">
            <source src="video2.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>

    <!-- CENTER TEXT -->
    <div class="center-text">
        <p>
            Action sports and concerts<br>
            videographer and photographer
        </p>
        <a href="#work" class="btn">SEE MEDIA</a>
    </div>

</section>

<!-- ===== 4-IMAGE GRID (Image 1-4) ===== -->
<section class="image-grid" id="work">
    <img src="image1.jpg" alt="Action sports shot 1" class="grid-img">
    <img src="image2.jpg" alt="Concert photography 2" class="grid-img">
    <img src="image3.jpg" alt="Action sports shot 3" class="grid-img">
    <img src="image4.jpg" alt="Concert photography 4" class="grid-img">
</section>

</body>
</html>
