<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Brand</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #000;
  color: #fff;
  overflow-x: hidden;
}

/* Disable selection + dragging */
body {
  -webkit-user-select: none;
  user-select: none;
}
img, video {
  pointer-events: none;
  -webkit-user-drag: none;
}

/* NAVBAR */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  z-index: 1000;
  padding: 10px 20px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

/* BANNER */
.banner {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: contain; /* NO CROPPING */
}

/* NAME + LOGO inside banner */
.banner-content {
  position: absolute;
  bottom: 12%;
  left: 5%;
  display: flex;
  align-items: center;
  gap: 12px;
}

.banner-logo {
  width: 65px;
  transition: all 0.6s ease;
}

.banner-title {
  font-size: 26px;
  font-weight: 500;
}

/* LOGO SCROLL ANIMATION */
.banner-logo.scrolled {
  transform: scale(0.6) translateY(-20px);
  opacity: 0.7;
}

/* BACKGROUND CENTER LOGO */
.background-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 140px; /* 20% smaller */
  opacity: 0.5;
  z-index: 0;
}

/* HERO */
.hero {
  position: relative;
  z-index: 2;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

/* DESCRIPTION */
.description {
  text-align: center;
  font-size: 24px;
  line-height: 1.4;
}

.description span {
  display: block;
  font-size: 16px;
  color: #aaa;
  margin-top: 5px;
}

/* BUTTON */
.btn {
  margin-top: 25px;
  padding: 12px 30px;
  border: 1px solid #fff;
  color: #fff;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  background: #fff;
  color: #000;
}

/* VIDEO SECTION */
.video-section {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 20px;
  padding: 60px 20px;
}

video {
  width: 320px;
}

/* MOBILE */
@media (max-width: 768px) {
  .video-section {
    flex-direction: column;
  }

  .banner-content {
    bottom: 10%;
    left: 5%;
  }

  .banner-logo {
    width: 50px;
  }

  .background-logo {
    width: 100px;
  }
}
</style>
</head>

<body oncontextmenu="return false">

<!-- BACKGROUND LOGO -->
<img src="logo.png" class="background-logo">

<!-- BANNER -->
<section class="banner">
  <img src="your-banner.jpg" alt="banner">

  <div class="banner-content">
    <img src="logo.png" class="banner-logo" id="logoAnim">
    <div class="banner-title">Your Brand</div>
  </div>
</section>

<!-- HERO -->
<section class="hero">
  <div class="description">
    action sports and concerts
    <span>videomaker and photographer</span>
  </div>

  <a href="#" class="btn">View Work</a>
</section>

<!-- VIDEOS -->
<section class="video-section">
  <video src="video1.mp4" autoplay muted loop playsinline></video>
  <video src="video2.mp4" autoplay muted loop playsinline></video>
</section>

<script>
// Scroll animation (triggers earlier)
window.addEventListener("scroll", function () {
  const logo = document.getElementById("logoAnim");
  if (window.scrollY > 40) {
    logo.classList.add("scrolled");
  } else {
    logo.classList.remove("scrolled");
  }
});

// Disable drag
document.addEventListener("dragstart", e => e.preventDefault());
</script>

</body>
</html>
