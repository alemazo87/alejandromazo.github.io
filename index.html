<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | FMX Videographer & Photographer</title>

<style>
/* FONT */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
}

/* STICKY LOGO */
.sticky-logo {
    position: fixed;
    top: 20px;
    left: 20px;
    width: 70px;
    z-index: 1000;
    cursor: pointer;
}

/* BANNER */
.banner {
    width: 100%;
    height: 450px;
    background: url('banner.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    padding-left: 80px;
}

.banner-content {
    display: flex;
    align-items: center;
    gap: 30px;
}

/* LOGO LEFT OF NAME */
.banner-logo {
    width: 160px; /* bigger */
}

.banner h1 {
    font-size: 48px;
    letter-spacing: 6px;
}

/* HERO SECTION */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 80px;
    position: relative;
}

/* BIG BACKGROUND LOGO */
.hero::before {
    content: "";
    position: absolute;
    background: url('logo.png') center/contain no-repeat;
    opacity: 0.05;
    width: 400px;
    height: 400px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* TEXT */
.hero-text {
    max-width: 400px;
    z-index: 2;
}

.hero-text p {
    font-size: 18px;
    line-height: 1.6;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 25px;
    border: 2px solid white;
    text-decoration: none;
    color: white;
}

/* VIDEO (VERTICAL) */
.hero-video video {
    width: 260px;
    border-radius: 15px;
}

/* GALLERY */
.gallery {
    display: flex;
    gap: 20px;
    padding: 40px;
}

.gallery img {
    width: 33%;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
}
</style>
</head>

<body>

<!-- STICKY LOGO -->
<a href="#">
    <img src="logo.png" class="sticky-logo">
</a>

<!-- BANNER -->
<div class="banner">
    <div class="banner-content">
        <img src="logo.png" class="banner-logo">
        <h1>ALEJANDRO MAZO</h1>
    </div>
</div>

<!-- HERO -->
<section class="hero">

    <!-- TEXT -->
    <div class="hero-text">
        <p>action sports and concerts videomaker and photographer</p>
        <a href="#work" class="btn">View Work</a>
    </div>

    <!-- VIDEO -->
    <div class="hero-video">
        <video src="reel.mp4" autoplay muted loop playsinline></video>
    </div>

</section>

<!-- GALLERY -->
<section id="work" class="gallery">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</section>

<footer>
    © Alejandro Mazo
</footer>

</body>
</html>
