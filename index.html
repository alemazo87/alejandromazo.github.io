<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Videographer & Photographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

/* ===== RESET ===== */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
}

/* ===== BANNER ===== */
.banner {
    height: 220px;
    display: flex;
    align-items: center;
    padding-left: 40px;
}

.banner h1 {
    font-size: 28px;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 12px;
    letter-spacing: 2px;
}

.banner img {
    width: 40px;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* BIG FLOATING LOGO */
.center-logo {
    position: absolute;
    width: 420px;
    opacity: 0.08;
    z-index: 0;
}

/* CENTER TEXT */
.center-text {
    text-align: center;
    z-index: 2;
}

.center-text p {
    margin-bottom: 20px;
    opacity: 0.8;
    font-size: 16px;
    line-height: 1.4;
    letter-spacing: 1px;
}

/* BUTTON */
.btn {
    border: 2px solid white;
    padding: 12px 30px;
    text-decoration: none;
    color: white;
    letter-spacing: 1px;
}
.btn:hover {
    background: white;
    color: black;
}

/* SIDE IMAGES */
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 260px;
    height: 420px;
    overflow: hidden;
}

.left { left: 8%; }
.right { right: 8%; }

.side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 10px;
}

/* ===== GRID ===== */
.grid {
    display: flex;
    gap: 30px;
    padding: 80px 120px;
}

/* LEFT + RIGHT */
.left-img,
.right-img {
    width: 25%;
    height: 500px;
    object-fit: cover;
    border-radius: 12px;
}

/* MIDDLE */
.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

.middle img {
    width: 100%;
    height: 235px;
    object-fit: cover;
    border-radius: 12px;
}

</style>
</head>

<body>

<!-- ===== BANNER ===== -->
<div class="banner">
    <h1>
        <img src="logo.png">
        ALEJANDRO MAZO
    </h1>
</div>

<!-- ===== HERO ===== -->
<section class="hero">

    <!-- BIG BACKGROUND LOGO -->
    <img src="logo.png" class="center-logo">

    <!-- LEFT IMAGE -->
    <div class="side left">
        <img src="image1.jpg">
    </div>

    <!-- RIGHT IMAGE -->
    <div class="side right">
        <img src="image4.jpg">
    </div>

    <!-- CENTER TEXT -->
    <div class="center-text">
        <p>
            Action sports and concerts<br>
            videographer & photographer
        </p>
        <a href="#work" class="btn">SEE MEDIA</a>
    </div>

</section>

<!-- ===== GRID ===== -->
<section class="grid" id="work">

    <img src="image1.jpg" class="left-img">

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <img src="image4.jpg" class="right-img">

</section>

</body>
</html>
