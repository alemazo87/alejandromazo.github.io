<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* FONT */
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
  user-select: none;
}

/* LOCKED BACKGROUND */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.bg img {
  position: absolute;
  width: 100%;
  opacity: 0.3;
  pointer-events: none;
}

.bg-title {
  top: 5%;
}

.bg-logo {
  top: 20%;
}

/* BANNER (FIXED) */
.banner {
  width: 100%;
  overflow: hidden;
}

.banner img {
  width: 100%;
  height: auto;
  display: block;
  animation: bannerAnim 2s ease forwards;
}

@keyframes bannerAnim {
  0% {
    filter: brightness(2);
    transform: scale(1.2);
  }
  100% {
    filter: brightness(1);
    transform: scale(1);
  }
}

/* FIXED LOGO */
.bannerlogo {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 120px;
  z-index: 100;
}

/* TITLE */
.main-title {
  text-align: center;
  font-size: 55px;
  margin-top: 60px;
  letter-spacing: 6px;
  opacity: 0.8;
}

/* HERO LAYOUT */
.hero {
  display: grid;
  grid-template-columns: 1fr 1.4fr 1fr;
  align-items: center;
  gap: 40px;
  padding: 60px 5%;
}

/* SIDE IMAGES */
.side-img {
  width: 100%;
  height: 420px;
  object-fit: cover;
}

/* CENTER BLOCK */
.center {
  position: relative;
  text-align: center;
}

.center-logo {
  width: 100%;
  opacity: 0.15;
}

.description {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 70%;
}

/* VIDEOS (ALIGNED WITH CENTER) */
.videos {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 30px;
}

.video-box {
  position: relative;
}

video {
  width: 260px;
  border-radius: 10px;
}

/* GLASS TEXT */
.glass {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.1);
  padding: 5px 12px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
}

/* BUTTONS */
.buttons {
  text-align: center;
  margin-top: 30px;
}

.btn {
  display: inline-block;
  margin: 10px;
  padding: 14px 28px;
  border: 1px solid white;
  text-decoration: none;
  color: white;
  transition: 0.3s ease;
}

.btn:hover {
  background: white;
  color: black;
  transform: scale(1.1);
}

/* BOTTOM SECTION (MATCH MOCK) */
.bottom {
  display: grid;
  grid-template-columns: 1fr 1.5fr 1fr;
  gap: 20px;
  margin: 80px 5%;
  align-items: center;
}

.bottom img {
  width: 100%;
  height: auto;
}

.middle {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* MOBILE FIX */
@media (max-width: 768px) {

  .banner img {
    content: url("banner.jpg");
  }

  .hero {
    grid-template-columns: 1fr;
    gap: 20px;
  }

  .side-img {
    height: auto;
  }

  .videos {
    flex-direction: column;
  }

  video {
    display: none;
  }

  .video-box {
    width: 250px;
    height: 400px;
    background-size: cover;
    background-position: center;
  }

  .video-box:nth-child(1) {
    background-image: url("reelminiature.png");
  }

  .video-box:nth-child(2) {
    background-image: url("video2miniature.png");
  }

  .bottom {
    grid-template-columns: 1fr;
  }

  .main-title {
    font-size: 32px;
  }
}

</style>
</head>

<body>

<!-- BG -->
<div class="bg">
  <img src="title.png" class="bg-title">
  <img src="logo.png" class="bg-logo">
</div>

<!-- FIXED LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- BANNER -->
<section class="banner">
  <img src="banner.png">
</section>

<!-- TITLE -->
<div class="main-title">ALEJANDRO MAZO</div>

<!-- HERO -->
<section class="hero">

  <img src="image1.jpg" class="side-img">

  <div class="center">
    <img src="logo.png" class="center-logo">
    <img src="description.png" class="description">
  </div>

  <img src="image4.jpg" class="side-img">

</section>

<!-- VIDEOS -->
<div class="videos">

  <div class="video-box">
    <video id="v1" muted loop autoplay>
      <source src="reel.mp4">
    </video>
    <div class="glass" onclick="toggleSound('v1', this)">tap for sound</div>
  </div>

  <div class="video-box">
    <video id="v2" muted loop autoplay>
      <source src="video2.mp4">
    </video>
    <div class="glass" onclick="toggleSound('v2', this)">tap for sound</div>
  </div>

</div>

<!-- BUTTONS -->
<div class="buttons">
  <a href="work.html" class="btn">MY WORK</a>
  <a href="contact.html" class="btn">CONTACT</a>
</div>

<!-- BOTTOM -->
<section class="bottom">

  <img src="image1.jpg">

  <div class="middle">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <img src="image4.jpg">

</section>

<script>

/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu", e => e.preventDefault());

/* DEVTOOLS */
document.onkeydown = function(e) {
  if (e.keyCode == 123) return false;
  if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
};

/* VIDEO TOGGLE */
function toggleSound(id, el) {
  let v = document.getElementById(id);

  if (v.muted) {
    v.muted = false;
    el.innerText = "tap to mute";
  } else {
    v.muted = true;
    el.innerText = "tap for sound";
  }
}

</script>

</body>
</html>
