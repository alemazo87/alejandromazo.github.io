<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* ===== HERO ===== */
.hero {
  position: relative;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* Banner */
.hero img.banner {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Top logo */
.header-logo {
  position: absolute;
  top: 15px;
  left: 15px;
  width: 35px;
  z-index: 3;
}

/* Title */
.title-img {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  max-width: 320px;
  opacity: 0.9;
  z-index: 3;
}

/* Center logo */
.center-logo {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60vw;
  max-width: 260px;
  z-index: 2;
}

/* Tagline */
.hero-text {
  position: absolute;
  bottom: 60px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.6;
  letter-spacing: 2px;
}

/* ===== VIDEO SECTION ===== */
.video-section {
  position: relative;
  width: 100%;
  height: 80vh;
  overflow: hidden;
}

.video-section video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* Tap text */
.tap-text {
  position: absolute;
  top: 50%;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.4;
  transform: translateY(-50%);
}

/* Label */
.video-overlay {
  position: absolute;
  bottom: 30px;
  width: 100%;
  text-align: center;
  font-size: 12px;
  opacity: 0.5;
}

/* ===== GALLERY ===== */
.gallery {
  padding: 30px 15px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.gallery img {
  width: 100%;
  height: auto;
  border-radius: 6px;
}

/* ===== FIX FOR MISSING IMAGES ===== */
img {
  display: block;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">

  <img src="bannerMOBILE.jpg" class="banner">

  <img src="logo.png" class="header-logo">

  <img src="Title.png" class="title-img">

  <img src="bannerlogo.png" class="center-logo">

  <div class="hero-text">
    Le†'$ MAK€ $ΩME┬HING ÐØPE
  </div>

</section>

<!-- VIDEO 1 -->
<section class="video-section">
  <video src="video1.mp4" autoplay muted loop playsinline></video>
  <div class="tap-text">TAP TO PLAY OR PAUSE</div>
  <div class="video-overlay">PROJECT 01</div>
</section>

<!-- VIDEO 2 -->
<section class="video-section">
  <video src="video2.mp4" autoplay muted loop playsinline></video>
  <div class="tap-text">TAP TO PLAY OR PAUSE</div>
  <div class="video-overlay">PROJECT 02</div>
</section>

<!-- GALLERY -->
<section class="gallery">
  <img src="img1.jpg">
  <img src="img2.jpg">
  <img src="img3.jpg">
  <img src="img4.jpg">
</section>

<script>
document.querySelectorAll("video").forEach(video => {
  video.addEventListener("click", () => {
    video.paused ? video.play() : video.pause();
  });
});
</script>

</body>
</html>
