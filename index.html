<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

@font-face {
  font-family: 'Orbitron';
  src: url('./Orbitron.ttf') format('truetype');
}

body {
  font-family: 'Orbitron', sans-serif;
  background: black;
  color: white;
}

/* ========================= */
/* 🔥 FIXED LOGO (TOP CENTER) */
/* ========================= */

.floating-logo {
  position: fixed;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  height: 55px;
  z-index: 999;
  cursor: pointer;
  transition: 0.3s;
}

.floating-logo:hover {
  transform: translateX(-50%) scale(1.1);
}

/* ========================= */
/* 🔥 BANNER */
/* ========================= */

.banner {
  position: relative;
  height: 28vh;
  display: flex;
  align-items: center;
  padding: 0 8%;
  background: url('banner.jpg') center/cover no-repeat;
}

.banner::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.85));
}

/* NAME LEFT */
.banner-name {
  position: relative;
  z-index: 2;
  font-size: 1.8rem;
  letter-spacing: 5px;
}

/* ========================= */
/* 🔥 HERO */
/* ========================= */

.hero {
  position: relative;
  min-height: 70vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 8%;
  gap: 80px;
  overflow: hidden;
}

/* BIG BACKGROUND LOGO */
.hero::before {
  content: "";
  position: absolute;
  width: 650px;
  height: 650px;
  background: url('logo.png') center/contain no-repeat;
  opacity: 0.04;
  z-index: 0;
}

/* TEXT */
.hero-text {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* DESCRIPTION */
.hero-text p {
  font-size: 1.2rem;
  color: #aaa;
  margin-bottom: 40px;
  line-height: 1.6;
}

/* BUTTON */
.btn {
  padding: 14px 40px;
  border: 1px solid white;
  color: white;
  text-decoration: none;
  transition: 0.3s;
  align-self: flex-start;
}

.btn:hover {
  background: white;
  color: black;
}

/* VIDEO */
.hero-video {
  position: relative;
  z-index: 2;
  flex: 1;
  display: flex;
  justify-content: center;
}

.hero-video video {
  width: 320px;
  height: 560px;
  object-fit: cover;
  border-radius: 12px;
}

/* ========================= */
/* GALLERY */
/* ========================= */

.gallery {
  padding: 80px 5%;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}

.gallery img {
  width: 100%;
  height: 400px;
  object-fit: cover;
  transition: 0.4s;
}

.gallery img:hover {
  transform: scale(1.05);
}

/* FOOTER */
footer {
  padding: 40px;
  text-align: center;
  color: #666;
}

/* MOBILE */
@media (max-width: 768px) {
  .hero {
    flex-direction: column;
    text-align: center;
  }

  .hero::before {
    width: 300px;
    height: 300px;
  }

  .hero-video video {
    width: 220px;
    height: 390px;
  }

  .floating-logo {
    height: 40px;
  }
}
</style>
</head>

<body>

<!-- 🔥 FLOATING LOGO (CLICK TO TOP) -->
<a href="#">
  <img src="logo.png" class="floating-logo">
</a>

<!-- 🔥 BANNER -->
<div class="banner">
  <div class="banner-name">ALEJANDRO MAZO</div>
</div>

<!-- 🔥 HERO -->
<section class="hero">

  <div class="hero-text">
    <p>
      Action sports & concerts<br>
      videomaker and photographer
    </p>

    <a href="#work" class="btn">View Work</a>
  </div>

  <div class="hero-video">
    <video autoplay muted loop playsinline>
      <source src="reel.mp4" type="video/mp4">
    </video>
  </div>

</section>

<!-- GALLERY -->
<section id="work" class="gallery">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
  <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</section>

<footer>
  © Alejandro Mazo
</footer>

</body>
</html>
