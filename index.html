<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Brand</title>

<!-- FONT -->
<style>
@font-face {
  font-family: 'Orbitron';
  src: url('Orbitron.ttf') format('truetype');
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #000;
  color: #fff;
  font-family: 'Orbitron', sans-serif;
}

/* BANNER */
.banner {
  position: relative;
  height: 100vh;
}

.banner img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* LOGO + NAME */
.banner-content {
  position: absolute;
  bottom: 10%;
  left: 5%;
  display: flex;
  align-items: center;
  gap: 10px;
}

.banner-logo {
  width: 60px;
  transition: 0.4s;
}

.banner-logo.scrolled {
  transform: scale(0.6);
  opacity: 0.7;
}

.banner-title {
  font-size: 28px;
}

/* CENTER LOGO */
.bg-logo {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 180px;
  opacity: 0.5;
}

/* HERO TEXT */
.hero {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.description {
  font-size: 24px;
}

.description span {
  display: block;
  font-size: 16px;
  color: #aaa;
  margin-top: 6px;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 10px 25px;
  border: 1px solid #fff;
  display: inline-block;
  text-decoration: none;
  color: #fff;
}

.btn:hover {
  background: #fff;
  color: #000;
}

/* VIDEOS */
.video-section {
  margin-top: 100vh;
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 40px;
}

video {
  width: 300px;
}
</style>
</head>

<body>

<!-- BACKGROUND LOGO -->
<img src="logo.png" class="bg-logo">

<!-- BANNER -->
<section class="banner">
  <img src="your-banner.jpg">

  <div class="banner-content">
    <img src="logo.png" class="banner-logo" id="logoAnim">
    <div class="banner-title">Your Brand</div>
  </div>
</section>

<!-- HERO -->
<div class="hero">
  <div class="description">
    action sports and concerts
    <span>videomaker and photographer</span>
  </div>

  <a href="#" class="btn">View Work</a>
</div>

<!-- VIDEOS -->
<section class="video-section">
  <video src="reel.mp4" autoplay muted loop></video>
  <video src="video2.mp4" autoplay muted loop></video>
</section>

<script>
window.addEventListener("scroll", () => {
  const logo = document.getElementById("logoAnim");
  if (window.scrollY > 20) {
    logo.classList.add("scrolled");
  } else {
    logo.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
