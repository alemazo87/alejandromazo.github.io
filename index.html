<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:black;
  overflow-x:hidden;
  user-select:none;
}

/* Disable right click */
body{ -webkit-touch-callout:none; }
html{ -webkit-user-select:none; }

/* ================= BANNER ================= */

.banner{
  width:100%;
  height:100vh;
  background:url("banner.png") center/cover no-repeat;
  position:relative;
}

@media(max-width:768px){
  .banner{
    background:url("bannerMOBILE.jpg") center/cover no-repeat;
  }
}

/* Banner logo */
.banner-logo{
  position:absolute;
  left:5%;
  top:50%;
  transform:translateY(-50%);
  width:120px;
  z-index:10;
}

/* Mobile behavior */
@media(max-width:768px){
  .banner-logo{
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
  }
}

/* ================= LOCKED LAYERS ================= */

.title{
  position:fixed;
  top:calc(100vh + 30px);
  width:100%;
  text-align:center;
  opacity:0.3;
}

.title img{
  width:300px;
}

.logo{
  position:fixed;
  top:calc(100vh + 90px);
  width:100%;
  text-align:center;
  opacity:0.3;
}

.logo img{
  width:200px;
}

/* ================= CENTER BLOCK ================= */

.center-block{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  z-index:5;
}

.center-block img{
  transform:scale(1.5);
}

/* Buttons */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  color:white;
  cursor:pointer;
}

.btn:hover{
  background:white;
  color:black;
}

/* ================= VIDEOS DESKTOP ================= */

.video-left,
.video-right{
  position:fixed;
  top:50%;
  width:22%;
  transform:translateY(-50%);
}

.video-left{ left:5%; }
.video-right{ right:5%; }

video{
  width:100%;
}

.video-text{
  position:absolute;
  top:50%;
  width:100%;
  text-align:center;
  transform:translateY(-50%);
  color:white;
  opacity:0.5;
}

/* ================= IMAGE SECTION ================= */

.images{
  margin-top:120vh;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 5%;
}

.images-left,
.images-center,
.images-right{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.images-center img{
  margin:10px 0;
}

.images img{
  width:200px;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

  .video-left,
  .video-right{
    display:none;
  }

  .images{
    flex-direction:column;
  }

  .images img{
    width:90%;
    margin:10px 0;
  }

  .video-thumb{
    width:90%;
    margin:20px auto;
    position:relative;
  }

  .video-thumb img{
    width:100%;
  }

  .video-thumb span{
    position:absolute;
    top:50%;
    width:100%;
    text-align:center;
    transform:translateY(-50%);
    color:white;
    opacity:0.6;
  }
}

</style>
</head>

<body oncontextmenu="return false">

<!-- Banner -->
<div class="banner">
  <a href="index.html">
    <img src="bannerlogo.png" class="banner-logo">
  </a>
</div>

<!-- Locked title + logo -->
<div class="title">
  <img src="title.png">
</div>

<div class="logo">
  <img src="logo.png">
</div>

<!-- Center description -->
<div class="center-block">
  <img src="description.png">

  <div class="buttons">
    <div class="btn" onclick="goPage('work.html')">MY WORK</div>
    <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
  </div>
</div>

<!-- Desktop videos -->
<div class="video-left">
  <video id="reel" loop muted>
    <source src="reel.mp4">
  </video>
  <div class="video-text" id="reelText">tap for sound</div>
</div>

<div class="video-right">
  <video id="video2" loop muted>
    <source src="video2.mp4">
  </video>
  <div class="video-text" id="video2Text">tap for sound</div>
</div>

<!-- Mobile thumbnails -->
<div class="video-thumb" onclick="openVideo('reel.mp4')">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb" onclick="openVideo('video2.mp4')">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<!-- Images -->
<div class="images">
  <div class="images-left">
    <img src="image4.jpg">
  </div>

  <div class="images-center">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="images-right">
    <img src="image1.jpg">
  </div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* BUTTON NAV */
function goPage(page){
  let sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play();

  setTimeout(()=>{
    window.location.href = page;
  },200);
}

/* VIDEO TOGGLE */
function setupVideo(v,t){
  let video=document.getElementById(v);
  let text=document.getElementById(t);

  video.play();

  video.onclick=()=>{
    if(video.muted){
      video.muted=false;
      text.innerText="tap to mute";
    }else{
      video.muted=true;
      text.innerText="tap for sound";
    }
  }
}

setupVideo("reel","reelText");
setupVideo("video2","video2Text");

/* MOBILE FULLSCREEN */
function openVideo(src){
  let v=document.createElement("video");
  v.src=src;
  v.autoplay=true;
  v.controls=true;

  v.style.position="fixed";
  v.style.top=0;
  v.style.left=0;
  v.style.width="100%";
  v.style.height="100%";
  v.style.zIndex=999;

  document.body.appendChild(v);

  v.addEventListener("touchstart",()=>{
    v.remove();
  });
}

</script>

</body>
</html>
