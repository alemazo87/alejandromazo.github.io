<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | FMX Videographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

/* ===== BASE ===== */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 1400px;
    margin: auto;
}

/* ===== FLOATING LOGO ===== */
.floating-logo {
    position: fixed;
    top: 15px;
    left: 20px;
    z-index: 999;
    transition: 0.4s;
}

.floating-logo img {
    height: 80px;
}

/* SCROLL ANIMATION */
.scrolled .floating-logo img {
    transform: scale(0.6);
    opacity: 0.7;
}

/* ===== BANNER (NO CROP) ===== */
.banner {
    height: 450px;
    position: relative;
    display: flex;
    align-items: center;
    padding: 0 80px;
    background: black;
}

.banner::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('banner.jpg') center center no-repeat;
    background-size: contain; /* NO CROP */
}

/* BANNER CONTENT */
.banner-content {
    position: relative;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 25px;
    margin-top: 120px; /* lower position */
}

.banner-logo {
    height: 120px;
}

.banner h1 {
    font-size: 42px;
    letter-spacing: 6px;
}

/* ===== HERO ===== */
.hero {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 120px 80px;
    position: relative;
    z-index: 2;
}

/* CENTER BACKGROUND LOGO */
.center-logo {
    position: fixed;
    width: 480px;
    opacity: 0.5;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    pointer-events: none;
}

/* TEXT */
.hero-text {
    width: 260px;
    text-align: center;
}

.hero-text p {
    font-size: 22px;
    line-height: 1.6;
}

.hero-text span {
    display: block;
    font-size: 16px;
    color: #aaa;
    margin-top: 8px;
}

/* BUTTON */
.btn {
    display: block;
    margin-top: 20px;
    padding: 12px;
    border: 2px solid white;
    text-align: center;
    width: 260px;
    color: white;
    text-decoration: none;
}

/* VIDEO */
.hero-video {
    display: flex;
    gap: 15px;
    margin-left: 40px;
}

.hero-video video {
    width: 260px;
    border-radius: 12px;
}

/* ===== FOOTER ===== */
footer {
    text-align: center;
    padding: 30px;
}

</style>
</head>

<body>

<!-- FLOATING LOGO -->
<a href="#" class="floating-logo">
    <img src="logo.png" id="logoAnim">
</a>

<div class="container">

<!-- BANNER -->
<section class="banner">
    <div class="banner-content">
        <img src="logo.png" class="banner-logo">
        <h1>ALEJANDRO MAZO</h1>
    </div>
</section>

<!-- CENTER LOGO -->
<img src="logo.png" class="center-logo">

<!-- HERO -->
<section class="hero">

    <!-- TEXT -->
    <div class="hero-text">
        <p>
        action sports and concerts<br>
        <span>videomaker and photographer</span>
        </p>

        <a href="#work" class="btn">View Work</a>
    </div>

    <!-- VIDEOS -->
    <div class="hero-video">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>

        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

</section>

<!-- FOOTER -->
<footer>
    © Alejandro Mazo
</footer>

</div>

<script>
window.addEventListener("scroll", () => {
    if (window.scrollY > 20) {
        document.body.classList.add("scrolled");
    } else {
        document.body.classList.remove("scrolled");
    }
});
</script>

</body>
</html>
