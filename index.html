<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | FMX Videographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

/* BASE */
body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
}

/* ===== BANNER ===== */
.banner {
    height: 300px;
    background: url('banner.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    padding-left: 80px;
}

.banner h1 {
    font-size: 40px;
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
}

/* CENTER LOGO */
.center-logo {
    position: absolute;
    width: 800px;
    opacity: 0.4;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* TEXT CENTER */
.hero-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 2;
}

.hero-text p {
    font-size: 24px;
}

.hero-text span {
    display: block;
    font-size: 16px;
    color: #aaa;
}

/* BUTTON */
.btn {
    margin-top: 20px;
    padding: 10px 25px;
    border: 2px solid white;
    display: inline-block;
    color: white;
    text-decoration: none;
}

/* VIDEOS */
.video-left, .video-right {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
}

.video-left {
    left: 10%;
}

.video-right {
    right: 10%;
}

video {
    width: 260px;
    border-radius: 10px;
}

/* ===== IMAGE GRID ===== */
.image-grid {
    display: flex;
    padding: 60px;
    gap: 20px;
}

/* left vertical */
.image-grid .left-img {
    width: 25%;
}

/* center stacked */
.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.middle img {
    width: 100%;
}

/* right vertical */
.image-grid .right-img {
    width: 25%;
}

</style>
</head>

<body>

<!-- BANNER -->
<section class="banner">
    <h1>ALEJANDRO MAZO</h1>
</section>

<!-- HERO -->
<section class="hero">

    <!-- LEFT VIDEO -->
    <div class="video-left">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <!-- RIGHT VIDEO -->
    <div class="video-right">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <!-- CENTER LOGO -->
    <img src="logo.png" class="center-logo">

    <!-- TEXT -->
    <div class="hero-text">
        <p>
        action sports and concerts<br>
        <span>videomaker and photographer</span>
        </p>

        <a href="#" class="btn">View Work</a>
    </div>

</section>

<!-- IMAGE GRID -->
<section class="image-grid">

    <img src="img1.jpg" class="left-img">

    <div class="middle">
        <img src="img2.jpg">
        <img src="img3.jpg">
    </div>

    <img src="img4.jpg" class="right-img">

</section>

</body>
</html>
