<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
}

/* ===== FORCE BUTTON COLOR FIX ===== */
.btn {
    border: 2px solid white !important;
    color: white !important;
}
.btn:hover {
    background: white;
    color: black !important;
}

/* ===== MOBILE ONLY ===== */
@media (max-width: 900px) {

    /* ===== BANNER ===== */
    .banner {
        position: relative;
    }

    .banner img {
        width: 100%;
        height: auto;
        display: block;
    }

    /* ===== HEADER CENTERED ON BANNER ===== */
    .header {
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 10px;
        z-index: 5;
    }

    .header img {
        width: 40px;
    }

    .header span {
        font-size: 16px;
        text-shadow: 0 5px 15px rgba(0,0,0,1);
    }

    /* ===== BIG BACKGROUND LOGO ===== */
    .center-logo {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 95vw;
        opacity: 0.15;
        z-index: 0;
        pointer-events: none;
    }

    /* ===== CENTER TEXT ===== */
    .center-text {
        text-align: center;
        padding: 60px 20px 30px;
        position: relative;
        z-index: 2;
    }

    /* ===== VIDEOS ===== */
    .video-wrap {
        position: relative;
        width: 90%;
        max-width: 400px;
        margin: 30px auto;
    }

    .video-wrap video {
        width: 100%;
        border-radius: 15px;
        display: block;
        background: black;
    }

    /* ===== GLASS PLAY BUTTON ===== */
    .play-btn {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 70px;
        border-radius: 50%;
        backdrop-filter: blur(10px);
        background: rgba(255,255,255,0.15);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        color: white;
        cursor: pointer;
        z-index: 3;
    }

    /* ===== GRID FIX (images showing again) ===== */
    .grid {
        display: block;
        padding: 40px 20px;
    }

    .grid img {
        width: 100%;
        margin-bottom: 20px;
        display: block;
    }

}

/* ===== KEEP DESKTOP EXACTLY AS BEFORE ===== */
/* (your original desktop CSS stays untouched below this line) */

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
    <img src="banner.jpg">

    <div class="header">
        <img src="logo.png">
        <span>ALEJANDRO MAZO</span>
    </div>
</div>

<!-- BIG LOGO -->
<img src="logo.png" class="center-logo">

<!-- TEXT -->
<div class="center-text">
    <p>
        action sports and concerts<br>
        videographer and photographer
    </p>

    <a href="#work" class="btn">SEE MEDIA</a>
    <a href="#contact" class="btn">CONTACT</a>
</div>

<!-- VIDEOS -->
<div class="video-wrap">
    <video playsinline preload="metadata" poster="image2.jpg">
        <source src="video2.mp4" type="video/mp4">
    </video>
    <div class="play-btn">▶</div>
</div>

<div class="video-wrap">
    <video playsinline preload="metadata" poster="image3.jpg">
        <source src="reel.mp4" type="video/mp4">
    </video>
    <div class="play-btn">▶</div>
</div>

<!-- GRID (images now visible) -->
<section class="grid" id="work">
    <img src="image1.jpg">
    <img src="image2.jpg">
    <img src="image3.jpg">
    <img src="image4.jpg">
</section>

<script>

/* PLAY / PAUSE TOGGLE WITH SOUND */

document.querySelectorAll(".video-wrap").forEach(wrap => {

    const video = wrap.querySelector("video");
    const btn = wrap.querySelector(".play-btn");

    btn.addEventListener("click", () => {

        if (video.paused) {
            video.muted = false;
            video.play();
            btn.innerHTML = "❚❚";
        } else {
            video.pause();
            btn.innerHTML = "▶";
        }

    });

});

</script>

</body>
</html>
