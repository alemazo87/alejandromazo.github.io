<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face { font-family: Orbitron; src: url("Orbitron.ttf"); }

*{margin:0;padding:0;box-sizing:border-box;font-family:Orbitron;}
body{background:black;color:white;overflow-x:hidden;}

/* BANNER */
.banner img{width:100%;display:block}

/* LOGO */
.bannerlogo{
position:absolute;top:40%;left:20px;width:200%;
}
.fixedlogo{
position:fixed;top:10px;left:50%;transform:translateX(-50%);
width:120px;display:none;z-index:10;
}

/* BACKGROUND LOCK */
.bg{
position:fixed;width:100%;height:100%;z-index:-1;
}
.bg img{
position:absolute;left:50%;transform:translateX(-50%);
opacity:.3;
}
.bg-title{top:100px;width:70%}
.bg-logo{top:180px;width:50%}

/* CENTER */
.center{
text-align:center;margin-top:100px;
}
.description{width:300px;margin:auto;}

/* BUTTONS */
.btn{
display:inline-block;margin:10px;padding:12px 20px;
border:1px solid white;text-decoration:none;color:white;
transition:.3s;
}
.btn:hover{background:white;color:black;}

/* VIDEOS DESKTOP */
.videos{
display:flex;justify-content:center;gap:20px;margin-top:20px;
}
video{width:250px}

/* MOBILE */
@media(max-width:768px){

.bannerlogo{width:200%}

video{display:none;}

.thumb{
width:120px;height:200px;background-size:cover;
display:inline-block;margin:10px;position:relative;
}

}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr;
gap:20px;margin:40px;
}
.grid img{width:100%}

@media(min-width:768px){
.grid{
grid-template-columns:1fr 1fr 1fr;
}
.stack{display:flex;flex-direction:column;gap:20px;}
}
</style>
</head>

<body>

<div class="bg">
<img src="title.png" class="bg-title">
<img src="logo.png" class="bg-logo">
</div>

<div class="banner">
<img src="banner.png">
<img src="bannerlogo.png" class="bannerlogo">
</div>

<img src="bannerlogo.png" class="fixedlogo" id="fixedLogo">

<div class="center">

<img src="description.png" class="description">

<div class="videos">

<video id="v1" muted autoplay loop>
<source src="reel.mp4">
</video>

<video id="v2" muted autoplay loop>
<source src="video2.mp4">
</video>

</div>

<div class="buttons">
<a href="work.html" class="btn" onclick="clickSound()">MY WORK</a>
<a href="contact.html" class="btn" onclick="clickSound()">CONTACT</a>
</div>

</div>

<div class="grid">

<img src="image4.jpg">

<div class="stack">
<img src="image2.jpg">
<img src="image3.jpg">
</div>

<img src="image1.jpg">

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
document.addEventListener("contextmenu",e=>e.preventDefault());

window.addEventListener("scroll",()=>{
document.getElementById("fixedLogo").style.display="block";
});

function clickSound(){
let s=document.getElementById("clickSound");
s.currentTime=0;s.play();
}
</script>

</body>
</html>
