<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  position:relative;
}

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:16vh;
  min-height:100px;
  background:url("bannerMOBILE.jpg") center/cover no-repeat;
}

@media(min-width:768px){
  .banner{
    background:url("banner.png") center/cover no-repeat;
    height:140px;
  }
}

/* ===== NAV LOGO ===== */
.bannerlogo{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
}

@media(min-width:768px){
  .bannerlogo{
    left:40px;
    transform:none;
    width:180px;
  }
}

/* ===== VISUAL LAYER ===== */
.visual{
  position:fixed;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  text-align:center;
}

/* DESKTOP POSITION */
@media(min-width:1024px){
  .visual{
    top:calc(50% - 130px);
  }
}

/* MOBILE POSITION */
@media(max-width:1023px){
  .visual{
    top:50%;
  }
}

.title{
  width:70vw;
  max-width:750px;
  opacity:0.25;
}

/* controlled large logo */
.logo{
  width:38vw;
  max-width:520px;
  margin-top:10px;
  opacity:0.25;
}

/* ===== CENTER CONTENT ===== */
.center{
  position:absolute;
  top:58%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:2;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;

  width:90%;
  max-width:520px;
  text-align:center;
}

/* MOBILE overlap fix */
@media(max-width:1023px){
  .center{
    position:relative;
    top:auto;
    transform:none;
    margin-top:-120px;
  }
}

.description{
  width:100%;
}

/* ===== BUTTONS ===== */
.buttons{
  display:flex;
  gap:20px;
}

.btn{
  padding:10px 25px;
  border:1px solid #fff;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* ===== VIDEO ===== */
.video{
  position:relative;
  z-index:1;
  border-radius:26px;
  overflow:hidden;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
}

.video video{
  width:100%;
  height:auto;
  object-fit:contain;
}

/* ===== MOBILE VIDEOS ===== */
.mobile-videos{
  display:flex;
  flex-direction:column;
  gap:30px;
  padding:0 20px;
  margin-top:300px;
}

/* ===== DESKTOP LAYOUT ===== */
.desktop-layout{
  display:none;
}

@media(min-width:1024px){

  .mobile-videos{
    display:none;
  }

  .desktop-layout{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:120px 80px;
  }

  .desktop-layout .video{
    width:30%;
  }

  .desktop-layout .center{
    position:static;
    transform:none;
    width:30%;
  }
}

/* ===== GALLERY ===== */
.gallery{
  padding:80px 20px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
}

.gallery img{
  width:100%;
  max-width:700px;
}

/* DESKTOP */
@media(min-width:1024px){

  .gallery{
    flex-direction:row;
    justify-content:center;
    align-items:flex-start;
    gap:60px;
  }

  .gallery img{
    max-width:520px;
  }

  .stack{
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .center-img{
    transform:scale(1.1);
  }
}
</style>
</head>

<body oncontextmenu="return false;">

<audio id="clickSound" src="click.mp3"></audio>

<div class="banner"></div>

<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- VISUAL -->
<div class="visual">
  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
</div>

<!-- MOBILE -->
<div class="center">
  <img src="description.png" class="description">

  <div class="buttons">
    <div class="btn" onclick="go('work.html')">MY WORK</div>
    <div class="btn" onclick="go('contact.html')">CONTACT</div>
  </div>
</div>

<div class="mobile-videos">

  <div class="video">
    <video src="reel.mp4" autoplay muted loop playsinline></video>
  </div>

  <div class="video">
    <video src="video2.mp4" autoplay muted loop playsinline></video>
  </div>

</div>

<!-- DESKTOP -->
<div class="desktop-layout">

  <div class="video">
    <video src="reel.mp4" autoplay muted loop playsinline></video>
  </div>

  <div class="center">
    <img src="description.png" class="description">

    <div class="buttons">
      <div class="btn" onclick="go('work.html')">MY WORK</div>
      <div class="btn" onclick="go('contact.html')">CONTACT</div>
    </div>
  </div>

  <div class="video">
    <video src="video2.mp4" autoplay muted loop playsinline></video>
  </div>

</div>

<!-- GALLERY -->
<div class="gallery">

  <img src="image4.jpg">

  <div class="stack">
    <img src="image5.jpg">
    <img src="image2.jpg" class="center-img">
    <img src="image3.jpg">
  </div>

  <img src="image1.jpg">

</div>

<script>
function go(page){
  const s = document.getElementById("clickSound");
  s.currentTime = 0;
  s.play();
  setTimeout(()=>{ window.location.href = page; },120);
}
</script>

</body>
</html>
