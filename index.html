<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
}

.banner img{
  width:100%;
  display:block;
}

/* FIXED SIZE LOGO */
.banner-logo{
  position:absolute;
  left:25px;
  top:50%;
  transform:translateY(-50%);
  height:28px; /* smaller */
  width:auto;
}

/* ===== BACKGROUND TITLE + LOGO ===== */
.bg-layer{
  position:fixed;
  top:120px;
  width:100%;
  text-align:center;
  z-index:0;
  pointer-events:none;
}

.bg-layer .title img{
  width:600px;
  opacity:0.3;
}

.bg-layer .logo img{
  width:520px;
  margin-top:20px;
  opacity:0.25;
}

/* ===== MAIN ===== */
.main{
  margin-top:200px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
  position:relative;
  z-index:2;
}

/* VIDEOS */
.side{
  width:280px;
  position:relative;
}

.side video{
  width:100%;
  border-radius:14px;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

/* CENTER */
.center{
  text-align:center;
}

.center img{
  width:665px;
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== IMAGES ===== */
.images{
  margin-top:140px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 6%;
}

/* LEFT */
.left{
  width:32%;
  display:flex;
  justify-content:center;
}

/* CENTER STACK */
.center-stack{
  width:32%;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  height:100%;
}

/* RIGHT */
.right{
  width:32%;
  display:flex;
  justify-content:center;
}

/* IMAGES SIZE */
.left img,
.right img{
  width:100%;
  max-width:420px;
}

.center-stack img{
  width:100%;
}

/* MATCH HEIGHT LOGIC */
.center-stack{
  height:420px;
}

.center-stack img{
  height:48%;
  object-fit:cover;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .banner picture img{
    content:none;
  }

  .banner-logo{
    height:28px;
  }

  .bg-layer{
    top:100px;
  }

  .bg-layer .title img{
    width:90%;
  }

  .bg-layer .logo img{
    width:70%;
  }

  .main{
    flex-direction:column;
    margin-top:180px;
  }

  .side{
    display:none;
  }

  /* DESCRIPTION */
  .center img{
    width:100%;
    transform:scale(1.5);
  }

  /* BUTTONS SIDE BY SIDE */
  .buttons{
    display:flex;
    justify-content:center;
    gap:10px;
  }

  /* VIDEO THUMBS */
  .video-thumb{
    width:90%;
    margin:20px auto;
    position:relative;
  }

  .video-thumb img{
    width:100%;
  }

  .video-thumb span{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0.6;
  }

  /* IMAGES STACK */
  .images{
    flex-direction:column;
  }

  .images img{
    width:100%;
    margin:15px 0;
  }
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png">
  </picture>

  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- BACKGROUND -->
<div class="bg-layer">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="side">
    <video id="reel" loop muted>
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="center">
    <img src="description.png">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

  <div class="side">
    <video id="video2" loop muted>
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<!-- MOBILE VIDEO THUMBNAILS -->
<div class="video-thumb">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">

  <div class="left">
    <img src="image4.jpg">
  </div>

  <div class="center-stack">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="right">
    <img src="image1.jpg">
  </div>

</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.play().catch(()=>{});

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");
</script>

</body>
</html>
