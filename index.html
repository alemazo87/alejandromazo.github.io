<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  user-select:none;
}

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:16vh;
  min-height:100px;
  background:url("bannerMOBILE.jpg") center/cover no-repeat;
}

@media(min-width:768px){
  .banner{
    background:url("banner.png") center/cover no-repeat;
    height:140px;
  }
}

/* ===== FIXED LOGO ===== */
.bannerlogo{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
}

@media(min-width:768px){
  .bannerlogo{
    left:40px;
    transform:none;
    width:180px;
  }
}

/* ===== BACKGROUND VISUAL ===== */
.visual-layer{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  text-align:center;
}

.visual-layer .title{
  width:70vw;
  max-width:600px;
  opacity:0.3;
}

.visual-layer .logo{
  width:200px;
  margin-top:20px;
  opacity:0.3;
}

/* ===== CONTENT ===== */
.content{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:40px 20px;
}

/* CENTER BLOCK */
.center-block{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

/* DESCRIPTION */
.description{
  width:85%;
  max-width:500px;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:20px;
}

.btn{
  padding:10px 25px;
  border:1px solid #fff;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#fff;
  color:#000;
}

/* ===== VIDEO ===== */
.video{
  width:100%;
  aspect-ratio:16/9;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:#000;
  border-radius:6px;
}

.video video{
  max-width:100%;
  max-height:100%;
  object-fit:contain;
}

/* LABEL */
.label{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:12px;
  opacity:0.6;
  pointer-events:none;
}

/* ===== MOBILE VIDEO ===== */
.video-section{
  width:100%;
  display:flex;
  flex-direction:column;
  gap:30px;
  padding:40px 20px;
}

/* ===== DESKTOP LAYOUT ===== */
.layout{
  display:none;
}

@media(min-width:1024px){

  .layout{
    display:flex;
    align-items:center;
    justify-content:space-between;
    width:100%;
    padding:60px;
  }

  .video-section{
    display:none;
  }

  .video{
    width:30%;
  }

  .center-block{
    width:30%;
  }
}

/* ===== GALLERY ===== */
.gallery{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  padding:40px 20px;
}

.gallery img{
  width:100%;
  max-width:500px;
}

@media(min-width:1024px){
  .gallery{
    flex-direction:row;
    justify-content:center;
    align-items:flex-start;
    gap:30px;
  }

  .stack{
    display:flex;
    flex-direction:column;
    gap:20px;
  }

  .gallery img{
    max-width:300px;
  }
}
</style>
</head>

<body oncontextmenu="return false;">

<audio id="clickSound" src="click.mp3"></audio>

<!-- BANNER -->
<div class="banner"></div>

<!-- LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- BACKGROUND VISUAL -->
<div class="visual-layer">
  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
</div>

<!-- CONTENT -->
<div class="content">

  <div class="layout">

    <!-- LEFT VIDEO -->
    <div class="video">
      <video src="reel.mp4" autoplay muted loop playsinline webkit-playsinline></video>
      <span class="label">tap for sound</span>
    </div>

    <!-- CENTER -->
    <div class="center-block">
      <img src="description.png" class="description">

      <div class="buttons">
        <div class="btn" onclick="go('work.html')">MY WORK</div>
        <div class="btn" onclick="go('contact.html')">CONTACT</div>
      </div>
    </div>

    <!-- RIGHT VIDEO -->
    <div class="video">
      <video src="video2.mp4" autoplay muted loop playsinline webkit-playsinline></video>
      <span class="label">tap for sound</span>
    </div>

  </div>

</div>

<!-- MOBILE VIDEOS -->
<div class="video-section">

  <div class="video">
    <video src="reel.mp4" autoplay muted loop playsinline webkit-playsinline></video>
    <span class="label">tap for sound</span>
  </div>

  <div class="video">
    <video src="video2.mp4" autoplay muted loop playsinline webkit-playsinline></video>
    <span class="label">tap for sound</span>
  </div>

</div>

<!-- GALLERY -->
<div class="gallery">

  <img src="image4.jpg">

  <div class="stack">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <img src="image1.jpg">

</div>

<script>
// CLICK SOUND
function go(page){
  document.getElementById("clickSound").play();
  setTimeout(()=>{ window.location.href = page; },150);
}

// VIDEO SOUND
document.querySelectorAll(".video").forEach(v=>{
  const video = v.querySelector("video");
  const label = v.querySelector(".label");

  v.addEventListener("click",()=>{
    video.muted = !video.muted;

    if(video.muted){
      label.innerText = "tap for sound";
    } else {
      label.innerText = "tap to mute";
    }
  });
});
</script>

</body>
</html>
