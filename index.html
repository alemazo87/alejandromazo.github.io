<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

/* ===== BASE ===== */
body {
    margin: 0;
    background: black;
    font-family: 'Orbitron', sans-serif;
    color: white;
}

/* ===== HEADER ===== */
.header {
    position: fixed;
    top: 25px;
    right: 40px;
    display: flex;
    align-items: center;
    gap: 15px;
    z-index: 100;
    cursor: pointer;
}

.header img {
    width: 100px;
    filter: drop-shadow(0 10px 40px rgba(0,0,0,1));
}

.header span {
    font-size: 48px;
    text-shadow: 0 10px 40px rgba(0,0,0,1);
}

/* ===== HERO ===== */
.hero {
    position: relative;
    height: 100vh;
    overflow: hidden;
}

/* ===== BANNER (FIXED ANIMATION) ===== */
.banner {
    position: absolute;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    z-index: 1;
    animation: bannerResize 2s ease forwards;
}

.banner img {
    width: 100%;
    height: 100%;
    object-fit: contain; /* NO CROPPING */
}

/* KEYFRAME: container shrinks */
@keyframes bannerResize {
    0% {
        height: 100vh;
        filter: brightness(2);
    }
    100% {
        height: 140px;
        filter: brightness(1);
    }
}

/* ===== CENTER LOGO (CORRECT LAYERING) ===== */
.center-logo {
    position: absolute; /* NOT fixed */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 70vw;
    max-width: 900px;
    opacity: 0.5;
    z-index: 0;
}

/* ===== CENTER TEXT ===== */
.center-content {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 5;
}

.center-content p {
    font-size: 22px;
    margin-bottom: 25px;
}

/* ===== BUTTONS ===== */
.btn {
    display: inline-block;
    border: 2px solid white;
    padding: 14px 35px;
    margin: 10px;
    text-decoration: none;
    color: white;
    transition: 0.25s;
}

.btn:hover {
    background: white;
    color: black;
}

/* ===== VIDEOS ===== */
.side {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    z-index: 2;
}

.left {
    left: calc(50% - 520px);
}

.right {
    right: calc(50% - 520px);
}

.side video {
    width: 100%;
    border-radius: 20px;
}

/* ===== GRID ===== */
.grid {
    position: relative;
    z-index: 10; /* ABOVE LOGO */
    display: flex;
    gap: 50px;
    padding: 120px 80px;
    background: black;
}

.left-img,
.right-img {
    width: 25%;
}

.middle {
    width: 50%;
    display: flex;
    flex-direction: column;
    gap: 30px;
}

img {
    width: 100%;
    height: auto;
}

/* ===== MOBILE ===== */
@media (max-width: 900px) {

    .header span { font-size: 20px; }
    .header img { width: 50px; }

    .side { display: none; }

    .grid {
        flex-direction: column;
        padding: 60px 20px;
    }

    .left-img,
    .right-img,
    .middle {
        width: 100%;
    }
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header" onclick="window.scrollTo({top:0, behavior:'smooth'})">
    <img src="logo.png">
    <span>ALEJANDRO MAZO</span>
</div>

<!-- HERO -->
<section class="hero">

    <div class="banner">
        <img src="banner.jpg">
    </div>

    <img src="logo.png" class="center-logo">

    <div class="side left">
        <video autoplay muted loop playsinline>
            <source src="video2.mp4" type="video/mp4">
        </video>
    </div>

    <div class="side right">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

    <div class="center-content">
        <p>
            action sports and concerts<br>
            videographer and photographer
        </p>

        <a href="#work" class="btn">SEE MEDIA</a>
        <a href="#work" class="btn">CONTACT</a>
    </div>

</section>

<!-- GRID -->
<section class="grid" id="work">

    <div class="left-img">
        <img src="image1.jpg">
    </div>

    <div class="middle">
        <img src="image2.jpg">
        <img src="image3.jpg">
    </div>

    <div class="right-img">
        <img src="image4.jpg">
    </div>

</section>

<script>
document.addEventListener("contextmenu", e => e.preventDefault());
document.querySelectorAll("img, video").forEach(el => el.setAttribute("draggable","false"));
</script>

</body>
</html>
