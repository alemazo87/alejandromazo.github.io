<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Orbitron, sans-serif;
}

body {
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header {
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px 20px;
  z-index:1000;
  background:rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.header-inner {
  display:flex;
  align-items:center;
  gap:15px;
}

.logo-small {
  width:40px;
}

.title {
  font-size:14px;
  letter-spacing:2px;
}

/* HERO */
.hero {
  height:100vh;
  width:100%;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.hero img {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain; /* FIXED full image */
  background:black;
}

/* CENTER LOGO */
.center-logo {
  width:180px; /* 50% bigger */
  z-index:2;
}

/* DESCRIPTION */
.description {
  position:absolute;
  bottom:80px;
  text-align:center;
  width:100%;
  font-size:12px;
  letter-spacing:3px;
  opacity:0.8;
}

/* VIDEOS */
.section {
  padding:80px 20px;
}

.video-container {
  position:relative;
  margin-bottom:40px;
}

video {
  width:100%;
  height:auto;
  display:block;
}

/* OVERLAY TEXT */
.overlay-text {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:11px;
  letter-spacing:3px;
  opacity:0.5;
  pointer-events:none;
}

/* MOBILE */
@media (max-width:768px) {
  .center-logo {
    width:140px;
  }

  .title {
    font-size:11px;
  }

  .description {
    font-size:10px;
    bottom:60px;
  }
}
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <img src="logo.png" class="logo-small">
    <div class="title">ALEJANDRO MAZO</div>
  </div>
</header>

<section class="hero">
  <img src="banner.jpg">

  <img src="logo.png" class="center-logo">

  <div class="description">
    CINEMATIC VISUALS • STORYTELLING • CREATIVE DIRECTION
  </div>
</section>

<section class="section">

  <div class="video-container">
    <video src="video1.mp4" muted loop playsinline></video>
    <div class="overlay-text">TAP TO PLAY OR PAUSE</div>
  </div>

  <div class="video-container">
    <video src="video2.mp4" muted loop playsinline></video>
    <div class="overlay-text">TAP TO PLAY OR PAUSE</div>
  </div>

</section>

<script>
document.querySelectorAll("video").forEach(video => {
  video.addEventListener("click", () => {
    if (video.paused) {
      video.play();
    } else {
      video.pause();
    }
  });
});
</script>

</body>
</html>
