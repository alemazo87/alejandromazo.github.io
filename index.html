<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* FONT */
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
  user-select: none;
}

/* BACKGROUND LOCK */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.bg img {
  position: absolute;
  width: 100%;
  opacity: 0.3;
}

.bg-title {
  top: 15%;
}

.bg-logo {
  bottom: 10%;
}

/* BANNER */
.banner {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.banner img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
  animation: bannerAnim 2.5s ease forwards;
}

@keyframes bannerAnim {
  0% {
    filter: brightness(2);
    height: 100vh;
  }
  100% {
    filter: brightness(1);
    height: auto;
  }
}

/* FIXED LOGO */
.bannerlogo {
  position: fixed;
  bottom: 20px;
  left: 20px;
  width: 120px;
  z-index: 10;
}

/* CONTENT */
.content {
  text-align: center;
  padding: 50px 20px;
}

.title-spacer {
  margin-top: 50px;
}

/* DESCRIPTION CENTER */
.description {
  width: 500px;
  max-width: 90%;
  margin: 40px auto;
}

/* VIDEOS */
.video-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  flex-wrap: wrap;
}

.video-box {
  position: relative;
}

video {
  width: 280px;
  border-radius: 12px;
}

/* GLASS TEXT */
.glass {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  padding: 6px 14px;
  border-radius: 12px;
  font-size: 13px;
  cursor: pointer;
}

/* BUTTONS */
.buttons {
  margin-top: 30px;
}

.btn {
  display: inline-block;
  margin: 10px;
  padding: 14px 30px;
  border: 1px solid white;
  color: white;
  text-decoration: none;
  transition: all 0.4s ease;
}

.btn:hover {
  background: white;
  color: black;
  transform: scale(1.08);
}

/* IMAGE GRID SECTION */
.gallery {
  margin-top: 80px;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  align-items: center;
  gap: 20px;
}

.gallery img {
  width: 100%;
  border-radius: 10px;
}

/* CENTER STACK */
.center-stack {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* MOBILE */
@media (max-width: 768px) {

  .banner img {
    content: url("banner.jpg");
  }

  .video-row {
    flex-direction: column;
  }

  video {
    display: none;
  }

  .video-box {
    width: 250px;
    height: 400px;
    background-size: cover;
    background-position: center;
  }

  .video-box:nth-child(1) {
    background-image: url("reelminiature.png");
  }

  .video-box:nth-child(2) {
    background-image: url("video2miniature.png");
  }

  .gallery {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg">
  <img src="title.png" class="bg-title">
  <img src="logo.png" class="bg-logo">
</div>

<!-- FIXED LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- BANNER -->
<section class="banner">
  <img src="banner.png">
</section>

<!-- CONTENT -->
<section class="content">

  <div class="title-spacer"></div>

  <!-- VIDEOS + DESCRIPTION -->
  <div class="video-row">

    <div class="video-box">
      <video id="v1" loop muted autoplay>
        <source src="reel.mp4">
      </video>
      <div class="glass" onclick="toggleSound('v1', this)">
        tap for sound
      </div>
    </div>

    <img src="description.png" class="description">

    <div class="video-box">
      <video id="v2" loop muted autoplay>
        <source src="video2.mp4">
      </video>
      <div class="glass" onclick="toggleSound('v2', this)">
        tap for sound
      </div>
    </div>

  </div>

  <!-- BUTTONS -->
  <div class="buttons">
    <a href="work.html" class="btn">MY WORK</a>
    <a href="contact.html" class="btn">CONTACT</a>
  </div>

  <!-- IMAGE SECTION -->
  <div class="gallery">

    <img src="image4.jpg">

    <div class="center-stack">
      <img src="image2.jpg">
      <img src="image3.jpg">
    </div>

    <img src="image1.jpg">

  </div>

</section>

<script>

/* DISABLE RIGHT CLICK */
document.addEventListener("contextmenu", e => e.preventDefault());

/* DISABLE DEVTOOLS */
document.onkeydown = function(e) {
  if (e.keyCode == 123) return false;
  if (e.ctrlKey && e.shiftKey && e.keyCode == 73) return false;
};

/* VIDEO TOGGLE */
function toggleSound(id, el) {
  let v = document.getElementById(id);

  if (v.muted) {
    v.muted = false;
    el.innerText = "tap to mute";
  } else {
    v.muted = true;
    el.innerText = "tap for sound";
  }
}

</script>

</body>
</html>
