<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* ================= GLOBAL ================= */

@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Orbitron, sans-serif;
}

body{
  background:#000;
  overflow-x:hidden;
  color:#fff;
}

/* Disable right click */
body {
  -webkit-touch-callout: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ================= AUDIO ================= */

audio{ display:none; }

/* ================= BANNER ================= */

.banner{
  position:relative;
  width:100%;
  height:60vh;
  overflow:hidden;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* Banner logo (fixed, no duplication) */
.banner-logo{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
  cursor:pointer;
}

.banner-logo img{
  width:100%;
  object-fit:contain;
}

/* ================= FIXED BACKGROUND LAYER ================= */

.bg-center{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:1;
  pointer-events:none;
  text-align:center;
}

/* title above logo */
.bg-title{
  width:60vw;
  max-width:700px;
  margin-bottom:20px;
}

.bg-logo{
  width:40vw;
  max-width:420px;
}

/* ================= CONTENT ================= */

.content{
  position:relative;
  z-index:2;
  width:100%;
}

/* description block */
.description{
  display:flex;
  justify-content:center;
  margin-top:60vh; /* sits visually inside logo space */
  margin-bottom:40px;
}

.description img{
  width:60vw;
  max-width:600px;
  object-fit:contain;
}

/* buttons */
.buttons{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-bottom:60px;
}

.btn{
  padding:12px 28px;
  border:1px solid rgba(255,255,255,0.3);
  background:transparent;
  color:#fff;
  cursor:pointer;
  transition:0.2s;
}

.btn:hover{
  background:rgba(255,255,255,0.1);
}

/* ================= VIDEO SYSTEM ================= */

.video-section{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 5vw;
  margin-top:20vh;
}

.video{
  width:40%;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:auto;
  object-fit:contain;
}

/* overlay */
.video-label{
  position:absolute;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  font-size:10px;
  letter-spacing:2px;
  opacity:0.7;
}

/* ================= MOBILE ================= */

@media (max-width:900px){

  .banner{
    height:40vh;
  }

  .bg-title{
    width:80vw;
  }

  .bg-logo{
    width:65vw;
  }

  .description{
    margin-top:55vh;
  }

  .buttons{
    flex-direction:column;
    align-items:center;
  }

  .video-section{
    flex-direction:column;
    gap:30px;
    margin-top:50vh; /* dynamic spacing after logo space */
  }

  .video{
    width:90%;
  }
}

</style>
</head>

<body oncontextmenu="return false">

<audio id="clickSound" src="click.mp3"></audio>

<!-- ================= BANNER ================= -->
<section class="banner">
  <img src="banner.png" alt="">
</section>

<!-- fixed banner logo -->
<div class="banner-logo" onclick="goHome()">
  <img src="bannerlogo.png" alt="">
</div>

<!-- ================= FIXED CENTER LAYER ================= -->
<div class="bg-center">
  <img src="title.png" class="bg-title">
  <img src="logo.png" class="bg-logo">
</div>

<!-- ================= CONTENT ================= -->
<div class="content">

  <!-- description -->
  <div class="description">
    <img src="description.png">
  </div>

  <!-- buttons -->
  <div class="buttons">
    <div class="btn" onclick="navigate('work.html')">MY WORK</div>
    <div class="btn" onclick="navigate('contact.html')">CONTACT</div>
  </div>

  <!-- videos -->
  <div class="video-section">

    <div class="video">
      <video src="video1.mp4" autoplay muted loop playsinline></video>
      <div class="video-label">TAP FOR SOUND</div>
    </div>

    <div class="video">
      <video src="video2.mp4" autoplay muted loop playsinline></video>
      <div class="video-label">TAP FOR SOUND</div>
    </div>

  </div>

</div>

<script>

/* ================= SOUND ================= */

const clickSound = document.getElementById("clickSound");

function playClick(){
  clickSound.currentTime = 0;
  clickSound.play();
}

/* ================= NAVIGATION ================= */

function navigate(url){
  playClick();
  setTimeout(()=>{ window.location.href = url; }, 150);
}

function goHome(){
  playClick();
  setTimeout(()=>{ window.location.href = "index.html"; }, 150);
}

/* ================= VIDEO INTERACTION ================= */

document.querySelectorAll(".video").forEach(container => {
  const video = container.querySelector("video");
  const label = container.querySelector(".video-label");

  container.addEventListener("click", () => {
    if(video.muted){
      video.muted = false;
      label.innerText = "TAP TO MUTE";
    } else {
      video.muted = true;
      label.innerText = "TAP FOR SOUND";
    }
  });
});

</script>

</body>
</html>
