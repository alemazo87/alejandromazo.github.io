<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  width:100%;
  max-width:1080px;
  margin:0 auto;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

/* ===== BANNER LOGO ===== */
.banner-logo{
  position:absolute;
  left:40px;
  top:50%;
  transform:translateY(-50%);
  width:140px;
}

/* ===== LOCKED CONTENT ===== */
.locked{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

/* ===== TITLE ===== */
.title{
  position:absolute;
  top:200px;
  width:100%;
  text-align:center;
  opacity:0.3;
}

.title img{
  width:658px;
  max-width:80%;
}

/* ===== MAIN LOGO ===== */
.main-logo{
  position:absolute;
  top:260px;
  width:100%;
  text-align:center;
  opacity:0.3;
}

.main-logo img{
  width:300px;
}

/* ===== DESCRIPTION ===== */
.description{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.description img{
  width:443px;
  max-width:80%;
}

/* ===== BUTTONS ===== */
.buttons{
  margin-top:20px;
  pointer-events:auto;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== VIDEOS ===== */
.video-left,
.video-right{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  width:300px;
}

.video-left{ left:5%; }
.video-right{ right:5%; }

video{
  width:100%;
}

.video-text{
  position:absolute;
  top:50%;
  width:100%;
  text-align:center;
  transform:translateY(-50%);
  opacity:0.6;
}

/* ===== IMAGES ===== */
.images{
  margin-top:120vh;
  display:flex;
  justify-content:space-between;
  padding:0 5%;
}

.images-left,
.images-center,
.images-right{
  display:flex;
  flex-direction:column;
  align-items:center;
}

.images-center img{
  margin:10px 0;
}

.images img{
  width:250px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .video-left,
  .video-right{
    display:none;
  }

  .images{
    flex-direction:column;
    align-items:center;
  }

  .images img{
    width:90%;
    margin:10px 0;
  }

  .banner-logo{
    left:50%;
    transform:translate(-50%,-50%);
    width:120px;
  }
}
</style>
</head>

<body>

<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png">
  </picture>

  <a href="index.html">
    <img src="bannerlogo.png" class="banner-logo">
  </a>
</div>

<div class="locked">

  <div class="title">
    <img src="title.png">
  </div>

  <div class="main-logo">
    <img src="logo.png">
  </div>

  <div class="description">
    <img src="description.png">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

</div>

<div class="video-left">
  <video id="reel" loop muted>
    <source src="reel.mp4">
  </video>
  <div class="video-text" id="reelText">tap for sound</div>
</div>

<div class="video-right">
  <video id="video2" loop muted>
    <source src="video2.mp4">
  </video>
  <div class="video-text" id="video2Text">tap for sound</div>
</div>

<div class="images">
  <div class="images-left">
    <img src="image4.jpg">
  </div>

  <div class="images-center">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="images-right">
    <img src="image1.jpg">
  </div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play();
  setTimeout(()=>{window.location.href=page;},200);
}

function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.play();

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");
</script>

</body>
</html>
