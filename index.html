<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* ================= GLOBAL ================= */

@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Orbitron, sans-serif;
}

body{
  background:#000;
  overflow-x:hidden;
  color:#fff;
  -webkit-user-select:none;
  user-select:none;
}

/* ================= AUDIO ================= */
audio{ display:none; }

/* ================= BANNER ================= */

.banner{
  position:relative;
  width:100%;
  height:60vh;
}

.banner img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* banner logo */
.banner-logo{
  position:absolute;
  left:40px;
  top:50%;
  transform:translateY(-50%);
  width:140px;
  z-index:10;
  cursor:pointer;
}

.banner-logo img{
  width:100%;
  object-fit:contain;
}

/* sticky on scroll */
.banner-logo.fixed{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
}

/* ================= FIXED BACKGROUND ================= */

.bg-layer{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:1;
  pointer-events:none;
  text-align:center;
}

.title-img{
  width:60vw;
  max-width:700px;
  opacity:0.3; /* MATCHED */
}

.logo-img{
  width:30vw;
  max-width:400px;
  margin-top:20px;
  opacity:0.3;
}

/* ================= CENTER CONTENT (OVER LOGO) ================= */

.center-ui{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  pointer-events:auto;
}

/* description */
.description img{
  width:65vw;
  max-width:700px;
  object-fit:contain;
  transform:scale(1.5);
}

/* buttons */
.buttons{
  display:flex;
  gap:20px;
  margin-top:30px;
}

.btn{
  padding:12px 28px;
  border:1px solid rgba(255,255,255,0.3);
  cursor:pointer;
  transition:0.25s ease;
}

.btn:hover{
  background:rgba(255,255,255,0.1);
}

/* ================= VIDEOS ================= */

.video-row{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:80vh;
  padding:0 5vw;
}

.video-box{
  width:38%;
  border-radius:20px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:auto;
  object-fit:contain;
}

/* overlay */
.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:10px;
  letter-spacing:2px;
  opacity:0.6;
  pointer-events:none;
  white-space:nowrap;
}

/* ================= GALLERY ================= */

.gallery{
  margin-top:120px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  padding:0 5vw;
}

.gallery img{
  width:100%;
  object-fit:contain;
}

.left, .right{
  width:20%;
}

.center{
  width:40%;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* ================= MOBILE ================= */

@media (max-width:900px){

  .banner{
    height:40vh;
  }

  .banner img{
    object-fit:cover;
    content:url("bannerMOBILE.jpg"); /* FIXED CORRECTLY */
  }

  .banner-logo{
    left:20px;
    width:110px;
  }

  .banner-logo.fixed{
    left:50%;
  }

  .title-img{
    width:80vw;
  }

  .logo-img{
    width:60vw;
  }

  .center-ui{
    top:55%;
  }

  .description img{
    transform:scale(1);
    width:85vw;
  }

  .buttons{
    flex-direction:column;
  }

  .video-row{
    flex-direction:column;
    gap:30px;
    margin-top:90vh; /* ensures no overlap with logo */
  }

  .video-box{
    width:90%;
  }

  .gallery{
    flex-direction:column;
    gap:20px;
  }

  .left, .right, .center{
    width:100%;
  }
}

</style>
</head>

<body oncontextmenu="return false">

<audio id="clickSound" src="click.mp3"></audio>

<!-- ================= BANNER ================= -->
<div class="banner">
  <img src="banner.png">
  <div class="banner-logo" onclick="goHome()">
    <img src="bannerlogo.png">
  </div>
</div>

<!-- ================= BACKGROUND ================= -->
<div class="bg-layer">
  <img src="title.png" class="title-img">
  <img src="logo.png" class="logo-img">
</div>

<!-- ================= CENTER UI ================= -->
<div class="center-ui">

  <div class="description">
    <img src="description.png">
  </div>

  <div class="buttons">
    <div class="btn" onclick="navigate('work.html')">MY WORK</div>
    <div class="btn" onclick="navigate('contact.html')">CONTACT</div>
  </div>

</div>

<!-- ================= VIDEOS ================= -->
<div class="video-row">

  <div class="video-box">
    <video src="reel.mp4" autoplay muted loop playsinline></video>
    <div class="video-text">TAP FOR SOUND</div>
  </div>

  <div class="video-box">
    <video src="video2.mp4" autoplay muted loop playsinline></video>
    <div class="video-text">TAP FOR SOUND</div>
  </div>

</div>

<!-- ================= GALLERY ================= -->
<div class="gallery">

  <div class="left">
    <img src="image4.jpg">
  </div>

  <div class="center">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <div class="right">
    <img src="image1.jpg">
  </div>

</div>

<script>

/* CLICK SOUND */
const clickSound = document.getElementById("clickSound");

function playClick(){
  clickSound.currentTime = 0;
  clickSound.play();
}

function navigate(url){
  playClick();
  setTimeout(()=>{ window.location.href = url; },150);
}

function goHome(){
  playClick();
  setTimeout(()=>{ window.location.href = "index.html"; },150);
}

/* VIDEO SOUND */
document.querySelectorAll(".video-box").forEach(box=>{
  const video = box.querySelector("video");
  const text = box.querySelector(".video-text");

  box.addEventListener("click",()=>{
    if(video.muted){
      video.muted = false;
      text.innerText = "TAP TO MUTE";
    } else {
      video.muted = true;
      text.innerText = "TAP FOR SOUND";
    }
  });
});

/* SCROLL LOGO */
const logo = document.querySelector(".banner-logo");

window.addEventListener("scroll", ()=>{
  if(window.scrollY > 100){
    logo.classList.add("fixed");
  } else {
    logo.classList.remove("fixed");
  }
});

</script>

</body>
</html>
