<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
  width:100%;
}

.banner img{
  width:100%;
  height:auto;
  display:block;
}

/* FIX: LOGO NOT STRETCHED */
.banner-logo{
  position:absolute;
  left:30px;
  top:50%;
  transform:translateY(-50%);
  height:40px;
  width:auto;
}

/* ===== HERO (LOCKED AFTER BANNER) ===== */
.hero{
  position:relative;
  text-align:center;
  margin-top:30px;
}

.hero.fixed{
  position:fixed;
  top:0;
  width:100%;
  pointer-events:none;
}

/* TITLE */
.title img{
  width:600px;
  max-width:80%;
  opacity:0.3;
}

/* LOGO */
.logo img{
  width:520px; /* 2x */
  margin-top:20px;
  opacity:0.3;
}

/* ===== MAIN ===== */
.main{
  margin-top:220px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
}

/* VIDEOS */
.side{
  width:280px;
  position:relative;
}

.side video{
  width:100%;
  border-radius:14px;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

/* CENTER */
.center{
  text-align:center;
}

.center img{
  width:650px;
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== IMAGES ===== */
.images{
  margin-top:140px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:40px;
  padding:0 8%;
}

.left, .right{
  display:flex;
  justify-content:center;
}

.center-stack{
  display:flex;
  flex-direction:column;
  gap:25px;
  align-items:center;
}

.images img{
  width:100%;
  max-width:420px;
}

/* ===== MOBILE ONLY ===== */
@media (max-width:768px){

  /* SAFE IMAGE SWITCH */
  .banner picture img{
    content: none;
  }

  .banner picture source{
    display:block;
  }

  .main{
    flex-direction:column;
  }

  .side{
    display:none;
  }

  .center img{
    transform:scale(1.5);
  }

  .buttons{
    display:flex;
    justify-content:center;
    gap:10px;
  }

  .images{
    display:block;
  }

  .images img{
    width:100%;
    margin:15px 0;
  }

  .banner-logo{
    height:30px;
  }
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <picture>
    <source media="(max-width:768px)" srcset="bannerMOBILE.jpg">
    <img src="banner.png" alt="">
  </picture>

  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- HERO -->
<div class="hero" id="hero">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="side">
    <video id="reel" loop muted>
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="center">
    <img src="description.png">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

  <div class="side">
    <video id="video2" loop muted>
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<!-- IMAGES -->
<div class="images">
  <div class="left"><img src="image4.jpg"></div>
  <div class="center-stack">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>
  <div class="right"><img src="image1.jpg"></div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* FIX: LOCK HERO AFTER SCROLL */
const hero = document.getElementById("hero");
const bannerHeight = document.querySelector(".banner").offsetHeight;

window.addEventListener("scroll", () => {
  if(window.scrollY > bannerHeight){
    hero.classList.add("fixed");
  } else {
    hero.classList.remove("fixed");
  }
});

/* SOUND NAV */
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

/* VIDEO TOGGLE */
function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.play().catch(()=>{});

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");

</script>

</body>
</html>
