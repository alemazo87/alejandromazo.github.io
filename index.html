<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* Disable right click */
body{
  user-select:none;
}

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:140px;
  background:url("banner.png") center/cover no-repeat;
  position:relative;
}

@media(max-width:768px){
  .banner{
    background:url("bannerMOBILE.jpg") center/cover no-repeat;
  }
}

/* ===== LOGO FIXED ===== */
.bannerlogo{
  position:fixed;
  top:20px;
  left:30px;
  z-index:1000;
  width:180px;
  cursor:pointer;
}

@media(max-width:768px){
  .bannerlogo{
    left:50%;
    transform:translateX(-50%);
    width:140px;
  }
}

/* ===== CENTER SECTION ===== */
.center{
  text-align:center;
  padding-top:40px;
}

/* TITLE */
.title{
  width:60%;
  max-width:600px;
  opacity:0.3;
}

/* LOGO */
.logo{
  width:200px;
  opacity:0.3;
  margin-top:20px;
}

/* DESCRIPTION */
.description{
  width:70%;
  max-width:700px;
  margin:30px auto;
}

/* BUTTONS */
.buttons{
  display:flex;
  justify-content:center;
  gap:30px;
  margin-top:20px;
}

.btn{
  padding:12px 30px;
  border:1px solid white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== VIDEO SECTION ===== */
.video-row{
  display:flex;
  justify-content:center;
  gap:30px;
  margin:60px auto;
  width:90%;
}

.video{
  width:45%;
  position:relative;
}

.video video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LABEL */
.label{
  position:absolute;
  top:50%;
  width:100%;
  text-align:center;
  transform:translateY(-50%);
  font-size:12px;
  opacity:0.6;
  pointer-events:none;
}

/* ===== GALLERY ===== */
.gallery{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:30px;
  margin:80px auto;
  width:90%;
}

.gallery img{
  max-width:100%;
  height:auto;
}

/* center stack */
.center-stack{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* MOBILE */
@media(max-width:768px){

  .video-row{
    flex-direction:column;
  }

  .video{
    width:100%;
  }

  .gallery{
    flex-direction:column;
  }
}
</style>
</head>

<body oncontextmenu="return false;">

<!-- CLICK SOUND -->
<audio id="clickSound" src="click.mp3"></audio>

<!-- BANNER -->
<div class="banner"></div>

<!-- FIXED LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- CENTER CONTENT -->
<div class="center">

  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
  <img src="description.png" class="description">

  <div class="buttons">
    <div class="btn" onclick="go('work.html')">MY WORK</div>
    <div class="btn" onclick="go('contact.html')">CONTACT</div>
  </div>

</div>

<!-- VIDEOS -->
<div class="video-row">

  <div class="video">
    <video src="reel.mp4" autoplay muted loop playsinline></video>
    <span class="label">tap for sound</span>
  </div>

  <div class="video">
    <video src="video2.mp4" autoplay muted loop playsinline></video>
    <span class="label">tap for sound</span>
  </div>

</div>

<!-- GALLERY -->
<div class="gallery">

  <img src="image4.jpg">

  <div class="center-stack">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>

  <img src="image1.jpg">

</div>

<script>
// BUTTON SOUND + NAV
function go(page){
  document.getElementById("clickSound").play();
  setTimeout(()=>{
    window.location.href = page;
  },150);
}

// VIDEO SOUND TOGGLE
document.querySelectorAll(".video").forEach(container=>{
  const video = container.querySelector("video");
  const label = container.querySelector(".label");

  container.addEventListener("click",()=>{
    video.muted = !video.muted;

    if(video.muted){
      label.innerText = "tap for sound";
    } else {
      label.innerText = "tap to mute";
    }
  });
});
</script>

</body>
</html>
