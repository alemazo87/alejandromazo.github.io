<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | FMX Videographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== WRAPPER ===== */
.container {
    max-width: 1400px;
    margin: auto;
}

/* ===== BANNER (FIXED) ===== */
.banner {
    width: 100%;
    height: 450px;
    background-image: url('banner.jpg');
    background-size: cover;       /* fills properly */
    background-position: center;  /* no weird crop */
    background-repeat: no-repeat;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 40px 80px;
    box-sizing: border-box;
}

/* NAME + LOGO */
.banner-content {
    display: flex;
    align-items: center;
    gap: 20px;
}

/* THIS is the ONLY logo */
.banner-logo {
    height: 130px;
    transition: all 0.3s ease;
    cursor: pointer;
}

/* STICKY STATE */
.banner-logo.sticky {
    position: fixed;
    top: 3px;
    left: 20px;
    height: 70px;
    z-index: 999;
}

/* NAME */
.banner h1 {
    font-size: 48px;
    letter-spacing: 6px;
    margin: 0;
}

/* ===== HERO ===== */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 120px 80px;
    position: relative;
}

/* BIG CENTER LOGO (FIXED SIZE) */
.center-logo {
    position: absolute;
    width: 1200px; /* bigger */
    opacity: 0.06;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* TEXT */
.hero-text {
    width: 360px;
}

/* DESCRIPTION (MATCH MOCKUP) */
.hero-text p {
    font-size: 26px;
    line-height: 1.7;
    font-weight: normal;
    margin-bottom: 40px;
}

/* BUTTON */
.btn {
    display: block;
    width: 260px;
    padding: 14px;
    border: 2px solid white;
    text-align: center;
    text-decoration: none;
    color: white;
}

/* VIDEO */
.hero-video video {
    width: 260px;
    border-radius: 12px;
}

/* BALANCE */
.hero-text {
    margin-right: 80px;
}

.hero-video {
    margin-left: 80px;
}

/* ===== GALLERY ===== */
.gallery {
    display: flex;
    gap: 10px;
    padding: 40px;
}

.gallery img {
    width: 33%;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

    .banner {
        height: 260px;
        padding: 20px;
    }

    .banner h1 {
        font-size: 24px;
    }

    .banner-logo {
        height: 60px;
    }

    .hero {
        flex-direction: column;
        padding: 60px 20px;
        text-align: center;
    }

    .hero-text {
        width: 100%;
        margin: 0;
    }

    .hero-text p {
        font-size: 20px;
    }

    .btn {
        margin: auto;
    }

    .hero-video {
        margin: 40px 0;
    }

    .center-logo {
        width: 400px;
    }

    .gallery {
        flex-direction: column;
    }

    .gallery img {
        width: 100%;
    }
}

</style>
</head>

<body>

<div class="container">

<!-- BANNER -->
<section class="banner">
    <div class="banner-content">
        <img src="logo.png" id="logo" class="banner-logo">
        <h1>ALEJANDRO MAZO</h1>
    </div>
</section>

<!-- HERO -->
<section class="hero">

    <div class="hero-text">
        <p>
        Action sports & concerts<br>
        videomaker and photographer
        </p>

        <a href="#work" class="btn">View Work</a>
    </div>

    <img src="logo.png" class="center-logo">

    <div class="hero-video">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

</section>

<!-- GALLERY -->
<section id="work" class="gallery">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</section>

</div>

<!-- JS (FIXED FLOAT LOGO) -->
<script>
const logo = document.getElementById("logo");
const banner = document.querySelector(".banner");

window.addEventListener("scroll", () => {
    const trigger = banner.offsetHeight - 3;

    if (window.scrollY >= trigger) {
        logo.classList.add("sticky");
    } else {
        logo.classList.remove("sticky");
    }
});

logo.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>

</body>
</html>
