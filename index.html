<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>

/* ========== GLOBAL ========== */

@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron, sans-serif;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  user-select:none;
}

/* ========== AUDIO ========== */
audio{ display:none; }

/* ========== HEADER (BANNER) ========== */

.header{
  position:relative;
  width:100%;
  height:60vh;
}

.header img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* banner logo */
.banner-logo{
  position:absolute;
  top:50%;
  left:40px;
  transform:translateY(-50%);
  width:140px;
  z-index:5;
  cursor:pointer;
}

.banner-logo img{
  width:100%;
  object-fit:contain;
}

/* ========== FIXED BACKGROUND (TITLE + LOGO) ========== */

.bg-layer{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:1;
  pointer-events:none;
  text-align:center;
}

.title-img{
  width:60vw;
  max-width:700px;
  opacity:0.3;
}

.logo-img{
  width:30vw;
  max-width:400px;
  margin-top:20px;
  opacity:0.3;
}

/* ========== CENTER CONTENT ========== */

.center-content{
  position:relative;
  z-index:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:-25vh; /* pulls into logo space */
}

/* description */
.description img{
  width:65vw;
  max-width:700px;
  object-fit:contain;
  transform:scale(1.4);
}

/* buttons */
.buttons{
  display:flex;
  gap:20px;
  margin-top:30px;
}

.btn{
  padding:12px 28px;
  border:1px solid rgba(255,255,255,0.3);
  cursor:pointer;
  transition:0.25s;
}

.btn:hover{
  background:rgba(255,255,255,0.1);
}

/* ========== VIDEO SECTION ========== */

.video-section{
  margin-top:200px; /* EXACT RULE */
  display:flex;
  justify-content:space-between;
  padding:0 5vw;
}

.video-box{
  width:38%;
  border-radius:18px;
  overflow:hidden;
  position:relative;
}

video{
  width:100%;
  height:auto;
  object-fit:contain;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:10px;
  letter-spacing:2px;
  opacity:0.6;
  white-space:nowrap;
  pointer-events:none;
}

/* ========== MOBILE ========== */

@media (max-width:900px){

  .header{
    height:40vh;
  }

  .header img{
    content:url("bannerMOBILE.jpg");
  }

  .banner-logo{
    left:20px;
    width:110px;
  }

  .title-img{
    width:80vw;
  }

  .logo-img{
    width:60vw;
  }

  .center-content{
    margin-top:-15vh;
  }

  .description img{
    transform:scale(1);
    width:85vw;
  }

  .buttons{
    flex-direction:column;
  }

  .video-section{
    flex-direction:column;
    gap:30px;
  }

  .video-box{
    width:90%;
  }
}

</style>
</head>

<body oncontextmenu="return false">

<audio id="clickSound" src="click.mp3"></audio>

<!-- ========== HEADER ========== -->
<div class="header">
  <img src="banner.png">
  <div class="banner-logo" onclick="goHome()">
    <img src="bannerlogo.png">
  </div>
</div>

<!-- ========== FIXED BACKGROUND ========== -->
<div class="bg-layer">
  <img src="title.png" class="title-img">
  <img src="logo.png" class="logo-img">
</div>

<!-- ========== CENTER CONTENT ========== -->
<div class="center-content">

  <div class="description">
    <img src="description.png">
  </div>

  <div class="buttons">
    <div class="btn" onclick="navigate('work.html')">MY WORK</div>
    <div class="btn" onclick="navigate('contact.html')">CONTACT</div>
  </div>

</div>

<!-- ========== VIDEOS ========== -->
<div class="video-section">

  <div class="video-box">
    <video src="reel.mp4" autoplay muted loop playsinline></video>
    <div class="video-text">TAP FOR SOUND</div>
  </div>

  <div class="video-box">
    <video src="video2.mp4" autoplay muted loop playsinline></video>
    <div class="video-text">TAP FOR SOUND</div>
  </div>

</div>

<script>

/* SOUND */
const clickSound = document.getElementById("clickSound");

function playClick(){
  clickSound.currentTime = 0;
  clickSound.play();
}

function navigate(url){
  playClick();
  setTimeout(()=>{ window.location.href = url; },150);
}

function goHome(){
  playClick();
  setTimeout(()=>{ window.location.href = "index.html"; },150);
}

/* VIDEO SOUND TOGGLE */
document.querySelectorAll(".video-box").forEach(box=>{
  const video = box.querySelector("video");
  const text = box.querySelector(".video-text");

  box.addEventListener("click",()=>{
    if(video.muted){
      video.muted = false;
      text.innerText = "TAP TO MUTE";
    } else {
      video.muted = true;
      text.innerText = "TAP FOR SOUND";
    }
  });
});

</script>

</body>
</html>
