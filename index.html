<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ===== BANNER ===== */
.banner{
  position:relative;
}

.banner img{
  width:100%;
  display:block;
}

/* FIXED SIZE LOGO (NO STRETCH) */
.banner-logo{
  position:absolute;
  left:25px;
  top:50%;
  transform:translateY(-50%);
  height:35px;
  width:auto;
}

/* ===== FIXED HERO ===== */
.hero-fixed{
  position:fixed;
  top:140px;
  width:100%;
  text-align:center;
  pointer-events:none;
}

.hero-fixed .title img{
  width:600px;
  opacity:0.3;
}

.hero-fixed .logo img{
  width:520px; /* 2x bigger */
  margin-top:20px;
  opacity:0.3;
}

/* ===== MAIN ===== */
.main{
  margin-top:260px;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:60px;
}

/* VIDEOS */
.side{
  width:300px;
  position:relative;
}

.side video{
  width:100%;
  border-radius:14px;
}

.video-text{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  opacity:0.6;
}

/* CENTER */
.center{
  text-align:center;
}

.center img{
  width:665px;
  max-width:90%;
}

/* BUTTONS */
.buttons{
  margin-top:20px;
}

.btn{
  display:inline-block;
  margin:10px;
  padding:12px 28px;
  border:1px solid white;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:white;
  color:black;
}

/* ===== IMAGES ===== */
.images{
  margin-top:140px;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:40px;
  padding:0 8%;
}

.left, .right{
  display:flex;
  justify-content:center;
}

.center-stack{
  display:flex;
  flex-direction:column;
  gap:25px;
  align-items:center;
}

.images img{
  width:100%;
  max-width:420px;
  border-radius:12px;
}

/* ===== MOBILE ===== */
@media(max-width:768px){

  .banner img{
    content:url("bannerMOBILE.jpg");
  }

  .banner-logo{
    height:30px;
    left:20px;
  }

  .hero-fixed{
    top:120px;
  }

  .hero-fixed .title img{
    width:90%;
  }

  .hero-fixed .logo img{
    width:80%;
  }

  .main{
    flex-direction:column;
    margin-top:220px;
  }

  .side{
    display:none;
  }

  /* DESCRIPTION BIGGER */
  .center img{
    width:100%;
    transform:scale(1.5);
  }

  /* BUTTONS SIDE BY SIDE */
  .buttons{
    display:flex;
    justify-content:center;
    gap:10px;
  }

  /* VIDEO THUMBNAILS */
  .video-thumb{
    width:90%;
    margin:20px auto;
    position:relative;
  }

  .video-thumb img{
    width:100%;
  }

  .video-thumb span{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    opacity:0.6;
  }

  /* IMAGES STACK */
  .images{
    display:block;
    padding:0 5%;
  }

  .images img{
    width:100%;
    margin:15px 0;
  }
}

</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="banner.png">
  <img src="bannerlogo.png" class="banner-logo">
</div>

<!-- FIXED HERO -->
<div class="hero-fixed">
  <div class="title">
    <img src="title.png">
  </div>
  <div class="logo">
    <img src="logo.png">
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <div class="side">
    <video id="reel" loop muted>
      <source src="reel.mp4">
    </video>
    <div class="video-text" id="reelText">tap for sound</div>
  </div>

  <div class="center">
    <img src="description.png">

    <div class="buttons">
      <div class="btn" onclick="goPage('work.html')">MY WORK</div>
      <div class="btn" onclick="goPage('contact.html')">CONTACT</div>
    </div>
  </div>

  <div class="side">
    <video id="video2" loop muted>
      <source src="video2.mp4">
    </video>
    <div class="video-text" id="video2Text">tap for sound</div>
  </div>

</div>

<!-- MOBILE VIDEO THUMBS -->
<div class="video-thumb">
  <img src="reelminiature.png">
  <span>tap to play</span>
</div>

<div class="video-thumb">
  <img src="video2miniature.png">
  <span>tap to play</span>
</div>

<!-- IMAGES -->
<div class="images">
  <div class="left"><img src="image4.jpg"></div>
  <div class="center-stack">
    <img src="image2.jpg">
    <img src="image3.jpg">
  </div>
  <div class="right"><img src="image1.jpg"></div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
function goPage(page){
  let s=document.getElementById("clickSound");
  s.currentTime=0;
  s.play().catch(()=>{});
  setTimeout(()=>{window.location.href=page;},200);
}

function setup(v,t){
  let vid=document.getElementById(v);
  let txt=document.getElementById(t);

  vid.play().catch(()=>{});

  vid.onclick=()=>{
    if(vid.muted){
      vid.muted=false;
      txt.innerText="tap to mute";
    }else{
      vid.muted=true;
      txt.innerText="tap for sound";
    }
  }
}

setup("reel","reelText");
setup("video2","video2Text");
</script>

</body>
</html>
