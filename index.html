<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alejandro Mazo</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      scroll-behavior: smooth;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      background: black;
      color: white;
    }

    /* HERO */
    .hero {
      height: 100vh;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
    }

    .hero video {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 2;
    }

    .hero-content {
      position: relative;
      z-index: 3;
    }

    h1 {
      font-size: 3.5rem;
      letter-spacing: 3px;
    }

    p {
      color: #ccc;
      margin-top: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 30px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

    /* GALLERY */
    .gallery {
      padding: 80px 5%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .gallery img {
      width: 100%;
      height: 400px;
      object-fit: cover;
      transition: 0.4s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* VIDEO SECTION */
    .video-section {
      padding: 80px 5%;
      text-align: center;
    }

    .video-section iframe {
      width: 100%;
      max-width: 900px;
      height: 500px;
      border: none;
    }

    /* FOOTER */
    footer {
      padding: 40px;
      text-align: center;
      color: #666;
    }
  </style>
</head>

<body>

<!-- HERO -->
<section class="hero">
  <video autoplay muted loop>
    <source src="your-video.mp4" type="video/mp4">
  </video>
  <div class="overlay"></div>
  <div class="hero-content">
    <h1>ALEJANDRO MAZO</h1>
    <p>Cinematic photographer & filmmaker</p>
    <a href="#work" class="btn">View Work</a>
  </div>
</section>

<!-- GALLERY -->
<section id="work" class="gallery">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
  <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
  <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</section>

<!-- VIDEO -->
<section class="video-section">
  <h2>Showreel</h2>
  <iframe src="https://www.youtube.com/embed/ScMzIvxBSi4"></iframe>
</section>

<footer>
  © Alejandro Mazo
</footer>

</body>
</html>
