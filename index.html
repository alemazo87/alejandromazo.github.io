<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | FMX Videographer</title>

<style>

/* ===== FONT ===== */
@font-face {
    font-family: 'Orbitron';
    src: url('Orbitron.ttf');
}

body {
    margin: 0;
    font-family: 'Orbitron', sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== CONTAINER ===== */
.container {
    max-width: 1400px;
    margin: auto;
}

/* ===== BANNER ===== */
.banner {
    width: 100%;
    height: 450px;
    background: url('banner.jpg') center center / cover no-repeat;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 40px 80px;
}

/* NAME + LOGO (BOTTOM) */
.banner-content {
    display: flex;
    align-items: center;
    gap: 20px;
}

.banner-logo {
    height: 120px;
    cursor: pointer;
}

.banner h1 {
    font-size: 48px;
    letter-spacing: 6px;
    margin: 0;
}

/* ===== FLOAT EFFECT ===== */
.sticky {
    position: fixed !important;
    top: 3px;
    left: 20px;
    z-index: 999;
    height: 70px !important;
}

/* ===== HERO ===== */
.hero {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 100px 80px;
    position: relative;
}

/* CENTER LOGO */
.center-logo {
    position: absolute;
    width: 800px;
    opacity: 0.06;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
}

/* TEXT */
.hero-text {
    width: 320px;
}

.hero-text p {
    font-size: 24px;
    font-weight: normal;
    line-height: 1.6;
    margin-bottom: 30px;
}

/* BUTTON */
.btn {
    display: block;
    width: 260px;
    padding: 14px;
    border: 2px solid white;
    text-align: center;
    text-decoration: none;
    color: white;
}

/* VIDEO */
.hero-video video {
    width: 260px;
    border-radius: 12px;
}

/* SYMMETRY */
.hero-text {
    margin-right: 60px;
}

.hero-video {
    margin-left: 60px;
}

/* ===== GALLERY ===== */
.gallery {
    display: flex;
    gap: 10px;
    padding: 40px;
}

.gallery img {
    width: 33%;
}

/* ===== MOBILE ===== */
@media (max-width: 768px) {

    .banner {
        height: 250px;
        padding: 20px;
    }

    .banner h1 {
        font-size: 24px;
    }

    .banner-logo {
        height: 60px;
    }

    .hero {
        flex-direction: column;
        padding: 60px 20px;
        text-align: center;
    }

    .hero-text {
        width: 100%;
        margin: 0;
    }

    .btn {
        margin: auto;
    }

    .hero-video {
        margin: 40px 0;
    }

    .center-logo {
        width: 300px;
    }

    .gallery {
        flex-direction: column;
    }

    .gallery img {
        width: 100%;
    }
}

</style>
</head>

<body>

<div class="container">

<!-- BANNER -->
<section class="banner">
    <div class="banner-content">
        <img src="logo.png" id="logo" class="banner-logo">
        <h1>ALEJANDRO MAZO</h1>
    </div>
</section>

<!-- HERO -->
<section class="hero">

    <!-- TEXT -->
    <div class="hero-text">
        <p>
        Action sports & concerts videomaker and photographer
        </p>

        <a href="#work" class="btn">View Work</a>
    </div>

    <!-- CENTER LOGO -->
    <img src="logo.png" class="center-logo">

    <!-- VIDEO -->
    <div class="hero-video">
        <video autoplay muted loop playsinline>
            <source src="reel.mp4" type="video/mp4">
        </video>
    </div>

</section>

<!-- GALLERY -->
<section id="work" class="gallery">
    <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
    <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
    <img src="https://images.unsplash.com/photo-1519125323398-675f0ddb6308">
</section>

</div>

<!-- JS: FLOAT LOGO -->
<script>
const logo = document.getElementById("logo");
const banner = document.querySelector(".banner");

window.addEventListener("scroll", () => {
    const bannerBottom = banner.offsetHeight - 3;

    if (window.scrollY >= bannerBottom) {
        logo.classList.add("sticky");
    } else {
        logo.classList.remove("sticky");
    }
});

/* CLICK TO TOP */
logo.addEventListener("click", () => {
    window.scrollTo({ top: 0, behavior: "smooth" });
});
</script>

</body>
</html>
