<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE</title>

<link rel="preload" as="image" href="banner.png">
<link rel="preload" as="image" href="title.png">
<link rel="preload" as="video" href="reel.mp4">

<style>

/* =========================
GLOBAL
========================= */

@font-face{
  font-family:Orbitron;
  src:url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron,sans-serif;
}

html,body{
  width:100%;
  background:#000;
  overflow-x:hidden;
  scroll-behavior:smooth;
}

body{
  color:#fff;
  background:#000;
}

img,video{
  display:block;
  max-width:100%;
  -webkit-user-drag:none;
}

a{
  text-decoration:none;
}

/* =========================
HEADER
========================= */

.header{
  width:100%;
  position:relative;
}

.header img{
  width:100%;
}

/* =========================
BANNER LOGO
========================= */

.banner-logo{
  position:absolute;

  left:45px;
  bottom:45px;

  width:290px;

  z-index:20;

  transition:0.35s ease;
}

.banner-logo:hover{
  opacity:0.75;
}

/* =========================
TITLE + LOGO
========================= */

.hero{
  width:100%;

  display:flex;
  flex-direction:column;
  align-items:center;

  margin-top:26px;
}

.title-img{
  width:78vw;
  max-width:1600px;
}

.logo-img{
  width:33vw;
  max-width:760px;

  margin-top:80px;

  opacity:0.95;
}

/* =========================
CONTENT
========================= */

.content{
  width:100%;
  margin-top:120px;
}

/* =========================
VIDEOS + CENTER
========================= */

.top-section{
  width:100%;

  display:flex;
  justify-content:center;
  align-items:flex-start;

  gap:120px;

  padding:0 4vw;
}

.video-box{
  width:320px;
  height:560px;

  overflow:hidden;
  border-radius:18px;

  background:#050505;

  position:relative;

  flex-shrink:0;
}

.video-box video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.center-info{
  width:520px;

  display:flex;
  flex-direction:column;
  align-items:center;

  margin-top:150px;
}

.description-img{
  width:100%;
}

.buttons{
  display:flex;
  gap:22px;

  margin-top:45px;
}

.btn{
  padding:16px 42px;

  border:
  1px solid
  rgba(255,255,255,0.2);

  color:#fff;

  letter-spacing:2px;
  font-size:11px;

  transition:0.35s ease;

  background:
  rgba(255,255,255,0.03);

  backdrop-filter:blur(10px);
}

.btn:hover{
  background:
  rgba(255,255,255,0.09);

  transform:translateY(-3px);
}

/* =========================
GALLERY
========================= */

.gallery{
  width:92%;

  margin:
  140px auto 120px auto;

  display:grid;

  grid-template-columns:
  1fr
  0.95fr
  1fr;

  gap:26px;

  align-items:start;
}

.gallery img{
  width:100%;

  object-fit:cover;

  border-radius:18px;

  transition:0.4s ease;
}

.gallery img:hover{
  transform:scale(1.015);
}

.gallery-left,
.gallery-right{
  height:1120px;
}

.middle-stack{
  display:flex;
  flex-direction:column;

  gap:26px;

  height:1120px;
}

.middle-stack img{
  flex:1;
}

/* =========================
MOBILE
========================= */

@media (max-width:900px){

  .header img{
    content:url("bannerMOBILE.jpg");
  }

  .banner-logo{
    width:120px;

    left:20px;
    bottom:20px;
  }

  .hero{
    margin-top:24px;
  }

  .title-img{
    width:92vw;
  }

  .logo-img{
    width:72vw;

    margin-top:40px;
  }

  .content{
    margin-top:70px;
  }

  .top-section{
    flex-direction:column;
    align-items:center;

    gap:40px;
  }

  .video-box{
    width:92%;
    height:auto;
  }

  .center-info{
    width:90%;
    margin-top:0;
  }

  .description-img{
    width:100%;
  }

  .buttons{
    flex-direction:column;
    width:100%;
  }

  .btn{
    text-align:center;
  }

  .gallery{
    width:95%;

    display:flex;
    flex-direction:column;

    gap:18px;

    margin-top:90px;
  }

  .gallery-left,
  .gallery-right,
  .middle-stack{
    height:auto;
  }

}

/* =========================
SCROLLBAR
========================= */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-track{
  background:#000;
}

::-webkit-scrollbar-thumb{
  background:#222;
  border-radius:20px;
}

::-webkit-scrollbar-thumb:hover{
  background:#444;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <img src="banner.png">

  <a href="index.html" class="banner-logo">
    <img src="bannerlogo.png">
  </a>

</div>

<!-- HERO -->
<div class="hero">

  <img src="title.png" class="title-img">
  <img src="logo.png" class="logo-img">

</div>

<!-- CONTENT -->
<div class="content">

  <!-- TOP SECTION -->
  <div class="top-section">

    <!-- LEFT VIDEO -->
    <div class="video-box">

      <video
      src="reel.mp4"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline></video>

    </div>

    <!-- CENTER -->
    <div class="center-info">

      <img
      src="description.png"
      class="description-img">

      <div class="buttons">

        <a href="work.html">
          <div class="btn">
            MY WORK
          </div>
        </a>

        <a href="contact.html">
          <div class="btn">
            CONTACT
          </div>
        </a>

      </div>

    </div>

    <!-- RIGHT VIDEO -->
    <div class="video-box">

      <video
      src="video2.mp4"
      autoplay
      muted
      loop
      playsinline
      webkit-playsinline></video>

    </div>

  </div>

  <!-- GALLERY -->
  <div class="gallery">

    <!-- LEFT -->
    <img
    src="image1.jpg"
    class="gallery-left">

    <!-- CENTER -->
    <div class="middle-stack">

      <img src="image5.jpg">
      <img src="image2.jpg">
      <img src="image3.jpg">

    </div>

    <!-- RIGHT -->
    <img
    src="image4.jpg"
    class="gallery-right">

  </div>

</div>

<script>

/* AUTOPLAY */

window.addEventListener("load",()=>{

  document.querySelectorAll("video").forEach(video=>{

    video.muted = true;

    const playPromise =
    video.play();

    if(playPromise !== undefined){

      playPromise.catch(()=>{});

    }

  });

});

</script>

</body>
</html>
