<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | ℂØN┬Δℂ†</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== BACKGROUND IMAGE (DIMMED) ===== */
.bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:url("image1.jpg") center/cover no-repeat;
  z-index:-2;
}

.bg::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.75); /* clean dim */
}

/* ===== NAV LOGO ===== */
.bannerlogo{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
}

/* ===== VISUAL LAYER ===== */
.visual{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  text-align:center;
}

.title{
  width:70vw;
  max-width:700px;
  opacity:0.2;
}

.logo{
  width:32vw;
  max-width:420px;
  margin-top:20px;
  opacity:0.2;
}

/* ===== CONTENT ===== */
.container{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:30px;
  padding:40px 20px;
  text-align:center;
}

/* ===== CONTACT ROW ===== */
.row{
  display:flex;
  align-items:center;
  gap:15px;
  font-size:14px;
  letter-spacing:1px;
}

.row img{
  width:26px;
  height:26px;
}

/* ===== LINKS ===== */
a{
  color:#fff;
  text-decoration:none;
  transition:0.3s;
}

a:hover{
  opacity:0.7;
}

/* ===== ANIMATION ===== */
.fade{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1s ease forwards;
}

.fade:nth-child(1){ animation-delay:0.2s; }
.fade:nth-child(2){ animation-delay:0.3s; }
.fade:nth-child(3){ animation-delay:0.4s; }
.fade:nth-child(4){ animation-delay:0.5s; }

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body oncontextmenu="return false;">

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- NAV LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- VISUAL BACKGROUND -->
<div class="visual">
  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
</div>

<!-- CONTENT -->
<div class="container">

  <!-- PHONE -->
  <div class="row fade">
    <img src="phone.png">
    <a href="tel:+79278468724">+7 (927) 846 87 24</a>
  </div>

  <!-- TELEGRAM -->
  <div class="row fade">
    <img src="telegram.png">
    <a href="https://t.me/Ale_mazo" target="_blank">@Ale_mazo</a>
  </div>

  <!-- WHATSAPP -->
  <div class="row fade">
    <img src="whatsapp.png">
    <a href="https://wa.me/79278468724" target="_blank">+7 (927) 846 87 24</a>
  </div>

  <!-- INSTAGRAM -->
  <div class="row fade">
    <img src="instagram.png">
    <a href="https://www.instagram.com/ale_mazo?igsh=Zmg1Z3BybG9lMTBo&utm_source=qr" target="_blank">
      ale_mazo
    </a>
  </div>

</div>

</body>
</html>
