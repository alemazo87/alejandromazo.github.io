<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | Contact</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* ===== BACKGROUND ===== */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: brightness(0.35);
  top: 0;
  left: 0;
  z-index: 0;
}

/* ===== MAIN CONTAINER ===== */
.container {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 70px;
}

/* ===== NAME ===== */
.name {
  font-size: 18px;
  letter-spacing: 3px;
  margin-bottom: 20px;
  opacity: 0.8;
}

/* ===== LOGO ===== */
.top-logo {
  width: 40vw;
  max-width: 180px;
  height: auto;
  margin-bottom: 50px;
}

/* ===== CONTACT LIST ===== */
.contact-list {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 28px;
  width: 100%;
}

/* ===== ITEM ===== */
.contact-item {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 14px;
  letter-spacing: 1.5px;
}

/* ICON */
.contact-item img {
  width: 26px;
  height: 26px;
  object-fit: contain;
}

/* LINK */
.contact-item a {
  color: white;
  text-decoration: none;
}

/* subtle desktop hover */
.contact-item a:hover {
  opacity: 0.7;
}

/* smaller screens */
@media(max-height: 700px) {
  .top-logo {
    margin-bottom: 30px;
  }

  .contact-list {
    gap: 20px;
  }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<img src="image1.jpg" class="bg">

<!-- CONTENT -->
<div class="container">

  <!-- NAME -->
  <div class="name">ALEJANDRO MAZO</div>

  <!-- LOGO -->
  <img src="bannerlogo.png" class="top-logo">

  <!-- CONTACT -->
  <div class="contact-list">

    <!-- PHONE -->
    <div class="contact-item">
      <img src="phone.png">
      <a href="tel:+79278468724">+7 (927) 846 87 24</a>
    </div>

    <!-- TELEGRAM -->
    <div class="contact-item">
      <img src="telegram.png">
      <a href="https://t.me/Ale_mazo" target="_blank">@Ale_mazo</a>
    </div>

    <!-- WHATSAPP -->
    <div class="contact-item">
      <img src="whatsapp.png">
      <a href="https://wa.me/79278468724" target="_blank">
        +7 (927) 846 87 24
      </a>
    </div>

    <!-- INSTAGRAM -->
    <div class="contact-item">
      <img src="instagram.png">
      <a href="https://www.instagram.com/ale_mazo?igsh=Zmg1Z3BybG9lMTBo&utm_source=qr" target="_blank">
        ale_mazo
      </a>
    </div>

  </div>

</div>

</body>
</html>
