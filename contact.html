<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | ℂØN†Δℂ†</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
  user-select:none;
}

/* ===== BACKGROUND IMAGE (MOBILE) ===== */
.bg-mobile{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  top:0;
  left:0;
  opacity:0.3;
  z-index:0;
}

@media(min-width:768px){
  .bg-mobile{
    display:none;
  }
}

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:16vh;
  min-height:100px;
  background:url("bannerMOBILE.jpg") center/cover no-repeat;
  position:relative;
  z-index:2;
}

@media(min-width:768px){
  .banner{
    background:url("banner.png") center/cover no-repeat;
    height:140px;
  }
}

/* ===== FIXED LOGO ===== */
.bannerlogo{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
}

@media(min-width:768px){
  .bannerlogo{
    left:40px;
    transform:none;
    width:180px;
  }
}

/* ===== BACKGROUND VISUAL ===== */
.visual-layer{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  text-align:center;
}

.visual-layer .title{
  width:70vw;
  max-width:600px;
  opacity:0.3;
}

.visual-layer .logo{
  width:220px;
  margin-top:20px;
  opacity:0.3;
}

/* ===== CONTENT ===== */
.content{
  position:relative;
  z-index:2;
  min-height:70vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:25px;
  text-align:center;
  padding:40px 20px;
}

/* CONTACT ITEM */
.contact-item{
  display:flex;
  align-items:center;
  gap:12px;
  font-size:14px;
  letter-spacing:1.5px;
}

/* ICON */
.contact-item img{
  width:26px;
  height:auto;
}

/* LINK */
.contact-item a{
  color:#fff;
  text-decoration:none;
}

/* HOVER */
.contact-item a:hover{
  opacity:0.7;
}

/* ===== DESKTOP ===== */
@media(min-width:1024px){
  .contact-item{
    font-size:16px;
  }
}
</style>
</head>

<body oncontextmenu="return false;">

<!-- MOBILE BACKGROUND -->
<img src="image1.jpg" class="bg-mobile">

<!-- BANNER -->
<div class="banner"></div>

<!-- FIXED LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- BACKGROUND VISUAL -->
<div class="visual-layer">
  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
</div>

<!-- CONTENT -->
<div class="content">

  <!-- PHONE -->
  <div class="contact-item">
    <img src="phone.png">
    <a href="tel:+79278468724">+7 (927) 846 87 24</a>
  </div>

  <!-- TELEGRAM -->
  <div class="contact-item">
    <img src="telegram.png">
    <a href="https://t.me/Ale_mazo" target="_blank">@Ale_mazo</a>
  </div>

  <!-- WHATSAPP -->
  <div class="contact-item">
    <img src="whatsapp.png">
    <a href="https://wa.me/79278468724" target="_blank">
      +7 (927) 846 87 24
    </a>
  </div>

  <!-- INSTAGRAM -->
  <div class="contact-item">
    <img src="instagram.png">
    <a href="https://www.instagram.com/ale_mazo?igsh=Zmg1Z3BybG9lMTBo&utm_source=qr" target="_blank">
      ale_mazo
    </a>
  </div>

</div>

</body>
</html>
