<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body {
  background:black;
  overflow-x:hidden;
  color:white;
  user-select:none;
}

/* Disable right click */
body { -webkit-touch-callout:none; }
html { -webkit-user-select:none; }

/* PAGE TRANSITION */
body.fade-out {
  opacity:0;
  transition:0.5s;
}

/* Banner */
.banner {
  width:100%;
  height:100vh;
  background:url("banner.png") center/cover no-repeat;
  position:relative;
}

/* Banner logo */
.banner-logo {
  position:absolute;
  left:5%;
  top:50%;
  transform:translateY(-50%);
  width:120px;
  z-index:10;
  cursor:pointer;
}

/* Title */
.title {
  position:fixed;
  top:calc(100vh + 30px);
  width:100%;
  text-align:center;
  opacity:0.3;
}

.title img { width:300px; }

/* Logo */
.logo {
  position:fixed;
  top:calc(100vh + 100px);
  width:100%;
  text-align:center;
  opacity:0.3;
}

.logo img { width:400px; }

/* CONTACT CENTER */
.contact-container {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

/* Contact item */
.contact-item {
  margin:20px 0;
  cursor:pointer;
  transition:0.3s;
}

.contact-item:hover {
  transform:scale(1.05);
}

/* Icons */
.contact-item img {
  width:40px;
  display:block;
  margin:0 auto 10px;
}

/* MOBILE VERSION */
@media(max-width:768px){

  body {
    background:
      linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
      url("image1.jpg") center/cover no-repeat;
  }

  .banner { display:none; }

  .banner-logo {
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
  }

  .title, .logo { display:none; }

  .contact-container {
    top:55%;
  }
}

</style>
</head>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* CLICK SOUND + LINK HANDLER */
function openLink(url){
  let sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play();

  document.body.classList.add("fade-out");

  setTimeout(()=>{
    window.open(url, "_blank");
  },400);
}

</script>
