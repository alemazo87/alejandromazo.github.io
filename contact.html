<style>

@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body {
  background:black;
  color:white;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

/* BACKGROUND */
.bg {
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
  background:url("image1.jpg") center/cover no-repeat;
  opacity:.2;
}

/* NAV LOGO */
.bannerlogo {
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:120px;
}

/* CONTACT WRAPPER */
.contact {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
}

/* EACH ITEM */
.item {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  cursor:pointer;
}

.item img {
  width:45px;
}

a {
  color:white;
  text-decoration:none;
}

/* ACTION BUTTONS */
.actions {
  display:none;
  gap:10px;
}

.action-btn {
  border:1px solid white;
  padding:6px 12px;
  font-size:12px;
}

</style>
</head>

<body>

<div class="bg"></div>

<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<div class="contact">

  <!-- PHONE -->
  <div class="item" onclick="togglePhone()">

    <img src="instagram.png">
    <div>ale_mazo</div>

<script>

/* PHONE TOGGLE */
function togglePhone(){
  let el = document.getElementById("phoneActions");
  el.style.display = el.style.display === "flex" ? "none" : "flex";
}

/* COPY */
function copyNumber(e){
  e.stopPropagation();
  navigator.clipboard.writeText("+79278468724");
