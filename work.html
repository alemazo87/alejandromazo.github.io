<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Alejandro Mazo | M¥ WΩ®k</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Orbitron;
}

body {
  background: black;
  color: white;
  overflow-x: hidden;
}

/* ===== TOP BANNER ===== */
.banner {
  position: relative;
  width: 100%;
  height: 60vh;
  overflow: hidden;
}

.banner img.bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* ===== FIXED BANNER LOGO ===== */
.banner-logo {
  position: fixed;
  top: 20vh; /* sits inside banner visually */
  left: 8%;
  width: 120px;
  height: auto;
  z-index: 10;
  cursor: pointer;
}

/* ===== CENTER BACKGROUND ELEMENTS ===== */
.center-bg {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 1;
  pointer-events: none;
}

.center-bg img.title {
  width: 70vw;
  max-width: 400px;
  opacity: 0.3;
  margin-bottom: 20px;
}

.center-bg img.logo {
  width: 35vw;
  max-width: 180px;
  opacity: 0.3;
}

/* ===== MAIN CONTENT ===== */
.content {
  position: relative;
  z-index: 2;
  min-height: 120vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  text-align: center;
  padding: 20px;
}

/* Main text */
.main-text {
  font-size: 18px;
  letter-spacing: 3px;
}

/* Secondary text */
.sub-text {
  font-size: 14px;
  opacity: 0.6;
  letter-spacing: 2px;
}

/* ===== MOBILE TWEAKS ===== */
@media(max-width: 768px) {

  .banner {
    height: 50vh;
  }

  .banner-logo {
    width: 90px;
    left: 6%;
    top: 18vh;
  }

  .main-text {
    font-size: 14px;
  }

  .sub-text {
    font-size: 12px;
  }
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="banner">
  <img src="bannerMOBILE.jpg" class="bg">
</div>

<!-- FIXED CLICKABLE LOGO -->
<a href="index.html">
  <img src="bannerlogo.png" class="banner-logo">
</a>

<!-- CENTER LOCKED BACKGROUND -->
<div class="center-bg">
  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
</div>

<!-- CONTENT -->
<div class="content">

  <div class="main-text">

  </div>

</div>

</body>
</html>
