body{
  background:#000;
  color:#fff;
  overflow-x:hidden;

/* ===== BANNER ===== */
.banner{
  width:100%;
  height:16vh;
  min-height:100px;
  background:url("bannerMOBILE.jpg") center/cover no-repeat;
}

@media(min-width:768px){
  .banner{
    background:url("banner.png") center/cover no-repeat;
    height:140px;
  }
}

/* ===== FIXED LOGO ===== */
.bannerlogo{
  position:fixed;
  top:15px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
}

@media(min-width:768px){
  .bannerlogo{
    left:40px;
    transform:none;
    width:180px;
  }
}

/* ===== BACKGROUND VISUAL ===== */
.visual-layer{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  text-align:center;
}

.visual-layer .title{
  width:70vw;
  max-width:600px;
  opacity:0.3;
}

.visual-layer .logo{
  width:220px;
  margin-top:20px;

}

/* ===== CONTENT ===== */
.content{
  position:relative;
  z-index:2;
  min-height:70vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  gap:15px;
}

/* MAIN TEXT */
.main-text{
  font-size:18px;
  letter-spacing:3px;
}

/* SUB TEXT */
.sub-text{
  font-size:13px;
  opacity:0.6;
  letter-spacing:2px;
}

/* ===== DESKTOP ===== */
@media(min-width:1024px){

  .main-text{
    font-size:22px;
  }

  .sub-text{
    font-size:14px;
  }
}
</style>
