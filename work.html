<!DOCTYPE html>

<title>Alejandro Mazo | M¥ WΩ®k</title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* ===== NAV LOGO ===== */
.bannerlogo{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  width:140px;
  z-index:1000;
}

@media(min-width:1024px){
  .bannerlogo{
    left:40px;
    transform:none;
    width:180px;
  }
}

/* ===== GLOBAL VISUAL LAYER ===== */
.visual{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
  text-align:center;
}

.title{
  width:70vw;
  max-width:700px;
  opacity:0.2;
}

.logo{
  width:32vw;
  max-width:420px;
  margin-top:20px;
  opacity:0.2;
}

/* ===== CONTENT ===== */
.container{
  position:relative;
  z-index:2;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:40px 20px;
}

/* TEXT */
.main-text{
  font-size:clamp(18px, 2vw, 26px);
  letter-spacing:2px;
  margin-bottom:20px;
}

.secondary{
  font-size:clamp(12px, 1.5vw, 18px);
  opacity:0.7;
  margin-top:10px;
}

/* ===== ANIMATION ===== */
.fade{
  opacity:0;
  transform:translateY(20px);
  animation:fadeUp 1s ease forwards;
}

.fade:nth-child(1){ animation-delay:0.2s; }
.fade:nth-child(2){ animation-delay:0.4s; }
.fade:nth-child(3){ animation-delay:0.6s; }

@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}
</style>
</head>

<body oncontextmenu="return false;">

<audio id="clickSound" src="click.mp3"></audio>

<!-- NAV -->
<a href="index.html">
  <img src="bannerlogo.png" class="bannerlogo">
</a>

<!-- VISUAL BACKGROUND -->
<div class="visual">
  <img src="title.png" class="title">
  <img src="logo.png" class="logo">
</div>

<!-- CONTENT -->
<div class="container">

  <div class="main-text fade">
    Le†'$ MAK€ $ΩME┬HING ÐØPE
  </div>

  <div class="secondary fade">
    COMIING SOON
  </div>

  <div class="secondary fade">
    I AM STILL UPLOADING IT ALL
  </div>

</div>

<script>
// (optional future interaction support)
function clickSound(){
  const s = document.getElementById("clickSound");
  s.currentTime = 0;
  s.play();
}
</script>

</body>
</html>
