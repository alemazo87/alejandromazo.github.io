<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alejandro Mazo | Le†'$ MAK€ $ΩME┬HING ÐØPE </title>

<style>
@font-face {
  font-family: Orbitron;
  src: url("Orbitron.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Orbitron;
}

body{
  background:black;
  overflow-x:hidden;
  color:white;
  user-select:none;
}

/* Disable right click */
body{ -webkit-touch-callout:none; }
html{ -webkit-user-select:none; }

/* PAGE TRANSITION */
body.fade-out{
  opacity:0;
  transition:0.5s;
}

/* Banner */
.banner{
  width:100%;
  height:100vh;
  background:url("banner.png") center/cover no-repeat;
  position:relative;
}

@media(max-width:768px){
  .banner{
    background:url("bannerMOBILE.jpg") center/cover no-repeat;
  }
}

/* Banner logo */
.banner-logo{
  position:absolute;
  left:5%;
  top:50%;
  transform:translateY(-50%);
  width:120px;
  z-index:10;
  cursor:pointer;
  transition:0.3s;
}

.banner-logo:hover{
  transform:translateY(-50%) scale(1.05);
}

/* Title */
.title{
  position:fixed;
  top:calc(100vh + 50px);
  width:100%;
  text-align:center;
  opacity:0.3;
}

.title img{
  width:300px;
}

/* Logo */
.logo{
  position:fixed;
  top:calc(100vh + 140px);
  width:100%;
  text-align:center;
  opacity:0.3;
}

.logo img{
  width:400px;
}

/* MAIN TEXT BLOCK */
.center-text{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
  animation: float 6s ease-in-out infinite;
}

.main-text{
  font-size:28px;
  letter-spacing:3px;
  margin-bottom:20px;
}

.sub-text{
  font-size:14px;
  opacity:0.6;
  letter-spacing:2px;
}

/* FLOAT EFFECT */
@keyframes float{
  0%{ transform:translate(-50%,-50%) translateY(0);}
  50%{ transform:translate(-50%,-50%) translateY(-10px);}
  100%{ transform:translate(-50%,-50%) translateY(0);}
}

/* MOBILE */
@media(max-width:768px){

  .title img{
    width:70%;
  }

  .logo img{
    width:50%;
  }

  .main-text{
    font-size:20px;
  }

  .sub-text{
    font-size:12px;
  }
}

</style>
</head>

<body oncontextmenu="return false">

<a href="index.html" onclick="goHome(event)">
<img src="bannerlogo.png" class="banner-logo">
</a>

<div class="banner"></div>

<div class="title">
<img src="title.png">
</div>

<div class="logo">
<img src="logo.png">
</div>

<div class="center-text">
  <div class="main-text">Le†'$ MAK€ $ΩME┬HING ÐØPE!</div>
  <div class="sub-text">COMING SOON</div>
  <div class="sub-text">IM UPLOADING IT ALL</div>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>

/* NAV SOUND */
function goHome(e){
  e.preventDefault();

  let sound = document.getElementById("clickSound");
  sound.currentTime = 0;
  sound.play();

  document.body.classList.add("fade-out");

  setTimeout(()=>{
    window.location.href = "index.html";
  },500);
}

</script>

</body>
</html>
